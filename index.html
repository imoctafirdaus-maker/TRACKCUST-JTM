<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Modern UI</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006491">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        /* Gaya Navigasi Bawah */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-size: 10px;
            font-weight: bold;
        }
        .nav-item.active { color: #006491; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        
        /* Tombol Tambah Tengah */
        .nav-add {
            background: #006491;
            color: white !important;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-top: -25px;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,100,145,0.4);
        }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans text-gray-800">

    <nav class="dominos-blue p-4 text-white flex justify-between items-center shadow-md">
        <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
        <span id="userTag" class="text-[10px] font-bold opacity-80"></span>
    </nav>

    <main class="p-4">
        
        <div id="page-search" class="page active space-y-4">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/Area/No HP..." class="w-full p-4 pl-12 rounded-2xl shadow-sm outline-none border-none text-sm font-bold bg-white">
                <i class="fa fa-search absolute left-4 top-4 text-blue-900 opacity-20"></i>
            </div>
            <div id="activeList" class="space-y-4"></div>
        </div>

        <div id="page-add" class="page space-y-4">
            <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900">
                <h2 class="font-black text-blue-900 text-xs mb-4 uppercase italic">Input Antaran Baru</h2>
                <div class="space-y-3">
                    <input type="text" id="custArea" placeholder="Area Pengantaran" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <select id="driverName" class="w-full bg-blue-50 p-4 rounded-xl text-sm outline-none font-bold text-blue-900"></select>
                    <input type="tel" id="custPhone" placeholder="No WhatsApp (08...)" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <button onclick="checkBeforeSave()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Kirim Ke Cloud</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page space-y-4">
            <h2 class="text-center text-gray-400 font-black text-[10px] uppercase tracking-widest">History Success</h2>
            <div id="historyList" class="space-y-2"></div>
        </div>

        <div id="page-profile" class="page space-y-4 text-center">
            <div class="bg-white p-8 rounded-3xl shadow-sm">
                <i class="fa fa-user-circle text-5xl text-blue-900 mb-2"></i>
                <h3 id="profileName" class="font-black text-lg uppercase">User JTM</h3>
                <button onclick="openProfile()" class="text-blue-500 font-bold text-xs underline mt-2">Ganti Identitas</button>
            </div>
            <div class="bg-white rounded-3xl p-4 shadow-sm text-left">
                <div id="chatDisplay" class="h-40 overflow-y-auto text-[11px] mb-3 space-y-2"></div>
                <div class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Pesan..." class="flex-1 bg-gray-100 rounded-xl p-3 text-xs outline-none">
                    <button onclick="sendChat()" class="dominos-blue text-white px-4 rounded-xl"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

    </main>

    <div class="bottom-nav">
        <button onclick="showPage('search')" id="nav-search" class="nav-item active">
            <i class="fa fa-search"></i>
            <span>Cari</span>
        </button>
        <button onclick="showPage('history')" id="nav-history" class="nav-item">
            <i class="fa fa-clock-rotate-left"></i>
            <span>Riwayat</span>
        </button>
        <button onclick="showPage('add')" id="nav-add" class="nav-item nav-add">
            <i class="fa fa-plus"></i>
            <span>Tambah</span>
        </button>
        <button onclick="showPage('profile')" id="nav-profile" class="nav-item">
            <i class="fa fa-comments"></i>
            <span>Chat</span>
        </button>
        <button onclick="openProfile()" class="nav-item">
            <i class="fa fa-gear"></i>
            <span>Settings</span>
        </button>
    </div>

    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDnVqT6k8IM3shFtgc",
            authDomain: "trackcust-jtm.firebaseapp.com",
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "trackcust-jtm",
            storageBucket: "trackcust-jtm.firebasestorage.app",
            messagingSenderId: "411585432172",
            appId: "1:411585432172:web:2d9ae1655d4e3073e4a649"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const crewList = ["Okta", "Dendy", "Arif", "Rian", "Gemilang", "Sadewa", "Fahran", "Rafli", "Acong"];
        const mgmtList = ["Pak KUR", "Pak Agus", "Pak Ageng", "Sintya", "Ridha"];
        let currentUser = localStorage.getItem('jtm_user') || "";

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        // Isi Dropdown Driver
        const select = document.getElementById('driverName');
        select.innerHTML = '<option value="">Pilih Crew</option>';
        crewList.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);

        // ... Sisa fungsi (checkBeforeSave, saveToCloud, renderContent, sendChat) ...
        // Tambahkan di bawah sini sama seperti kode sebelumnya
    </script>
</body>
</html>
