<script>
const TrackCust = (() => {

/* ================= STATE ================= */
let currentUser = localStorage.getItem("jtm_user") || "";
let allOrders = {};
let historyData = {};
let stream = null;
let autoScanInterval = null;
let photoBase64 = "";

/* LIVE TRACKING STATE */
let driverWatchId = null;
let map = null;
let driverMarkers = {};

/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc",
    databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "trackcust-jtm"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= AUTH ================= */
const userPins = { 
    "Pak KUR (Mgt)": "0000","Pak Agus (Mgt)": "6413","Pak Ageng (Mgt)": "4444",
    "Sintiya (Cashier)": "0959","Ridha (Cashier)": "0968","Okta": "0972",
    "Dendy": "0960","Arif": "0966","Rian": "0971","Gemilang": "0967",
    "Sadewa": "0976","Fahran": "0975","Rafli": "0974","Rafli ramadhan": "0929"
};

function login(){
    let u = selectUser.value;
    let p = inputPin.value;
    if(userPins[u] === p){
        localStorage.setItem("jtm_user",u);
        startApp(u);
    } else alert("PIN salah");
}

/* ================= INIT ================= */
function init(){
    selectUser.innerHTML = '<option value="">-- PILIH --</option>';
    Object.keys(userPins).forEach(n=>{
        selectUser.innerHTML += `<option>${n}</option>`;
    });

    if(currentUser) startApp(currentUser);

    setInterval(updateTimer,1000);
}

/* ================= START APP ================= */
function startApp(user){
    currentUser = user;

    pinOverlay.style.display="none";
    mainContent.style.display="flex";
    userDisplay.innerText = user;

    updatePresence();
    startListeners();

    /* INIT LIVE TRACKING */
    initMap();
    listenDriverMap();
}

/* ================= FIREBASE LISTENER ================= */
function startListeners(){
    db.ref("orders").on("value",snap=>{
        allOrders = snap.val() || {};
        renderOrders();
    });

    db.ref("history").on("value",snap=>{
        historyData = snap.val() || {};
        renderHistory();
    });

    db.ref("online").on("value",snap=>{
        renderOnline(snap.val()||{});
    });

    db.ref("delivery").on("value",snap=>{
        renderDelivery(snap.val()||{});
    });
}

/* ================= PRESENCE ================= */
function updatePresence(){
    db.ref("online/"+currentUser).set({
        name:currentUser,
        time:Date.now()
    });
}

/* ================= DELIVERY ================= */
function pushDelivery(){
    db.ref("delivery/"+currentUser).set({
        name:currentUser,
        time:Date.now()
    });
}

/* ================= TIMER ================= */
function updateTimer(){
    document.querySelectorAll(".timer").forEach(el=>{
        let t = parseInt(el.dataset.time);
        el.innerText = Math.floor((Date.now()-t)/1000)+"s";
    });
}

/* ================= CRUD ================= */
function saveData(){
    let id = editId.value || Date.now();
    db.ref("orders/"+id).set({
        name:custName.value,
        phone:custPhone.value,
        area:custArea.value,
        maps:custMaps.value,
        photo:photoBase64,
        time:Date.now(),
        driver:currentUser
    });
}

/* ================= HISTORY ================= */
function finishOrder(id){
    db.ref("orders/"+id).once("value").then(snap=>{
        db.ref("history/"+id).set(snap.val());
        db.ref("orders/"+id).remove();
    });
}

function clearHistory(){
    db.ref("history").remove();
}

/* ================= RENDER ================= */
function renderOrders(){
    activeList.innerHTML="";
    let count=0;

    Object.entries(allOrders).forEach(([id,d])=>{
        count++;
        activeList.innerHTML += `
        <div class="bg-white p-3 rounded-xl shadow">
            ${d.name}
            <div class="timer" data-time="${d.time}"></div>
            <button onclick="TrackCust.finishOrder('${id}')">Selesai</button>
        </div>`;
    });

    countActive.innerText = count+" AKTIF";
}

function renderHistory(){
    historyList.innerHTML="";
    Object.values(historyData).forEach(d=>{
        historyList.innerHTML += `<div>${d.name}</div>`;
    });
}

function renderOnline(data){
    onlineBar.innerHTML="";
    Object.values(data).forEach(u=>{
        onlineBar.innerHTML += `<span>${u.name}</span>`;
    });
}

function renderDelivery(data){
    deliveryStatusBar.innerHTML="";
    Object.values(data).forEach(d=>{
        deliveryStatusBar.innerHTML += `<div>${d.name}</div>`;
    });
}

/* ================= SEARCH ================= */
function search(){
    let val = searchInput.value.toLowerCase();
    document.querySelectorAll("#activeList div").forEach(el=>{
        el.style.display = el.innerText.toLowerCase().includes(val) ? "" : "none";
    });
}

/* ================= FOTO ================= */
function processImage(input){
    let file = input.files[0];
    let reader = new FileReader();
    reader.onload = e=>{
        photoBase64 = e.target.result;
        imgPrev.src = photoBase64;
        imgPrev.classList.remove("hidden");
    };
    reader.readAsDataURL(file);
}

function removePhoto(){
    photoBase64="";
    imgPrev.classList.add("hidden");
}

/* ================= SCANNER ================= */
async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({video:true});
    scannerVideo.srcObject = stream;
    autoScanInterval = setInterval(scanOCR,2000);
}

function stopCamera(){
    stream.getTracks().forEach(t=>t.stop());
    clearInterval(autoScanInterval);
}

/* ================= OCR ================= */
async function scanOCR(){
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");
    canvas.width = scannerVideo.videoWidth;
    canvas.height = scannerVideo.videoHeight;
    ctx.drawImage(scannerVideo,0,0);

    let res = await Tesseract.recognize(canvas,'eng');
    let text = res.data.text.match(/\d+/g);

    if(text){
        addressTableBody.innerHTML="";
        text.forEach(num=>{
            addressTableBody.innerHTML += `
            <tr>
                <td>${num}</td>
                <td><button onclick="TrackCust.openWA('${num}')">Chat</button></td>
            </tr>`;
        });
        scanResultArea.classList.remove("hidden");
    }
}

/* ================= WHATSAPP ================= */
function openWA(num){
    window.open("https://wa.me/"+num);
}

/* ================= QR ================= */
function generateQR(){
    new QRCode(qrcode, currentUser);
}

/* ================= MAP / LIVE TRACKING ================= */
function initMap(){
    if(map) return;

    map = L.map('map').setView([-6.9,107.6], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);
}

function startDriverTracking(){
    if(driverWatchId) return;

    driverWatchId = navigator.geolocation.watchPosition(pos=>{
        const { latitude, longitude } = pos.coords;

        db.ref("tracking/"+currentUser).set({
            name: currentUser,
            lat: latitude,
            lng: longitude,
            time: Date.now()
        });
    });
}

function stopDriverTracking(){
    if(driverWatchId){
        navigator.geolocation.clearWatch(driverWatchId);
        driverWatchId = null;
    }
}

function listenDriverMap(){
    db.ref("tracking").on("value", snap=>{
        const data = snap.val() || {};

        Object.entries(data).forEach(([id,d])=>{

            if(Date.now() - d.time > 900000){
                db.ref("tracking/"+id).remove();
                return;
            }

            if(driverMarkers[id]){
                driverMarkers[id].setLatLng([d.lat, d.lng]);
            } else {
                driverMarkers[id] = L.marker([d.lat, d.lng])
                    .addTo(map)
                    .bindPopup(d.name);
            }
        });
    });
}

/* ================= NAV ================= */
function showPage(p){
    document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
    document.getElementById("page-"+p).classList.add("active");
}

/* ================= UTIL ================= */
function logout(){
    localStorage.removeItem("jtm_user");
    location.reload();
}

/* ================= RETURN ================= */
return {
    init, login, showPage,
    startCamera, stopCamera,
    processImage, removePhoto,
    saveData, finishOrder,
    clearHistory, search,
    openWA, generateQR,
    startDriverTracking,
    stopDriverTracking,
    logout
};

})();

/* ================= GLOBAL ================= */
window.onload = TrackCust.init;
window.prosesLogin = TrackCust.login;
window.showPage = TrackCust.showPage;
window.startCamera = TrackCust.startCamera;
window.stopCamera = TrackCust.stopCamera;
window.processImage = TrackCust.processImage;
window.removePhoto = TrackCust.removePhoto;
window.saveData = TrackCust.saveData;
window.clearAllHistory = TrackCust.clearHistory;
window.handleLogout = TrackCust.logout;
window.openWaDirect = ()=>TrackCust.openWA(waDirectNumber.value);

/* LIVE TRACKING GLOBAL */
window.startTracking = TrackCust.startDriverTracking;
window.stopTracking = TrackCust.stopDriverTracking;
</script>
