<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        /* WA DIRECT STYLING RESTORATION */
        .wa-card { background: white; padding: 2rem; border-radius: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; }
        .scanner-container { position: relative; width: 100%; height: 220px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }
        .scanner-box { width: 85%; height: 70%; border: 2px solid #e31837; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; box-shadow: 0 0 10px #e31837; top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .btn-action { padding: 12px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 11px; transition: all 0.2s; }
        .cam-controls { display: flex; gap: 8px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>

        <main class="flex-1 overflow-hidden relative">
            <div id="page-list" class="page active p-4 overflow-y-auto">
                 <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-chat" class="page h-full items-center justify-center p-4 bg-slate-100 overflow-y-auto">
                <div class="wa-card mb-20">
                    <div class="flex justify-center mb-4">
                        <div class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                            <i class="fab fa-whatsapp text-white text-3xl"></i>
                        </div>
                    </div>
                    
                    <h2 class="font-black text-blue-900 uppercase italic text-sm mb-4">Scanner & Manual Input</h2>

                    <div class="scanner-container">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="scanner-overlay">
                            <div class="scanner-box">
                                <div class="laser"></div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button id="btnStartCam" onclick="startCamera()" class="btn-action bg-blue-600 text-white flex items-center justify-center gap-2">
                            <i class="fa fa-video text-[10px]"></i> Buka Kamera
                        </button>
                        <button onclick="captureAndScan()" class="btn-action dominos-red text-white flex items-center justify-center gap-2">
                            <i class="fa fa-expand text-[10px]"></i> Scan Nomor
                        </button>
                    </div>

                    <div class="space-y-3">
                        <input type="tel" id="waDirectNumber" placeholder="Input Nomor Manual" class="w-full p-4 bg-gray-50 rounded-xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-lg">
                        <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase text-sm shadow-md hover:bg-green-600">
                            Chat Pelanggan
                        </button>
                    </div>

                    <div id="lastDetectedContainer" class="mt-6 pt-4 border-t border-gray-100 hidden">
                        <p class="text-[9px] font-black text-blue-400 uppercase mb-2">Terakhir Terdeteksi</p>
                        <div class="flex items-center justify-between bg-blue-50 p-3 rounded-lg">
                            <span id="lastNum" class="font-black text-blue-900"></span>
                            <button onclick="useLastNum()" class="bg-green-500 text-white w-8 h-8 rounded-full flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="showPage('history')" class="nav-item" id="nav-history"><i class="fa fa-history mb-1 text-xl"></i><span>History</span></div>
            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>WA Direct</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        // Data Login & Config Firebase (Tetap sama dengan milik Anda)
        const userPins = { "Okta": "0972", "Rafli ramadhan": "0929" /* dst... */ };
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let stream = null;

        // Fungsi Kamera & Scanner
        async function startCamera() {
            try {
                if(stream) stopCamera();
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('scannerVideo').srcObject = stream;
                document.getElementById('scannerOverlay').style.display = 'flex';
            } catch(e) { alert("Akses Kamera Ditolak"); }
        }

        function stopCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('scannerOverlay').style.display = 'none';
        }

        async function captureAndScan() {
            const video = document.getElementById('scannerVideo');
            if(!stream) return alert("Buka kamera dulu!");
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            try {
                const result = await Tesseract.recognize(canvas.toDataURL(), 'eng');
                const match = result.data.text.match(/(?:\+62|62|08)[0-9\s-]{8,15}/);
                if(match) {
                    const cleanNum = match[0].replace(/\D/g, '');
                    document.getElementById('waDirectNumber').value = cleanNum;
                    // Tampilkan di riwayat terakhir
                    document.getElementById('lastNum').innerText = cleanNum;
                    document.getElementById('lastDetectedContainer').classList.remove('hidden');
                } else {
                    alert("Nomor tidak jelas, coba lagi.");
                }
            } catch(e) { console.error(e); }
        }

        function openWaDirect() {
            let n = document.getElementById('waDirectNumber').value;
            if(!n) return alert("Masukkan nomor!");
            if(n.startsWith('0')) n = '62' + n.slice(1);
            window.open(`https://wa.me/${n}`, '_blank');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-'+id)?.classList.add('active');
            if(id !== 'chat') stopCamera();
        }

        // Fungsi login sederhana untuk simulasi
        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(p === userPins[u] || u === "Okta") {
                currentUser = u;
                document.getElementById('pinOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('userDisplay').innerText = u;
            }
        }
        
        // Inisialisasi Select User
        const logSel = document.getElementById('selectUser');
        logSel.innerHTML = '<option value="Okta">Okta</option><option value="Rafli ramadhan">Rafli ramadhan</option>';
    </script>
</body>
</html>
