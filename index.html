<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Ultimate Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006491">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491; color: white !important; width: 55px; height: 55px; border-radius: 50%; margin-top: -30px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        .page { display: none; } .page.active { display: block; }
        .online-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .btn-action { font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans text-gray-800">

    <audio id="chatSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <nav class="dominos-blue p-4 text-white sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center mb-2">
            <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <button onclick="openProfile()" id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-md">Pilih Nama</button>
        </div>
        <div id="onlineList" class="text-[9px] font-bold opacity-90 flex gap-3 overflow-x-auto whitespace-nowrap"></div>
    </nav>

    <main class="p-4">
        <div id="page-search" class="page active space-y-4">
            <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Antaran..." class="w-full p-4 rounded-2xl shadow-sm outline-none border-none text-sm font-bold bg-white italic">
            <div id="activeList" class="space-y-4"></div>
        </div>

        <div id="page-add" class="page">
            <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-4">
                <h2 id="formTitle" class="font-black text-blue-900 text-xs uppercase italic">Input Baru</h2>
                <input type="hidden" id="editKey">
                <input type="text" id="custArea" placeholder="Area (Jatikramat/Jatimakmur)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold outline-none uppercase">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <select id="driverName" class="bg-blue-50 p-4 rounded-xl text-sm font-bold text-blue-900 outline-none uppercase"></select>
                </div>
                <input type="tel" id="custPhone" placeholder="No WA (08...)" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                <div class="flex gap-2">
                    <button id="btnCancelEdit" onclick="cancelEdit()" class="hidden flex-1 bg-gray-200 py-4 rounded-2xl font-black uppercase text-xs">Batal</button>
                    <button onclick="checkBeforeSave()" class="flex-[2] dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Simpan Data</button>
                </div>
            </div>
        </div>

        <div id="page-history" class="page space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-gray-400 font-black text-[10px] uppercase italic">Riwayat Selesai</h2>
                <button onclick="clearHistoryWithPin()" class="text-red-500 font-black text-[10px] uppercase underline">Hapus Riwayat</button>
            </div>
            <div id="historyList" class="space-y-2"></div>
        </div>

        <div id="page-chat" class="page space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                <h3 id="profileName" class="font-black text-blue-900 uppercase text-xs italic">User JTM</h3>
                <button onclick="clearAllChats()" id="adminDelChat" class="hidden text-red-500 text-[10px] font-bold underline italic">Clear Chat</button>
            </div>
            <div class="bg-white rounded-3xl p-4 shadow-sm">
                <div id="chatDisplay" class="h-64 overflow-y-auto
