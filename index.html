<div id="scanResultArea" class="hidden mt-4">
    <h3 class="text-blue-900 font-black uppercase italic text-xs mb-2">Informasi Alamat Pengiriman</h3>
    <div class="overflow-hidden rounded-lg border-2 border-blue-900">
        <table class="w-full text-[10px] bg-white">
            <thead class="bg-blue-900 text-white uppercase">
                <tr>
                    <th class="p-2 text-center border-r border-blue-800" style="width: 10%;">No.</th>
                    <th class="p-2 text-left" style="width: 60%;">Alamat Lengkap</th>
                    <th class="p-2 text-center" style="width: 30%;">Nomor Telepon / Aksi</th>
                </tr>
            </thead>
            <tbody id="addressTableBody" class="divide-y divide-gray-200 font-bold text-gray-800">
                </tbody>
        </table>
    </div>
    <div class="mt-3 p-2 bg-yellow-50 rounded border border-yellow-200">
        <p class="text-[9px] text-gray-600"><strong>Catatan:</strong> Pastikan nomor telepon benar sebelum menekan tombol WhatsApp.</p>
    </div>
</div>

<script>
async function scanFullAddressOCR(input) {
    if (!input.files || !input.files[0]) return;
    
    const loading = document.getElementById('ocrLoading');
    const tableArea = document.getElementById('scanResultArea');
    const tableBody = document.getElementById('addressTableBody');
    
    loading.classList.remove('hidden');
    tableArea.classList.add('hidden');
    tableBody.innerHTML = "";

    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            // Memproses gambar menggunakan Tesseract.js
            const result = await Tesseract.recognize(e.target.result, 'eng');
            const lines = result.data.lines;
            
            let rowCount = 0;

            lines.forEach(line => {
                const text = line.text.trim();
                // Mencari pola nomor telepon di dalam baris teks
                const phoneMatch = text.match(/\(?\d{3,4}\)?[-.\s]?\d{3,4}[-.\s]?\d{3,4}/);

                if (text.length > 15) { // Validasi sederhana agar baris kosong tidak masuk
                    rowCount++;
                    let phoneNum = phoneMatch ? phoneMatch[0] : "";
                    // Membersihkan teks alamat dari karakter gangguan (seperti #x62 atau tanda kurung nomor)
                    let cleanAddress = text.replace(phoneNum, '').replace(/[#x62()]/g, '').trim();
                    
                    // Format nomor untuk link WhatsApp (menghilangkan karakter non-digit)
                    let waFormatted = phoneNum.replace(/\D/g, '');
                    if(waFormatted.startsWith('0')) waFormatted = '62' + waFormatted.slice(1);

                    const row = `
                        <tr>
                            <td class="p-2 text-center border-r border-gray-100 bg-gray-50">${rowCount}</td>
                            <td class="p-2 leading-tight uppercase">${cleanAddress}</td>
                            <td class="p-2 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-blue-700">${phoneNum || '-'}</span>
                                    ${phoneNum ? `
                                        <button onclick="window.open('https://wa.me/${waFormatted}', '_blank')" 
                                                class="bg-green-500 text-white px-2 py-1 rounded shadow-sm text-[8px] flex items-center gap-1">
                                            <i class="fab fa-whatsapp"></i> Chat WA
                                        </button>
                                    ` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }
            });

            if (rowCount > 0) {
                tableArea.classList.remove('hidden');
            } else {
                alert("Alamat tidak terdeteksi. Coba foto lebih dekat dan jelas.");
            }

        } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan saat membaca gambar.");
        } finally {
            loading.classList.add('hidden');
        }
    };
    reader.readAsDataURL(input.files[0]);
}
</script>
