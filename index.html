<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <style>
        :root { --dominos-blue: #006491; --dominos-red: #e31837; }
        .dominos-blue { background-color: var(--dominos-blue); }
        .dominos-red { background-color: var(--dominos-red); }
        
        /* Poin 18: Scroll Optimization */
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Poin 15 & 19: Navigation & Safe Area */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; display: flex; justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); 
            border-top: 2px solid #f1f5f9; z-index: 1000; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: var(--dominos-blue); }
        .nav-add { background: var(--dominos-blue) !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        /* Poin 10 & 17: Scanner UI */
        .scanner-container { position: relative; width: 100%; height: 220px; background: black; border-radius: 1.5rem; overflow: hidden; border: 4px solid var(--dominos-blue); }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--dominos-red); box-shadow: 0 0 10px var(--dominos-red); top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .loader-ocr { border: 3px solid #f3f3f3; border-top: 3px solid var(--dominos-blue); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="imgModal" class="fixed inset-0 bg-black/95 z-[10001] hidden flex-col items-center justify-center p-4" onclick="this.style.display='none'">
        <div id="modalContent" class="flex flex-col items-center">
             <img id="fullImg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl">
             <p id="modalCaption" class="text-white mt-4 font-black uppercase tracking-widest text-center"></p>
        </div>
    </div>

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-black text-blue-900 outline-none uppercase text-xs border-2 border-transparent focus:border-blue-500"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center shrink-0">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>
        
        <div id="deliveryStatusBar" class="bg-white px-4 py-1 flex flex-col text-[9px] font-black text-blue-900 uppercase italic border-b border-gray-100 no-scrollbar overflow-y-auto max-h-14"></div>
        
        <div id="onlineBar" class="bg-blue-900/10 px-4 py-1 flex gap-3 overflow-x-auto text-[8px] font-black text-blue-900 uppercase no-scrollbar"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-3 gap-2">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Nama/HP/Area..." class="flex-1 p-3 rounded-xl shadow-sm outline-none font-bold text-sm border border-gray-200">
                    <div id="countActive" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black italic whitespace-nowrap">0 AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-history" class="page p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="font-black text-blue-900 uppercase italic text-[11px]">Daftar Selesai</h3>
                    <button onclick="clearHistory()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-md active:scale-95">
                        <i class="fa fa-trash-alt mr-1"></i> Kosongkan
                    </button>
                </div>
                <div id="historyList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2.5rem] p-6 shadow-xl border-b-8 border-blue-900 space-y-3">
                    <h2 id="formTitle" class="font-black text-blue-900 text-center uppercase text-xs mb-2">Form Data Customer</h2>
                    <input type="hidden" id="editId">
                    <input type="text" id="custArea" placeholder="KODE AREA (MISAL: A-1)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-black uppercase outline-none border-2 border-yellow-100 focus:border-yellow-400">
                    <input type="text" id="custName" placeholder="NAMA PELANGGAN" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-black uppercase">
                    <input type="tel" id="custPhone" placeholder="NOMOR WHATSAPP" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-black">
                    <input type="text" id="custMaps" placeholder="LINK GOOGLE MAPS" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    
                    <div class="bg-blue-50 p-6 rounded-xl border-2 border-dashed border-blue-200 text-center relative overflow-hidden">
                        <label class="cursor-pointer block">
                            <i class="fa fa-camera text-blue-400 text-2xl"></i>
                            <p class="text-[10px] font-black text-blue-900 uppercase mt-2" id="photoStatus">Klik untuk Foto Rumah</p>
                            <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="compressImage(this)">
                        </label>
                        <button onclick="removePhoto()" id="btnRemovePhoto" class="hidden absolute top-2 right-2 bg-red-500 text-white w-7 h-7 rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times"></i></button>
                        <img id="imgPrev" class="hidden w-full h-40 object-cover rounded-xl mt-3 border-2 border-white shadow-sm">
                    </div>
                    
                    <button onclick="saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition-all">Simpan Data</button>
                    <button onclick="resetForm()" id="cancelBtn" class="hidden w-full bg-gray-400 text-white py-3 rounded-2xl font-black uppercase text-[10px]">Batalkan Edit</button>
                </div>
            </div>

            <div id="page-chat" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2.5rem] p-6 shadow-xl border-b-8 border-green-500 mb-20 text-center">
                    <div class="w-14 h-14 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
                        <i class="fab fa-whatsapp text-white text-3xl"></i>
                    </div>
                    <h2 class="font-black text-blue-900 uppercase italic text-sm mb-4">OCR Scanner & WA Direct</h2>
                    
                    <div class="scanner-container mb-4">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="absolute inset-0 border-[40px] border-black/40 pointer-events-none hidden">
                            <div class="w-full h-full border-2 border-red-500 relative">
                                <div class="laser"></div>
                            </div>
                        </div>
                    </div>

                    <div id="camControls" class="hidden bg-gray-50 p-4 rounded-2xl border border-gray-100 mb-4 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-blue-900 uppercase">Zoom</span>
                            <div class="flex gap-2">
                                <button onclick="setZoom(1)" class="z-btn px-3 py-1 bg-white border border-blue-900 rounded-lg text-[10px] font-black active" id="z1">1x</button>
                                <button onclick="setZoom(2)" class="z-btn px-3 py-1 bg-white border border-blue-900 rounded-lg text-[10px] font-black" id="z2">2x</button>
                            </div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-blue-900 uppercase">Mode BW</span>
                            <div class="flex gap-1">
                                <button onclick="setBW('off')" id="bw-off" class="bw-btn px-2 py-1 bg-white border rounded text-[8px] font-black active">OFF</button>
                                <button onclick="setBW('auto')" id="bw-auto" class="bw-btn px-2 py-1 bg-white border rounded text-[8px] font-black">AUTO</button>
                                <button onclick="setBW('manual')" id="bw-manual" class="bw-btn px-2 py-1 bg-white border rounded text-[8px] font-black">MANUAL</button>
                            </div>
                        </div>
                        <div id="manualVisuals" class="hidden grid grid-cols-2 gap-2 pt-2 border-t border-gray-200">
                            <input type="range" id="brRange" min="50" max="200" value="100" oninput="applyFilters()" class="accent-blue-900">
                            <input type="range" id="ctRange" min="50" max="200" value="100" oninput="applyFilters()" class="accent-blue-900">
                        </div>
                    </div>

                    <div class="flex gap-2 mb-4">
                        <button id="btnStartCam" onclick="toggleCamera(true)" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px]"><i class="fa fa-camera mr-1"></i> Buka</button>
                        <button id="btnStopCam" onclick="toggleCamera(false)" class="hidden flex-1 bg-gray-500 text-white py-3 rounded-xl font-black uppercase text-[10px]">Tutup</button>
                        <button onclick="runOCR()" class="flex-1 dominos-red text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">Scan Nomor</button>
                    </div>

                    <div id="ocrLoader" class="hidden mb-4 p-2 bg-blue-50 rounded-lg flex items-center justify-center">
                        <div class="loader-ocr mr-2"></div>
                        <span class="text-[9px] font-black text-blue-900 uppercase" id="ocrStatusText">Membaca...</span>
                    </div>

                    <div class="relative mb-3">
                        <input type="tel" id="manualWA" placeholder="MASUKKAN NOMOR HP" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-lg">
                    </div>
                    <button onclick="manualChat()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Chat Sekarang</button>

                    <div id="scanResultArea" class="hidden mt-6 text-left">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Hasil Scan Terakhir:</p>
                        <table class="w-full bg-white rounded-xl overflow-hidden border border-gray-100">
                            <tbody id="ocrTableBody" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>List</span></div>
            <div onclick="showPage('history')" class="nav-item" id="nav-history"><i class="fa fa-history mb-1 text-xl"></i><span>History</span></div>
            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>Scan</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-power-off mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        /* --- CONFIG & STATE --- */
        const userPins = { 
            "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Okta": "0972", 
            "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Rafli": "0974" 
        };

        const firebaseConfig = { 
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", 
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "trackcust-jtm" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; 
        let photoBase64 = "";
        let stream = null;
        let ocrWorker = null;
        let activeBW = 'off';

        /* --- INITIALIZATION --- */
        window.onload = () => {
            const sel = document.getElementById('selectUser');
            sel.innerHTML = '<option value="">-- PILIH DRIVER/ADMIN --</option>';
            Object.keys(userPins).forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
            
            if(currentUser) bukaAplikasi(currentUser);
            
            // Poin 5 & 14: Timer & Sync
            setInterval(updateGlobalTimers, 1000);
            startPresenceSystem();
            startDeliveryListener();
        };

        function bukaAplikasi(name) {
            currentUser = name;
            localStorage.setItem('jtm_user', name);
            document.getElementById('userDisplay').innerText = name;
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            
            db.ref('customers').on('value', s => {
                allData = s.val() || {};
                render();
            });
        }

        /* --- POIN 1: AUTHENTICATION --- */
        function handleLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(!u) return alert("Pilih User!");
            if(userPins[u] === p) {
                bukaAplikasi(u);
            } else {
                alert("PIN SALAH!");
                document.getElementById('inputPin').value = "";
            }
        }

        function handleLogout() {
            if(confirm("Keluar dari sistem?")) {
                db.ref('presence/' + currentUser).remove();
                localStorage.removeItem('jtm_user');
                location.reload();
            }
        }

        /* --- POIN 4: PRESENCE SYSTEM --- */
        function startPresenceSystem() {
            if(!currentUser) return;
            const myRef = db.ref('presence/' + currentUser);
            myRef.set(true);
            myRef.onDisconnect().remove();

            db.ref('presence').on('value', s => {
                const bar = document.getElementById('onlineBar');
                bar.innerHTML = "";
                s.forEach(u => {
                    bar.innerHTML += `
                        <span class="flex items-center gap-1 shrink-0">
                            <i class="fa fa-circle text-[5px] text-green-500"></i> ${u.key}
                        </span>`;
                });
            });
        }

        /* --- POIN 3: DELIVERY TRACKING --- */
        function pushActivity(msg) {
            db.ref('delivery_activity/' + currentUser).set({
                msg: msg.toUpperCase(),
                timestamp: Date.now()
            });
        }

        function startDeliveryListener() {
            db.ref('delivery_activity').on('value', s => {
                const bar = document.getElementById('deliveryStatusBar');
                bar.innerHTML = "";
                const now = Date.now();
                s.forEach(child => {
                    const data = child.val();
                    if(now - data.timestamp < 900000) { // Valid 15 menit
                        bar.innerHTML += `
                            <div class="status-item py-1 border-b border-gray-100 flex items-center">
                                <i class="fa fa-motorcycle mr-2 text-[7px] text-red-500"></i>
                                <span>${child.key}: ${data.msg}</span>
                            </div>`;
                    } else {
                        db.ref('delivery_activity/' + child.key).remove();
                    }
                });
            });
        }

        /* --- POIN 8 & 9: CRUD & IMAGE --- */
        function compressImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 600;
                        const scale = MAX / img.width;
                        canvas.width = MAX;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('imgPrev').src = photoBase64;
                        document.getElementById('imgPrev').classList.remove('hidden');
                        document.getElementById('btnRemovePhoto').classList.remove('hidden');
                        document.getElementById('photoStatus').innerText = "FOTO BERHASIL DIUNGGAH";
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            photoBase64 = "";
            document.getElementById('imgPrev').classList.add('hidden');
            document.getElementById('btnRemovePhoto').classList.add('hidden');
            document.getElementById('photoStatus').innerText = "Klik untuk Foto Rumah";
            document.getElementById('housePhoto').value = "";
        }

        function saveData() {
            const area = document.getElementById('custArea').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const maps = document.getElementById('custMaps').value;
            const editId = document.getElementById('editId').value;

            if(!area || !name) return alert("Area & Nama wajib diisi!");

            const data = {
                area: area.toUpperCase(),
                name: name.toUpperCase(),
                phone: phone,
                maps: maps,
                photo: photoBase64,
                status: 'active',
                timestamp: Date.now()
            };

            if(editId) {
                db.ref('customers/' + editId).update(data).then(() => resetForm());
            } else {
                db.ref('customers').push(data).then(() => resetForm());
            }
        }

        function editData(id) {
            const i = allData[id];
            document.getElementById('editId').value = id;
            document.getElementById('custArea').value = i.area;
            document.getElementById('custName').value = i.name;
            document.getElementById('custPhone').value = i.phone;
            document.getElementById('custMaps').value = i.maps;
            if(i.photo) {
                photoBase64 = i.photo;
                document.getElementById('imgPrev').src = i.photo;
                document.getElementById('imgPrev').classList.remove('hidden');
                document.getElementById('btnRemovePhoto').classList.remove('hidden');
            }
            document.getElementById('formTitle').innerText = "EDIT DATA CUSTOMER";
            document.getElementById('cancelBtn').classList.remove('hidden');
            showPage('add');
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('custArea').value = "";
            document.getElementById('custName').value = "";
            document.getElementById('custPhone').value = "";
            document.getElementById('custMaps').value = "";
            removePhoto();
            document.getElementById('formTitle').innerText = "TAMBAH DATA CUSTOMER";
            document.getElementById('cancelBtn').classList.add('hidden');
            showPage('list');
        }

        /* --- POIN 6 & 7: RENDER & HISTORY --- */
        function render() {
            const list = document.getElementById('activeList');
            const hist = document.getElementById('historyList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            list.innerHTML = "";
            hist.innerHTML = "";
            let activeCounter = 0;

            Object.keys(allData).reverse().forEach(id => {
                const item = allData[id];
                const searchStr = `${item.name} ${item.phone} ${item.area}`.toLowerCase();
                if(item.status !== 'done') activeCounter++;

                const isMatch = searchStr.includes(query);
                const card = createCard(id, item);

                if(item.status === 'done') {
                    hist.innerHTML += card;
                } else if(isMatch) {
                    list.innerHTML += card;
                    // Poin 13: QR System
                    if(item.maps) {
                        setTimeout(() => {
                            const qrel = document.getElementById(`qr-${id}`);
                            if(qrel && qrel.innerHTML === "") {
                                new QRCode(qrel, { text: item.maps, width: 50, height: 50, colorDark: "#006491" });
                            }
                        }, 100);
                    }
                }
            });
            document.getElementById('countActive').innerText = `${activeCounter} AKTIF`;
        }

        function createCard(id, item) {
            const isDone = item.status === 'done';
            return `
                <div class="bg-white rounded-3xl p-5 shadow-sm border-l-[10px] ${isDone ? 'border-gray-300' : 'border-red-500'} relative overflow-hidden">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <span class="text-[8px] font-black text-red-500 italic uppercase">${item.area}</span>
                            <h3 class="font-black text-blue-900 text-sm leading-tight">${item.name}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <p id="timer-${id}" class="text-[10px] font-bold ${isDone ? 'text-gray-300' : 'text-gray-400'} italic">
                                    ${isDone ? 'COMPLETED' : 'READY TO GO'}
                                </p>
                                ${item.driverBy ? `<span class="bg-blue-50 text-blue-800 text-[8px] font-black px-2 py-0.5 rounded border border-blue-200 uppercase">${item.driverBy}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-1">
                            ${!isDone ? `
                                <button onclick="editData('${id}')" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center active:scale-90"><i class="fa fa-edit text-xs"></i></button>
                                <button onclick="deleteData('${id}')" class="w-8 h-8 bg-red-50 text-red-600 rounded-xl flex items-center justify-center active:scale-90"><i class="fa fa-trash text-xs"></i></button>
                            ` : `
                                <button onclick="updateStatus('${id}', 'active')" class="w-8 h-8 bg-gray-100 text-gray-400 rounded-xl flex items-center justify-center"><i class="fa fa-undo text-xs"></i></button>
                            `}
                        </div>
                    </div>

                    ${!isDone ? `
                        <div class="flex gap-3 mb-4">
                            ${item.maps ? `<div class="bg-gray-50 p-2 rounded-xl border border-gray-100 flex flex-col items-center justify-center" onclick="zoomQR('${id}')"><div id="qr-${id}"></div><span class="text-[6px] font-black mt-1 uppercase">Zoom QR</span></div>` : ''}
                            ${item.photo ? `<img src="${item.photo}" onclick="openModal('${item.photo}', 'FOTO RUMAH: ${item.name}')" class="flex-1 h-20 object-cover rounded-2xl border-2 border-gray-50 shadow-sm">` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="updateStatus('${id}', 'done')" class="bg-yellow-400 text-white font-black py-3 px-4 rounded-2xl text-[10px] uppercase shadow-md active:scale-95"><i class="fa fa-check mr-1"></i> Selesai</button>
                            <button onclick="startOTW('${id}')" class="flex-1 ${item.status === 'otw' ? 'bg-gray-200 text-gray-500' : 'dominos-blue text-white shadow-blue-200'} font-black py-3 rounded-2xl text-[10px] uppercase shadow-lg active:scale-95"><i class="fa fa-motorcycle mr-1"></i> OTW</button>
                            <button onclick="whatsappDirect('${item.phone}', '${item.name}')" class="bg-green-500 text-white font-black py-3 px-5 rounded-2xl text-[10px] uppercase shadow-md active:scale-95"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    ` : ''}
                </div>`;
        }

        function deleteData(id) {
            const pin = prompt("PIN KONFIRMASI:");
            if(pin === userPins[currentUser]) {
                db.ref('customers/' + id).remove();
            } else if(pin !== null) {
                alert("PIN SALAH!");
            }
        }

        function clearHistory() {
            if(confirm("Hapus permanen semua history selesai?")) {
                Object.keys(allData).forEach(id => {
                    if(allData[id].status === 'done') db.ref('customers/' + id).remove();
                });
            }
        }

        /* --- POIN 10, 11, 12: SCANNER & OCR --- */
        async function initOCR() {
            if (!ocrWorker) {
                document.getElementById('ocrLoader').classList.remove('hidden');
                document.getElementById('ocrStatusText').innerText = "Menyiapkan Mesin...";
                ocrWorker = await Tesseract.createWorker('eng');
                document.getElementById('ocrLoader').classList.add('hidden');
            }
        }

        async function toggleCamera(on) {
            const video = document.getElementById('scannerVideo');
            const overlay = document.getElementById('scannerOverlay');
            if(on) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment", width: { ideal: 1280 } } 
                    });
                    video.srcObject = stream;
                    overlay.classList.remove('hidden');
                    document.getElementById('btnStartCam').classList.add('hidden');
                    document.getElementById('btnStopCam').classList.remove('hidden');
                    document.getElementById('camControls').classList.remove('hidden');
                    initOCR();
                } catch(e) { alert("Akses kamera ditolak."); }
            } else {
                if(stream) stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;
                overlay.classList.add('hidden');
                document.getElementById('btnStartCam').classList.remove('hidden');
                document.getElementById('btnStopCam').classList.add('hidden');
                document.getElementById('camControls').classList.add('hidden');
            }
        }

        function setBW(mode) {
            activeBW = mode;
            document.querySelectorAll('.bw-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('bw-'+mode).classList.add('active');
            document.getElementById('manualVisuals').classList.toggle('hidden', mode !== 'manual');
            applyFilters();
        }

        function applyFilters() {
            const video = document.getElementById('scannerVideo');
            if(activeBW === 'manual') {
                const br = document.getElementById('brRange').value;
                const ct = document.getElementById('ctRange').value;
                video.style.filter = `grayscale(100%) brightness(${br}%) contrast(${ct}%)`;
            } else if(activeBW === 'auto') {
                video.style.filter = `grayscale(100%) contrast(150%)`;
            } else {
                video.style.filter = `none`;
            }
        }

        function setZoom(lvl) {
            const track = stream?.getVideoTracks()[0];
            if(track) {
                const caps = track.getCapabilities();
                if(caps.zoom) track.applyConstraints({ advanced: [{ zoom: lvl }] });
                document.querySelectorAll('.z-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('z'+lvl).classList.add('active');
            }
        }

        async function runOCR() {
            if(!stream) return alert("Buka kamera dulu!");
            await initOCR();
            
            const loader = document.getElementById('ocrLoader');
            loader.classList.remove('hidden');
            document.getElementById('ocrStatusText').innerText = "Memproses Gambar...";

            const canvas = document.createElement('canvas');
            const video = document.getElementById('scannerVideo');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.filter = video.style.filter;
            ctx.drawImage(video, 0, 0);

            try {
                const { data: { text } } = await ocrWorker.recognize(canvas.toDataURL('image/jpeg', 0.8));
                const matches = text.match(/(?:\+62|62|08)[0-9]{8,13}/g);
                
                if(matches) {
                    const unique = [...new Set(matches)];
                    const body = document.getElementById('ocrTableBody');
                    body.innerHTML = "";
                    unique.forEach(num => {
                        body.innerHTML += `
                            <tr class="animate-pulse">
                                <td class="p-4 text-blue-900 font-black">${num}</td>
                                <td class="p-4 text-right">
                                    <button onclick="fillAndChat('${num}')" class="bg-green-500 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-md">
                                        <i class="fab fa-whatsapp"></i>
                                    </button>
                                </td>
                            </tr>`;
                    });
                    document.getElementById('scanResultArea').classList.remove('hidden');
                    document.getElementById('manualWA').value = unique[0];
                    if(navigator.vibrate) navigator.vibrate(100);
                } else {
                    alert("Nomor tidak terdeteksi. Pastikan cahaya cukup.");
                }
            } catch(e) { alert("OCR Gagal."); }
            loader.classList.add('hidden');
        }

        function fillAndChat(num) {
            document.getElementById('manualWA').value = num;
            manualChat();
        }

        /* --- POIN 12: WHATSAPP DIRECT --- */
        function whatsappDirect(phone, name) {
            pushActivity(`MENGANTAR KE ${name}`);
            let clean = phone.replace(/\D/g, '');
            if(clean.startsWith('0')) clean = '62' + clean.slice(1);
            const msg = `Halo Bapak/Ibu ${name}, saya ${currentUser} dari Domino's Pizza Jatimakmur sedang mengantarkan pesanan Anda. Mohon standby ya, terima kasih.`;
            window.open(`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function manualChat() {
            const num = document.getElementById('manualWA').value;
            if(!num) return alert("Masukkan Nomor!");
            
            // Cek apakah nomor ada di list aktif (Poin 12 Integrasi)
            const searchNum = num.slice(-5);
            const activeMatch = Object.keys(allData).find(id => 
                allData[id].status !== 'done' && allData[id].phone.includes(searchNum)
            );

            if(activeMatch) {
                document.getElementById('searchInput').value = allData[activeMatch].phone;
                render();
                showPage('list');
            } else {
                whatsappDirect(num, "Bapak/Ibu");
            }
        }

        /* --- POIN 5 & 20: TIMER & UTILS --- */
        function updateGlobalTimers() {
            Object.keys(allData).forEach(id => {
                if(allData[id].status === 'otw') {
                    const elapsed = Math.floor((Date.now() - allData[id].startTime) / 1000);
                    const limit = 20 * 60;
                    const remaining = limit - elapsed;
                    const el = document.getElementById('timer-' + id);
                    if(el) {
                        const m = Math.max(0, Math.floor(remaining / 60));
                        const s = Math.max(0, remaining % 60);
                        el.innerText = `${m}:${s < 10 ? '0'+s : s} MENIT`;
                        if(remaining < 0) el.className = "text-[10px] font-black text-red-600 italic animate-bounce";
                        else el.className = "text-[10px] font-black text-blue-500 italic";
                    }
                }
            });
        }

        function startOTW(id) {
            if(allData[id].status !== 'otw') {
                db.ref('customers/' + id).update({
                    status: 'otw',
                    startTime: Date.now(),
                    driverBy: currentUser
                });
                pushActivity(`OTW ANTAR ${allData[id].name}`);
            }
        }

        function updateStatus(id, stat) {
            db.ref('customers/' + id).update({ status: stat });
            if(stat === 'done') pushActivity(`SELESAI ANTAR ${allData[id].name}`);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id)?.classList.add('active');
            if(id !== 'chat') toggleCamera(false);
        }

        function openModal(url, cap) {
            const m = document.getElementById('imgModal');
            document.getElementById('fullImg').src = url;
            document.getElementById('modalCaption').innerText = cap;
            m.style.display = 'flex';
        }

        function zoomQR(id) {
            const canvas = document.querySelector(`#qr-${id} canvas`);
            if(canvas) openModal(canvas.toDataURL(), "SCAN LOKASI PELANGGAN");
        }
    </script>
</body>
</html>
