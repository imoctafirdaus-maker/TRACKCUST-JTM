<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JTM Track Pro - Full Features</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; position: relative; width: 20%; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 55px !important; height: 55px; border-radius: 50%; margin-top: -30px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        .page { display: none; height: 100%; } .page.active { display: flex; flex-direction: column; }
        .online-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .chat-container { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; margin-bottom: 5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; }
        .bubble.left { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .bubble.right { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        #chatBadge { position: absolute; top: -2px; right: 18px; width: 10px; height: 10px; background: #e31837; border-radius: 50%; border: 2px solid white; display: none; z-index: 50; }
        .btn-action { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden" onclick="initAudio()">

    <nav class="dominos-blue p-4 text-white shadow-md">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <button onclick="openProfile()" id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-md h-7 flex items-center">Pilih Nama</button>
                <button onclick="location.reload()" class="bg-red-500 text-white w-7 h-7 rounded-full shadow-md flex items-center justify-center active:scale-90"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </div>
        <div id="onlineList" class="flex gap-2 overflow-x-auto py-1 text-[9px] font-bold"></div>
    </nav>

    <main class="flex-1 overflow-hidden relative">
        <div id="page-search" class="page active p-4 overflow-y-auto space-y-4">
            <input type="text" id="searchInput" onkeyup="render(allData, this.value.toLowerCase())" placeholder="Cari..." class="w-full p-4 rounded-2xl shadow-sm text-sm font-bold bg-white italic outline-none">
            <div id="activeList" class="space-y-4 pb-32"></div>
        </div>

        <div id="page-add" class="page p-4 overflow-y-auto">
            <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-4">
                <h2 class="font-black text-blue-900 text-xs uppercase italic text-center">Input Antaran</h2>
                <input type="text" id="custArea" placeholder="Area" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold outline-none uppercase">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="custName" placeholder="Nama" class="bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <select id="driverName" class="bg-blue-50 p-4 rounded-xl text-sm font-bold text-blue-900 outline-none uppercase"></select>
                </div>
                <input type="tel" id="custPhone" placeholder="Nomor WA (08...)" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                <input type="text" id="custMaps" placeholder="Link Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                <button onclick="saveData()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">Simpan</button>
            </div>
        </div>

        <div id="page-history" class="page p-4 overflow-y-auto space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-gray-400 font-black text-[10px] uppercase italic">History Done</h2>
                <button onclick="clearHistory()" class="text-red-500 font-black text-[10px] uppercase underline">Hapus</button>
            </div>
            <div id="historyList" class="space-y-2 pb-32"></div>
        </div>

        <div id="page-chat" class="page overflow-hidden">
            <div id="chatDisplay" class="chat-container p-4"></div>
            <div class="bg-[#f0f0f0] p-2 flex gap-2 items-center border-t pb-24">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 bg-white rounded-full px-4 py-2 text-sm outline-none shadow-sm font-bold">
                <button onclick="sendChat()" class="bg-[#075e54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fa fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </main>

    <div class="bottom-nav">
        <button onclick="showPage('search')" id="nav-search" class="nav-item active"><i class="fa fa-list-ul mb-1 text-xl"></i><span>List</span></button>
        <button onclick="showPage('history')" id="nav-history" class="nav-item"><i class="fa fa-clock-rotate-left mb-1 text-xl"></i><span>History</span></button>
        <button onclick="showPage('add')" id="nav-add" class="nav-item nav-add"><i class="fa fa-plus text-2xl"></i></button>
        <button onclick="showPage('chat')" id="nav-chat" class="nav-item"><div id="chatBadge"></div><i class="fa fa-comments mb-1 text-xl"></i><span>Chat</span></button>
        <button onclick="openProfile()" class="nav-item"><i class="fa fa-user-gear mb-1 text-xl"></i><span>User</span></button>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/90 z-[2000] flex items-center justify-center hidden p-8">
        <div class="bg-white w-full rounded-[2.5rem] p-6 max-h-[80vh] overflow-y-auto text-center">
            <h2 class="font-black text-blue-900 mb-6 italic uppercase text-sm">Pilih Petugas</h2>
            <div id="crewOptions"></div>
            <button onclick="closeProfile()" class="mt-4 w-full p-3 bg-gray-100 text-gray-500 rounded-2xl font-black text-[10px] uppercase">Batal</button>
        </div>
    </div>

    <script>
        const MASTER_PIN = "0972"; 
        const userPins = { 
            "PAK KUR (MANAGEMENT)": "0000", "PAK AGUS (MANAGEMENT)": "6413", "PAK AGENG (MANAGEMENT)": "4444",
            "SINTIYA (KASIR)": "0959", "RIDHA (KASIR)": "0968",
            "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967", "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Acong": "0929"
        };

        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", authDomain: "trackcust-jtm.firebaseapp.com", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm", storageBucket: "trackcust-jtm.firebasestorage.app", messagingSenderId: "411585432172", appId: "1:411585432172:web:2d9ae1655d4e3073e4a649" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; let firstLoad = true; let audioCtx = null;

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
        function playBeep(type) { if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain(); osc.connect(gn); gn.connect(audioCtx.destination); if(type==='chat') osc.frequency.setValueAtTime(1500, audioCtx.currentTime); else osc.frequency.setValueAtTime(880, audioCtx.currentTime); gn.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime+0.2); }

        window.onload = () => {
            const drvSel = document.getElementById('driverName'); drvSel.innerHTML = '<option value="">PILIH DRIVER</option>';
            ["Okta","Dendy","Arif","Rian","Gemilang","Sadewa","Fahran","Rafli","Acong"].forEach(d => drvSel.innerHTML += `<option value="${d}">${d}</option>`);
            const optCont = document.getElementById('crewOptions');
            Object.keys(userPins).forEach(n => {
                let color = n.includes("MANAGEMENT") ? "text-red-600 bg-red-50 font-black" : (n.includes("KASIR") ? "text-blue-600 bg-blue-50 font-black" : "text-gray-800");
                optCont.innerHTML += `<button onclick="handleLogin('${n}')" class="w-full p-4 text-center text-[10px] uppercase border-b mb-1 rounded-xl ${color}">${n}</button>`;
            });
            if(!currentUser) openProfile(); else setUser(currentUser);
        };

        function handleLogin(n) { const p = prompt(`PIN ${n}:`); if(p===userPins[n]) { initAudio(); setUser(n); } else alert("PIN SALAH!"); }
        function setUser(n) { currentUser = n; localStorage.setItem('jtm_user', n); document.getElementById('userDisplay').innerText = n; closeProfile(); db.ref('presence/'+n).set({status:'online'}); db.ref('presence/'+n).onDisconnect().remove(); }
        function openProfile() { document.getElementById('profileModal').classList.remove('hidden'); }
        function closeProfile() { if(currentUser) document.getElementById('profileModal').classList.add('hidden'); }

        db.ref('presence').on('value', s => { const l = document.getElementById('onlineList'); l.innerHTML = ""; Object.keys(s.val()||{}).forEach(u => l.innerHTML += `<span class="whitespace-nowrap"><span class="online-dot"></span>${u}</span>`); });
        db.ref('chats').limitToLast(1).on('child_added', snap => { if(!firstLoad && snap.val().user !== currentUser) { document.getElementById('chatBadge').style.display='block'; playBeep('chat'); } });
        db.ref().on('value', s => { allData = s.val().customers || {}; render(allData); firstLoad = false; });

        function render(data, filter = "") {
            const act = document.getElementById('activeList'); const hist = document.getElementById('historyList');
            act.innerHTML = ""; hist.innerHTML = "";
            Object.keys(data).sort((a,b) => (data[b].time||0)-(data[a].time||0)).forEach(k => {
                const i = data[k]; if(!i.name || !i.name.toLowerCase().includes(filter)) return;
                const isD = i.status === 'done';
                // AUTO TEXT WA LOGIC
                const waMsg = `Halo Bapak/Ibu ${i.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar ya, mohon ditunggu. Terimakasih ☺️`;
                const html = `
                    <div class="bg-white rounded-[1.5rem] p-5 shadow-sm border-l-[10px] ${isD?'border-gray-200':'border-red-500'} mb-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[9px] font-black text-red-500 italic uppercase">${i.area||'AREA'}</p>
                                <h3 class="font-black text-blue-900 text-xs">${i.name}</h3>
                                <p class="text-[9px] font-bold text-gray-400 italic">🛵 ${i.driver||'--'} | 📱 ${i.phone}</p>
                            </div>
                            <div class="flex gap-2">
                                ${!isD ? `<button onclick="setStatus('${k}','done')" class="btn-action bg-yellow-400 text-white"><i class="fa fa-check"></i></button>` : `<button onclick="setStatus('${k}','active')" class="bg-blue-400 text-white p-2 rounded-xl text-[9px]">UNDO</button>`}
                            </div>
                        </div>
                        ${!isD ? `<div class="flex gap-2 mt-3">
                            <a href="${i.maps}" target="_blank" class="flex-1 dominos-blue text-white py-3 rounded-xl text-center font-black text-[10px]">MAPS</a>
                            <a href="https://wa.me/${i.phone.startsWith('0')?'62'+i.phone.slice(1):i.phone}?text=${encodeURIComponent(waMsg)}" target="_blank" class="flex-1 bg-green-500 text-white py-3 rounded-xl text-center font-black text-[10px]">WA</a>
                        </div>` : ''}
                    </div>`;
                if(isD) hist.innerHTML += html; else act.innerHTML += html;
            });
        }

        function setStatus(k, s) { db.ref('customers/'+k).update({status:s}); if(s==='done') playBeep('done'); }
        function saveData() { 
            const d = { area: document.getElementById('custArea').value, name: document.getElementById('custName').value, driver: document.getElementById('driverName').value, phone: document.getElementById('custPhone').value, maps: document.getElementById('custMaps').value, status: 'active', time: Date.now() };
            db.ref('customers').push(d); showPage('search'); 
        }
        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); if(id==='chat') document.getElementById('chatBadge').style.display='none'; }
    </script>
</body>
</html>
