<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        #map { height: 100%; width: 100%; z-index: 1; background: #f1f5f9; }

        /* Animasi Kedap Kedip */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .blink-status { animation: blink 1s infinite; }

        .status-item { padding: 6px 12px; background: #fff5f5; border-left: 4px solid #e31837; border-bottom: 1px solid #f1f5f9; }
        
        .scanner-container { position: relative; width: 100%; height: 200px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; border: 30px solid rgba(0,0,0,0.5); pointer-events: none; display: none; }
        .scanner-box { width: 100%; height: 100%; border: 2px solid #e31837; position: relative; }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>
        
        <div id="deliveryStatusBar" class="bg-white flex flex-col text-[10px] font-black text-red-600 uppercase italic"></div>
        <div id="onlineBar" class="bg-blue-900/10 px-4 py-1 flex gap-2 overflow-x-auto text-[8px] font-black text-blue-900 uppercase italic border-b border-blue-100"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Nama/HP/Area..." class="w-2/3 p-3 rounded-xl shadow-sm outline-none font-bold italic text-sm">
                    <div id="countActive" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black italic">0 AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-maps" class="page">
                <div id="map"></div>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-3">
                    <h2 id="formTitle" class="font-black text-blue-900 text-center uppercase text-xs">Tambah Antaran</h2>
                    <input type="text" id="custArea" placeholder="KODE AREA (A-1)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold uppercase outline-none">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    <div class="bg-blue-50 p-4 rounded-xl border-2 border-dashed border-blue-200 text-center relative">
                        <label class="cursor-pointer">
                            <i class="fa fa-camera text-blue-400 text-xl"></i>
                            <p class="text-[9px] font-black text-blue-900 uppercase mt-1">Foto Rumah</p>
                            <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="processImage(this)">
                        </label>
                        <img id="imgPrev" class="hidden w-full h-32 object-cover rounded-lg mt-2 border-2 border-white">
                    </div>
                    <button onclick="saveData()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm">Simpan</button>
                </div>
            </div>

            <div id="page-chat" class="page items-center p-4 bg-gray-100 overflow-y-auto">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl w-full max-w-sm text-center mb-20">
                    <i class="fab fa-whatsapp text-green-500 text-4xl mb-2"></i>
                    <h2 class="font-black text-blue-900 uppercase text-[12px] mb-4">Scanner & WA Direct</h2>
                    <div class="scanner-container">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="scanner-overlay"><div class="scanner-box"><div class="laser"></div></div></div>
                    </div>
                    <div class="flex gap-2 mb-3">
                        <button onclick="startCamera()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[9px]">Buka Kamera</button>
                        <button onclick="captureAndScan()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[9px]">Scan Nomor</button>
                    </div>
                    <input type="tel" id="waDirectNumber" placeholder="Nomor HP Manual" class="w-full p-3 bg-gray-50 rounded-xl border-2 text-center font-black text-blue-900 text-sm mb-3">
                    <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-3 rounded-xl font-black uppercase text-xs">Chat Pelanggan</button>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="showPage('maps')" class="nav-item" id="nav-maps"><i class="fa fa-map-marked-alt mb-1 text-xl"></i><span>Peta JTM</span></div>
            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>Chat WA</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl text-red-500"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        const userPins = { 
            "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Pak Ageng (Mgt)": "4444",
            "Sintiya (Cashier)": "0959", "Ridha (Cashier)": "0968", "Okta": "0972", 
            "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967",
            "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Rafli ramadhan": "0929"
        };
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; let photoBase64 = "";
        let stream = null; let map, markers = {};
        const jtmLocation = [-6.2848, 106.9284];

        window.onload = () => {
            const logSel = document.getElementById('selectUser');
            logSel.innerHTML = '<option value="">-- PILIH NAMA --</option>';
            Object.keys(userPins).forEach(n => logSel.innerHTML += `<option value="${n}">${n}</option>`);
            if(currentUser) bukaApp(currentUser);
            setInterval(updateTimers, 1000);
            initMap();
            startDeliveryStatusListener();
        };

        function initMap() {
            map = L.map('map').setView(jtmLocation, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker(jtmLocation).addTo(map).bindPopup("<b>Domino's Jatimakmur</b>").openPopup();
            
            db.ref('tracking').on('value', s => {
                const trackers = s.val(); const now = Date.now();
                Object.values(markers).forEach(m => map.removeLayer(m));
                markers = {};
                if (trackers) {
                    Object.keys(trackers).forEach(name => {
                        const data = trackers[name];
                        if (now < data.expiry) {
                            markers[name] = L.marker([data.lat, data.lng]).addTo(map)
                                .bindPopup(`<b class="blink-status">DRIVER: ${name} (OTW)</b>`);
                        } else { db.ref('tracking/' + name).remove(); }
                    });
                }
            });
        }

        function activateTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                db.ref('tracking/' + currentUser).set({
                    lat: pos.coords.latitude, lng: pos.coords.longitude,
                    expiry: Date.now() + (15 * 60 * 1000)
                });
            }, null, { enableHighAccuracy: true });
        }

        function pushDeliveryStatus(nama) {
            db.ref('delivery_activity/' + nama).set({ name: nama, timestamp: Date.now() });
            activateTracking();
        }

        function startDeliveryStatusListener() {
            db.ref('delivery_activity').on('value', s => {
                const bar = document.getElementById('deliveryStatusBar');
                bar.innerHTML = ""; let hasData = false;
                s.forEach(child => {
                    const data = child.val();
                    if (Date.now() - data.timestamp > 900000) { db.ref('delivery_activity/' + child.key).remove(); }
                    else { 
                        hasData = true; 
                        bar.innerHTML += `
                        <div class="status-item blink-status">
                            <i class="fa fa-motorcycle mr-2"></i> ${data.name} SEDANG MENGANTAR...
                        </div>`; 
                    }
                });
                bar.style.display = hasData ? "block" : "none";
            });
        }

        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(p === userPins[u]) bukaApp(u); else alert("PIN SALAH!");
        }

        function bukaApp(n) {
            currentUser = n; localStorage.setItem('jtm_user', n);
            document.getElementById('userDisplay').innerText = n;
            document.getElementById('pinOverlay').style.display = "none";
            document.getElementById('mainContent').style.display = "flex";
            db.ref('presence/' + n).set(true); db.ref('presence/' + n).onDisconnect().remove();
            db.ref('customers').on('value', s => { allData = s.val() || {}; render(); });
            db.ref('presence').on('value', s => {
                const el = document.getElementById('onlineBar'); el.innerHTML = "";
                s.forEach(u => el.innerHTML += `<span class="flex items-center gap-1"><i class="fa fa-circle text-[6px] text-green-500"></i> ${u.key}</span>`);
            });
        }

        function handleLogout() { if(confirm("Keluar dari sistem?")) { db.ref('presence/'+currentUser).remove(); localStorage.removeItem('jtm_user'); location.reload(); } }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
            if(p === 'maps' && map) setTimeout(() => map.invalidateSize(), 300);
            if(p !== 'chat') stopCamera();
        }

        // SCANNER & DATA
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('scannerVideo').srcObject = stream;
                document.getElementById('scannerOverlay').style.display = 'block';
            } catch (err) { alert("Kamera error"); }
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('scannerVideo').srcObject = null;
            document.getElementById('scannerOverlay').style.display = 'none';
        }

        async function captureAndScan() {
            const video = document.getElementById('scannerVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.filter = 'grayscale(100%) contrast(200%)';
            ctx.drawImage(video, 0, 0);
            const result = await Tesseract.recognize(canvas.toDataURL(), 'eng');
            const matches = result.data.text.match(/(?:\+62|62|08)[0-9\s-]{8,15}/g);
            if(matches) { document.getElementById('waDirectNumber').value = matches[0].replace(/\D/g, ''); alert("Nomor Terbaca!"); }
        }

        function render() {
            const list = document.getElementById('activeList'); 
            const filter = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = ""; let count = 0;
            Object.keys(allData).reverse().forEach(id => {
                const i = allData[id]; 
                if(i.status === 'done') return; // Sembunyikan yang sudah done (History dihapus)
                const searchStr = `${i.name} ${i.phone} ${i.area}`.toLowerCase();
                if(!searchStr.includes(filter)) return;
                count++;
                list.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border-l-8 border-red-500">
                        <div class="flex justify-between">
                            <div><p class="text-[8px] font-black text-red-500 uppercase">${i.area}</p><h3 class="font-black text-blue-900">${i.name}</h3>
                            <p id="timer-${id}" class="text-[9px] font-bold text-gray-400">READY</p></div>
                            <div class="flex gap-2">
                                <button onclick="goOTW('${id}')" class="w-8 h-8 rounded-lg bg-blue-500 text-white shadow-md"><i class="fa fa-motorcycle"></i></button>
                                <button onclick="setStatus('${id}','done')" class="w-8 h-8 rounded-lg bg-yellow-400 text-white shadow-md"><i class="fa fa-check"></i></button>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <a href="${i.maps}" target="_blank" class="bg-blue-900 text-white py-2 rounded flex-1 text-center text-[9px] font-black uppercase italic"><i class="fa fa-map-marker-alt mr-1"></i> Buka Maps</a>
                            <button onclick="openWaLinkCustom('${i.phone}')" class="bg-green-500 text-white py-2 rounded flex-1 text-center text-[9px] font-black uppercase italic"><i class="fab fa-whatsapp mr-1"></i> Chat WA</button>
                        </div>
                    </div>`;
            });
            document.getElementById('countActive').innerText = `${count} AKTIF`;
        }

        function openWaLinkCustom(num) {
            pushDeliveryStatus(currentUser);
            let waNum = num.replace(/\D/g, ''); if(waNum.startsWith('0')) waNum = '62' + waNum.slice(1);
            const msg = `Halo Bapak/Ibu, saya ${currentUser} dari Domino's Jatimakmur...`;
            window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function openWaDirect() { openWaLinkCustom(document.getElementById('waDirectNumber').value); }
        function goOTW(id) { db.ref('customers/'+id).update({ status: 'otw', startTime: Date.now(), driverBy: currentUser }); pushDeliveryStatus(currentUser); }
        function setStatus(id, s) { if(confirm("Pesanan Selesai?")) db.ref('customers/'+id).update({ status: s }); }
        
        function processImage(input) {
            const reader = new FileReader();
            reader.onload = e => { photoBase64 = e.target.result; document.getElementById('imgPrev').src = photoBase64; document.getElementById('imgPrev').classList.remove('hidden'); };
            reader.readAsDataURL(input.files[0]);
        }

        function saveData() {
            const data = { 
                area: document.getElementById('custArea').value.toUpperCase(),
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                maps: document.getElementById('custMaps').value,
                photo: photoBase64, status: 'active', timestamp: Date.now() 
            };
            db.ref('customers').push(data).then(() => { 
                document.getElementById('custArea').value = ""; document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = ""; document.getElementById('custMaps').value = "";
                photoBase64 = ""; document.getElementById('imgPrev').classList.add('hidden');
                showPage('list');
            });
        }

        function updateTimers() {
            Object.keys(allData).forEach(id => {
                if(allData[id].status === 'otw') {
                    const diff = Math.floor((Date.now() - allData[id].startTime) / 1000);
                    const el = document.getElementById('timer-'+id);
                    if(el) { 
                        const m = Math.floor((1200 - diff) / 60); const s = (1200 - diff) % 60;
                        el.innerText = `${m}:${s < 10 ? '0'+s : s} MENIT`;
                        if(m < 0) el.className = "text-[9px] font-bold text-red-600";
                    }
                }
            });
        }
    </script>
</body>
</html>
