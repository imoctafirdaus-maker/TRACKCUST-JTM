<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JTM Track Pro - WA Voice Style</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 55px !important; height: 55px; border-radius: 50%; margin-top: -30px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        .page { display: none; height: 100%; } .page.active { display: flex; flex-direction: column; }
        
        /* CHAT STYLE */
        .chat-container { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; margin-bottom: 4px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .bubble.left { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .bubble.right { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        
        /* WA VOICE NOTE STYLE */
        .vn-container { display: flex; align-items: center; gap: 10px; min-width: 180px; padding: 5px 0; }
        .vn-play-btn { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; color: #54656f; font-size: 18px; }
        .vn-waveform { flex: 1; height: 3px; background: #cbd5e1; position: relative; border-radius: 2px; }
        .vn-progress { position: absolute; left: 0; top: 0; height: 100%; background: #34b7f1; width: 0%; border-radius: 2px; }
        .vn-mic-icon { color: #94a3b8; font-size: 16px; margin-left: auto; }
        
        .chat-footer { display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 2px; }
        .chat-time { font-size: 9px; color: #667781; }
        #chatBadge { position: absolute; top: -2px; right: 18px; width: 10px; height: 10px; background: #e31837; border-radius: 50%; border: 2px solid white; display: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden" onclick="initAudio()">

    <nav class="dominos-blue p-4 text-white shadow-md">
        <div class="flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <button onclick="openProfile()" id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">Pilih Nama</button>
        </div>
    </nav>

    <main class="flex-1 overflow-hidden relative">
        <div id="page-search" class="page active p-4 overflow-y-auto space-y-4">
            <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/HP/Driver..." class="w-full p-4 rounded-2xl shadow-sm outline-none font-bold italic bg-white">
            <div id="activeList" class="pb-32"></div>
        </div>

        <div id="page-chat" class="page overflow-hidden">
            <div id="chatDisplay" class="chat-container p-4"></div>
            <div class="bg-[#f0f0f0] p-2 flex gap-2 items-center border-t pb-24">
                <button id="micBtn" onclick="toggleRecording()" class="w-10 h-10 flex items-center justify-center text-gray-500"><i class="fa fa-microphone text-xl"></i></button>
                <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 bg-white rounded-full px-4 py-2 text-sm outline-none">
                <button onclick="sendChat()" class="bg-[#075e54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fa fa-paper-plane text-xs"></i></button>
            </div>
        </div>

        <div id="page-add" class="page p-4">
            <div class="bg-white rounded-3xl p-6 shadow-xl space-y-4">
                <input type="hidden" id="editKey">
                <input type="text" id="custArea" placeholder="Area" class="w-full bg-gray-50 p-4 rounded-xl font-bold uppercase outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="custName" placeholder="Nama" class="bg-gray-50 p-4 rounded-xl font-bold outline-none">
                    <select id="driverName" class="bg-blue-50 p-4 rounded-xl font-bold outline-none uppercase"></select>
                </div>
                <input type="tel" id="custPhone" placeholder="Nomor WA" class="w-full bg-gray-50 p-4 rounded-xl font-bold outline-none">
                <input type="text" id="custMaps" placeholder="Link Maps" class="w-full bg-gray-50 p-4 rounded-xl outline-none">
                <button onclick="checkBeforeSave()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase">Simpan</button>
            </div>
        </div>

        <div id="page-history" class="page p-4 overflow-y-auto">
            <div id="historyList" class="pb-32"></div>
        </div>
    </main>

    <div class="bottom-nav">
        <button onclick="showPage('search')" id="nav-search" class="nav-item active"><i class="fa fa-list-ul mb-1 text-xl"></i><span>List</span></button>
        <button onclick="showPage('history')" id="nav-history" class="nav-item"><i class="fa fa-clock-rotate-left mb-1 text-xl"></i><span>History</span></button>
        <button onclick="showPage('add')" id="nav-add" class="nav-item nav-add"><i class="fa fa-plus text-2xl"></i></button>
        <button onclick="showPage('chat')" id="nav-chat" class="nav-item"><div id="chatBadge"></div><i class="fa fa-comments mb-1 text-xl"></i><span>Chat</span></button>
        <button onclick="openProfile()" class="nav-item"><i class="fa fa-user-gear mb-1 text-xl"></i><span>User</span></button>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/80 z-[2000] flex items-center justify-center hidden p-8">
        <div class="bg-white w-full rounded-3xl p-6 max-h-[70vh] overflow-y-auto text-center">
            <h2 class="font-black mb-4 uppercase">Pilih Petugas</h2>
            <div id="crewOptions"></div>
        </div>
    </div>

    <script>
        const MASTER_PIN = "0972";
        const userPins = { "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967", "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Acong": "0929", "Pak KUR": "0000", "Pak Agus": "6413", "Pak Ageng": "4444", "Sintiya": "0959", "Ridha": "0968" };
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", authDomain: "trackcust-jtm.firebaseapp.com", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm", storageBucket: "trackcust-jtm.firebasestorage.app", messagingSenderId: "411585432172", appId: "1:411585432172:web:2d9ae1655d4e3073e4a649" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let audioCtx, mediaRecorder, audioChunks = [];

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        // VOICE NOTE WA STYLE
        async function toggleRecording() {
            const btn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.start();
                btn.innerHTML = '<i class="fa fa-stop-circle text-red-600 text-2xl animate-pulse"></i>';
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = () => sendChat(reader.result, "voice");
                };
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            } else { mediaRecorder.stop(); btn.innerHTML = '<i class="fa fa-microphone text-xl text-gray-500"></i>'; }
        }

        function playVN(id, url) {
            const audio = new Audio(url);
            const playBtn = document.getElementById('btn-'+id);
            const progress = document.getElementById('prog-'+id);
            
            audio.play();
            playBtn.innerHTML = '<i class="fa fa-pause"></i>';
            audio.ontimeupdate = () => progress.style.width = (audio.currentTime / audio.duration * 100) + "%";
            audio.onended = () => { playBtn.innerHTML = '<i class="fa fa-play"></i>'; progress.style.width = "0%"; };
        }

        // CHAT RENDER
        db.ref('chats').limitToLast(20).on('value', s => {
            const d = document.getElementById('chatDisplay'); d.innerHTML = "";
            Object.keys(s.val()||{}).forEach(k => {
                const c = s.val()[k]; const isMe = c.user === currentUser;
                let content = `<span class="text-[13px] font-bold">${c.text}</span>`;
                
                if(c.type === "voice") {
                    content = `
                        <div class="vn-container">
                            <button id="btn-${k}" onclick="playVN('${k}', '${c.text}')" class="vn-play-btn"><i class="fa fa-play"></i></button>
                            <div class="vn-waveform"><div id="prog-${k}" class="vn-progress"></div></div>
                            <i class="fa fa-microphone vn-mic-icon"></i>
                        </div>`;
                }
                
                d.innerHTML += `
                    <div class="bubble ${isMe?'right':'left'}">
                        ${!isMe ? `<span class="text-[9px] font-black text-blue-900 block uppercase mb-1">${c.user}</span>` : ''}
                        ${content}
                        <div class="chat-footer"><span class="chat-time">${c.time}</span>${isMe?`<i class="fa fa-check-double ${c.seen?'text-blue-400':'text-gray-400'} text-[10px]"></i>`:''}</div>
                    </div>`;
            });
            d.scrollTop = d.scrollHeight;
        });

        // LOGIN & SYSTEM
        function handleLogin(n) { if(prompt(`PIN ${n}:`)===userPins[n]) { currentUser = n; localStorage.setItem('jtm_user', n); document.getElementById('userDisplay').innerText = n; document.getElementById('profileModal').classList.add('hidden'); } }
        function openProfile() { document.getElementById('profileModal').classList.remove('hidden'); }
        window.onload = () => {
            const opt = document.getElementById('crewOptions'); Object.keys(userPins).forEach(n => opt.innerHTML += `<button onclick="handleLogin('${n}')" class="w-full p-4 border-b font-bold uppercase">${n}</button>`);
            const drv = document.getElementById('driverName'); Object.keys(userPins).slice(0,9).forEach(n => drv.innerHTML += `<option value="${n}">${n}</option>`);
            if(!currentUser) openProfile(); else document.getElementById('userDisplay').innerText = currentUser;
        };

        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); document.getElementById('nav-'+id).classList.add('active'); }
        function sendChat(m, t="text") { const i = document.getElementById('chatInput'); const c = t==="text"?i.value:m; if(c){ db.ref('chats').push({user:currentUser, text:c, type:t, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), seen:false}); i.value=""; } }

        // RENDER ANTARAN
        db.ref('customers').on('value', s => {
            const act = document.getElementById('activeList'); act.innerHTML = "";
            Object.keys(s.val()||{}).forEach(k => {
                const i = s.val()[k]; if(i.status === 'done') return;
                const textWA = `Halo Bapak/Ibu ${i.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar ya, mohon ditunggu. Terimakasih ☺️`;
                act.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 mb-3">
                        <div class="flex justify-between">
                            <div><p class="text-[10px] font-black text-red-500 uppercase">${i.area}</p><h3 class="font-bold text-blue-900">${i.name}</h3></div>
                            <button onclick="db.ref('customers/${k}').update({status:'done'})" class="w-10 h-10 bg-yellow-400 text-white rounded-xl shadow-md"><i class="fa fa-check"></i></button>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <a href="${i.maps}" class="flex-1 bg-blue-900 text-white py-2 rounded-lg text-center text-[10px] font-bold">MAPS</a>
                            <a href="https://wa.me/${i.phone}?text=${window.encodeURIComponent(textWA)}" class="flex-1 bg-green-500 text-white py-2 rounded-lg text-center text-[10px] font-bold">WA</a>
                        </div>
                    </div>`;
            });
        });

        function checkBeforeSave() {
            const ph = document.getElementById('custPhone').value;
            const data = { 
                area: document.getElementById('custArea').value, 
                name: document.getElementById('custName').value, 
                driver: document.getElementById('driverName').value, 
                phone: ph.startsWith('0') ? '62'+ph.slice(1) : ph, 
                maps: document.getElementById('custMaps').value, 
                status: 'active' 
            };
            db.ref('customers').push(data);
            showPage('search');
        }
    </script>
</body>
</html>
