<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official v2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 52px !important; height: 52px; border-radius: 50%; margin-top: -26px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        /* UI Elements */
        .card-custom { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .driver-badge { background: #ebf5ff; color: #006491; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; border: 1px solid #006491; }
        
        /* Scanner UI */
        .scanner-container { position: relative; width: 100%; height: 220px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; box-shadow: 0 0 12px #e31837; top: 0; animation: scanAnim 2s infinite linear; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .cam-controls { background: #f8fafc; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .btn-zoom { flex: 1; padding: 8px; background: white; border: 2px solid #006491; color: #006491; border-radius: 10px; font-size: 11px; font-weight: 900; }
        .btn-zoom.active { background: #006491; color: white; }

        /* Loader */
        .loader-ocr { border: 3px solid #f3f3f3; border-top: 3px solid #006491; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #deliveryStatusBar { max-height: 80px; overflow-y: auto; scrollbar-width: none; }
        .status-item { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col">

    <div id="imgModal" class="fixed inset-0 bg-black/95 z-[10001] hidden flex flex-col items-center justify-center p-4" onclick="this.style.display='none'">
        <button class="absolute top-6 right-6 w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-2xl"></i></button>
        <div id="modalContent" class="flex flex-col items-center max-w-full">
             <img id="fullImg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain">
             <p id="modalCaption" class="text-white mt-4 font-black italic uppercase tracking-widest text-center"></p>
        </div>
    </div>

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-5xl uppercase tracking-tighter">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-[0.3em] text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs border-2 border-transparent focus:border-blue-500"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-3xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500">
            <button onclick="TrackCust.handleLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-transform">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center z-10">
            <div>
                <h1 class="font-black italic uppercase text-xl leading-none">Domino's</h1>
                <p class="text-[9px] font-bold text-red-400 tracking-widest uppercase">Jatimakmur Official</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="userDisplay" class="bg-white text-blue-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase shadow-inner">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-8 h-8 rounded-full flex items-center justify-center shadow-lg active:rotate-180 transition-all"><i class="fa fa-sync-alt text-xs"></i></button>
            </div>
        </nav>
        
        <div id="deliveryStatusBar" class="bg-white px-4 border-b border-gray-100 flex flex-col text-[9px] font-black text-blue-900 uppercase italic"></div>
        <div id="onlineBar" class="bg-blue-50 px-4 py-2 flex gap-3 overflow-x-auto text-[9px] font-black text-blue-800 uppercase italic no-scrollbar"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-4 gap-3">
                    <div class="relative flex-1">
                        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="searchInput" onkeyup="TrackCust.render()" placeholder="Cari Nama/HP/Driver/Area..." class="w-full pl-10 pr-4 py-3 rounded-2xl shadow-sm outline-none font-bold italic text-sm border border-gray-100">
                    </div>
                    <div id="countActive" class="bg-red-600 text-white px-4 py-3 rounded-2xl text-[10px] font-black italic shadow-md">0 AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-history" class="page p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-5 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div>
                        <h3 class="font-black text-blue-900 uppercase italic text-xs">Daftar Selesai</h3>
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Riwayat Antaran Hari Ini</p>
                    </div>
                    <button onclick="TrackCust.clearHistory()" class="bg-red-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95">
                        <i class="fa fa-trash-alt mr-1"></i> Reset
                    </button>
                </div>
                <div id="historyList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2.5rem] p-7 shadow-xl border-b-[6px] border-blue-900 space-y-4">
                    <div class="text-center mb-2">
                        <h2 id="formTitle" class="font-black text-blue-900 uppercase text-sm tracking-tight">Tambah Antaran Baru</h2>
                        <div class="h-1 w-12 bg-red-500 mx-auto mt-1 rounded-full"></div>
                    </div>
                    <input type="hidden" id="editId">
                    <div class="space-y-3">
                        <input type="text" id="custArea" placeholder="KODE AREA (A-1 / B-2)" class="w-full bg-yellow-50 p-4 rounded-2xl text-sm font-black uppercase outline-none border-2 border-yellow-100 focus:border-yellow-400 transition-all">
                        <input type="text" id="custName" placeholder="Nama Lengkap Pelanggan" class="w-full bg-gray-50 p-4 rounded-2xl text-sm outline-none font-bold border-2 border-gray-100 focus:border-blue-400">
                        <input type="tel" id="custPhone" placeholder="Nomor WhatsApp (08...)" class="w-full bg-gray-50 p-4 rounded-2xl text-sm outline-none font-bold border-2 border-gray-100 focus:border-blue-400">
                        <input type="text" id="custMaps" placeholder="Paste Link Google Maps" class="w-full bg-gray-50 p-4 rounded-2xl text-[11px] outline-none font-medium border-2 border-gray-100">
                        
                        <div class="bg-blue-50 p-5 rounded-2xl border-2 border-dashed border-blue-200 text-center relative transition-all active:bg-blue-100">
                            <label class="cursor-pointer block">
                                <i class="fa fa-camera text-blue-500 text-2xl"></i>
                                <p class="text-[10px] font-black text-blue-900 uppercase mt-2" id="photoStatus">Ambil Foto Rumah</p>
                                <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="TrackCust.handleImageUpload(this)">
                            </label>
                            <button onclick="TrackCust.removePhoto()" id="btnRemovePhoto" class="hidden absolute -top-2 -right-2 bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-xs"></i></button>
                            <img id="imgPrev" class="hidden w-full h-40 object-cover rounded-xl mt-3 border-4 border-white shadow-md">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2 pt-2">
                        <button onclick="TrackCust.saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-[0.98]">Simpan Data</button>
                        <button onclick="TrackCust.resetForm()" id="cancelBtn" class="hidden w-full bg-gray-400 text-white py-3 rounded-2xl font-black uppercase text-[10px]">Batalkan Edit</button>
                    </div>
                </div>
            </div>

            <div id="page-chat" class="page p-4 overflow-y-auto items-center">
                <div class="bg-white rounded-[2.5rem] p-6 shadow-xl w-full max-w-sm border-t-[6px] border-green-500">
                    <div class="flex items-center justify-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-green-200 shadow-lg">
                            <i class="fab fa-whatsapp text-white text-xl"></i>
                        </div>
                        <h2 class="font-black text-blue-900 uppercase italic text-sm">Scanner & Chat</h2>
                    </div>
                    
                    <div class="scanner-container">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="hidden absolute inset-0 pointer-events-none">
                            <div class="absolute inset-0 border-[40px] border-black/40"></div>
                            <div class="laser"></div>
                        </div>
                    </div>

                    <div id="camControls" class="hidden cam-controls">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black text-blue-900 uppercase">Visual Mode:</span>
                            <div class="flex gap-1.5">
                                <button onclick="TrackCust.setBWMode('off')" id="bw-off" class="px-3 py-1 bg-white border border-gray-200 rounded-md text-[9px] font-black active">NORMAL</button>
                                <button onclick="TrackCust.setBWMode('auto')" id="bw-auto" class="px-3 py-1 bg-white border border-gray-200 rounded-md text-[9px] font-black">BW AUTO</button>
                                <button onclick="TrackCust.setBWMode('manual')" id="bw-manual" class="px-3 py-1 bg-white border border-gray-200 rounded-md text-[9px] font-black">MANUAL</button>
                            </div>
                        </div>

                        <div id="manualControls" class="hidden space-y-2 mb-3 p-3 bg-white rounded-xl border">
                            <div class="flex items-center gap-3">
                                <i class="fa fa-sun text-gray-400 text-[10px]"></i>
                                <input type="range" id="brSlider" min="50" max="200" value="100" oninput="TrackCust.updateFilters()" class="flex-1 accent-blue-600 h-1">
                            </div>
                            <div class="flex items-center gap-3">
                                <i class="fa fa-adjust text-gray-400 text-[10px]"></i>
                                <input type="range" id="ctSlider" min="50" max="200" value="100" oninput="TrackCust.updateFilters()" class="flex-1 accent-blue-600 h-1">
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black text-blue-900 uppercase">Zoom:</span>
                            <button onclick="TrackCust.setZoom(1)" id="z1" class="btn-zoom active">1x</button>
                            <button onclick="TrackCust.setZoom(2)" id="z2" class="btn-zoom">2x</button>
                            <button onclick="TrackCust.setZoom(3)" id="z3" class="btn-zoom">3x</button>
                        </div>
                    </div>

                    <div class="flex gap-2 mb-4">
                        <button id="btnStartCam" onclick="TrackCust.toggleCamera(true)" class="flex-1 dominos-blue text-white py-3.5 rounded-2xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-video mr-1"></i> Buka Kamera
                        </button>
                        <button id="btnStopCam" onclick="TrackCust.toggleCamera(false)" class="hidden flex-1 bg-gray-500 text-white py-3.5 rounded-2xl font-black uppercase text-[10px]">
                            <i class="fa fa-times mr-1"></i> Tutup
                        </button>
                        <button onclick="TrackCust.runOCR()" class="flex-1 bg-red-600 text-white py-3.5 rounded-2xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-expand mr-1"></i> Scan Nomor
                        </button>
                    </div>

                    <div id="ocrLoader" class="hidden text-center mb-4">
                        <div class="loader-ocr mr-2"></div>
                        <span class="text-[10px] font-black text-blue-900 uppercase animate-pulse">Sedang Membaca Teks...</span>
                    </div>

                    <div class="space-y-3">
                        <input type="tel" id="manualWA" placeholder="Atau Ketik Nomor HP Manual" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-sm">
                        <button onclick="TrackCust.directChat()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-green-100">Buka Chat WhatsApp</button>
                    </div>

                    <div id="scanResultArea" class="hidden mt-6 animate-fadeIn">
                        <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Hasil Scan Terdeteksi:</p>
                        <div class="overflow-hidden rounded-xl border border-gray-100">
                            <table class="w-full text-[10px]">
                                <thead class="bg-gray-50 text-blue-900 uppercase font-black">
                                    <tr><th class="p-2 text-left">Nomor HP</th><th class="p-2 text-center">Aksi</th></tr>
                                </thead>
                                <tbody id="ocrTableBody" class="font-bold divide-y divide-gray-100 bg-white"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="pb-20"></div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="TrackCust.showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="TrackCust.showPage('history')" class="nav-item" id="nav-history"><i class="fa fa-history mb-1 text-xl"></i><span>History</span></div>
            <div onclick="TrackCust.showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="TrackCust.showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>WA Direct</span></div>
            <div onclick="TrackCust.logout()" class="nav-item"><i class="fa fa-power-off mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        const TrackCust = (() => {
            /* --- CONFIG & STATE --- */
            const userPins = { 
                "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Pak Ageng (Mgt)": "4444",
                "Sintiya (Cashier)": "0959", "Ridha (Cashier)": "0968", "Okta": "0972", 
                "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967",
                "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Rafli ramadhan": "0929"
            };
            
            const firebaseConfig = { 
                apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", 
                databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", 
                projectId: "trackcust-jtm" 
            };
            
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            let currentUser = localStorage.getItem('jtm_user') || "";
            let allData = {};
            let photoBase64 = "";
            let stream = null;
            let videoTrack = null;
            let bwMode = 'off';

            /* --- INITIALIZATION --- */
            function init() {
                const sel = document.getElementById('selectUser');
                sel.innerHTML = '<option value="">-- PILIH NAMA ANDA --</option>';
                Object.keys(userPins).forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
                
                if(currentUser) loginSuccess(currentUser);
                
                // Real-time Update Loops
                setInterval(updateTimers, 1000);
                startListeners();
            }

            function handleLogin() {
                const u = document.getElementById('selectUser').value;
                const p = document.getElementById('inputPin').value;
                if(userPins[u] === p) loginSuccess(u); 
                else alert("PIN SALAH!");
            }

            function loginSuccess(name) {
                currentUser = name;
                localStorage.setItem('jtm_user', name);
                document.getElementById('userDisplay').innerText = name;
                document.getElementById('pinOverlay').style.display = "none";
                document.getElementById('mainContent').style.display = "flex";
                updatePresence();
            }

            function logout() {
                if(confirm("Apakah Anda ingin keluar aplikasi?")) {
                    db.ref('presence/' + currentUser).remove();
                    localStorage.removeItem('jtm_user');
                    location.reload();
                }
            }

            /* --- FIREBASE LISTENERS --- */
            function startListeners() {
                // Customer Data
                db.ref('customers').on('value', s => {
                    allData = s.val() || {};
                    render();
                });

                // Delivery Activity Status (Scrolling bar)
                db.ref('delivery_activity').on('value', s => {
                    const bar = document.getElementById('deliveryStatusBar');
                    bar.innerHTML = "";
                    const now = Date.now();
                    s.forEach(child => {
                        const data = child.val();
                        if (now - data.timestamp < 900000) { // 15 mins expiry
                            bar.innerHTML += `
                                <div class="status-item py-1.5 flex items-center border-b border-blue-50">
                                    <i class="fa fa-motorcycle mr-2 text-[8px] text-red-500 animate-pulse"></i>
                                    <span>${data.name} SEDANG MENGANTAR...</span>
                                </div>`;
                        } else {
                            db.ref('delivery_activity/' + child.key).remove();
                        }
                    });
                });
            }

            function updatePresence() {
                if(!currentUser) return;
                const ref = db.ref('presence/' + currentUser);
                ref.set(true);
                ref.onDisconnect().remove();

                db.ref('presence').on('value', s => {
                    const bar = document.getElementById('onlineBar');
                    bar.innerHTML = "";
                    s.forEach(u => {
                        bar.innerHTML += `
                            <span class="flex items-center gap-1.5 whitespace-nowrap bg-white px-3 py-1 rounded-full shadow-sm border border-blue-100">
                                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                                ${u.key}
                            </span>`;
                    });
                });
            }

            /* --- CORE RENDERER --- */
            function render() {
                const list = document.getElementById('activeList');
                const hist = document.getElementById('historyList');
                const filter = document.getElementById('searchInput').value.toLowerCase();
                let activeCount = 0;

                list.innerHTML = "";
                hist.innerHTML = "";

                Object.keys(allData).reverse().forEach(id => {
                    const item = allData[id];
                    const match = `${item.name} ${item.phone} ${item.driverBy || ''} ${item.area}`.toLowerCase().includes(filter);
                    
                    if(item.status !== 'done') activeCount++;

                    // WA Link Logic
                    let cleanPhone = (item.phone || "").replace(/\D/g, '');
                    if(cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.slice(1);
                    const msg = `Halo Bapak/Ibu ${item.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar ya, Terimakasih ☺️`;
                    const waLink = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`;

                    const cardHtml = `
                        <div class="card-custom overflow-hidden border-l-[8px] ${item.status === 'done' ? 'border-gray-300' : (item.status === 'otw' ? 'border-blue-500' : 'border-red-500')}">
                            <div class="p-4">
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-[9px] font-black text-red-600 bg-red-50 px-2 py-0.5 rounded italic uppercase">${item.area}</span>
                                            ${item.driverBy ? `<span class="driver-badge"><i class="fa fa-user text-[7px] mr-1"></i>${item.driverBy}</span>` : ''}
                                        </div>
                                        <h3 class="font-black text-blue-900 text-[15px] uppercase leading-tight">${item.name}</h3>
                                        <p id="timer-${id}" class="text-[10px] font-bold mt-1 italic ${item.status === 'done' ? 'text-gray-400' : 'text-blue-500'}">
                                            ${item.status === 'done' ? 'SELESAI' : (item.status === 'otw' ? '00:00' : 'READY')}
                                        </p>
                                    </div>
                                    <div class="flex gap-2">
                                        ${item.status !== 'done' ? `
                                            <button onclick="TrackCust.editData('${id}')" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center active:bg-blue-100"><i class="fa fa-pen text-[10px]"></i></button>
                                            <button onclick="TrackCust.secureDelete('${id}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center active:bg-red-100"><i class="fa fa-trash text-[10px]"></i></button>
                                            <button onclick="TrackCust.updateStatus('${id}','done')" class="w-10 h-10 rounded-xl dominos-red text-white flex items-center justify-center shadow-lg active:scale-90"><i class="fa fa-check"></i></button>
                                            <button onclick="TrackCust.goOTW('${id}')" class="w-10 h-10 rounded-xl flex items-center justify-center ${item.status==='otw'?'bg-gray-100 text-gray-400':'bg-blue-600 text-white shadow-lg active:scale-90'}"><i class="fa fa-motorcycle"></i></button>
                                        ` : `
                                            <button onclick="TrackCust.updateStatus('${id}','active')" class="w-9 h-9 rounded-xl bg-gray-100 text-gray-400 flex items-center justify-center"><i class="fa fa-undo"></i></button>
                                        `}
                                    </div>
                                </div>

                                <div class="flex gap-3 mt-4 ${item.status === 'done' ? 'hidden' : ''}">
                                    ${item.maps ? `
                                        <div class="p-2 bg-white border border-gray-100 rounded-xl shadow-sm text-center" onclick="TrackCust.viewLargeQR('${id}', '${item.name}')">
                                            <div id="qr-${id}"></div>
                                            <p class="text-[7px] font-black mt-1 text-blue-900 uppercase">MAPS QR</p>
                                        </div>` : ''}
                                    ${item.photo ? `
                                        <img src="${item.photo}" onclick="TrackCust.viewImage('${item.photo}', 'FOTO RUMAH: ${item.name.toUpperCase()}')" class="flex-1 h-20 object-cover rounded-xl border border-gray-100 shadow-sm">
                                    ` : `
                                        <div class="flex-1 h-20 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center">
                                            <i class="fa fa-image text-gray-300 text-xl"></i>
                                            <p class="text-[7px] font-bold text-gray-400 uppercase mt-1">Tanpa Foto</p>
                                        </div>
                                    `}
                                </div>

                                <div class="flex gap-2 mt-4 ${item.status === 'done' ? 'hidden' : ''}">
                                    <a href="${item.maps}" target="_blank" class="flex-1 dominos-blue text-white py-2.5 rounded-xl text-center font-black text-[10px] uppercase italic">Buka Maps</a>
                                    <a href="${waLink}" target="_blank" onclick="TrackCust.pushActivity()" class="flex-1 bg-green-500 text-white py-2.5 rounded-xl text-center font-black text-[10px] uppercase italic">WhatsApp</a>
                                </div>
                            </div>
                        </div>`;

                    if(item.status === 'done') {
                        hist.innerHTML += cardHtml;
                    } else if(match) {
                        list.innerHTML += cardHtml;
                        if(item.maps) {
                            setTimeout(() => {
                                const el = document.getElementById(`qr-${id}`);
                                if(el && el.innerHTML === "") new QRCode(el, { text: item.maps, width: 60, height: 60, colorDark: "#006491" });
                            }, 100);
                        }
                    }
                });
                document.getElementById('countActive').innerText = `${activeCount} AKTIF`;
            }

            /* --- CRUD ACTIONS --- */
            function saveData() {
                const area = document.getElementById('custArea').value;
                const name = document.getElementById('custName').value;
                const editId = document.getElementById('editId').value;
                
                if(!area || !name) return alert("Mohon isi minimal Kode Area dan Nama!");
                
                const payload = {
                    area: area.toUpperCase(),
                    name: name,
                    phone: document.getElementById('custPhone').value,
                    maps: document.getElementById('custMaps').value,
                    photo: photoBase64,
                    status: editId ? (allData[editId].status || 'active') : 'active',
                    timestamp: editId ? allData[editId].timestamp : Date.now()
                };

                const ref = editId ? db.ref('customers/'+editId).update(payload) : db.ref('customers').push(payload);
                ref.then(() => {
                    resetForm();
                    showPage('list');
                });
            }

            function editData(id) {
                const item = allData[id];
                document.getElementById('editId').value = id;
                document.getElementById('custArea').value = item.area;
                document.getElementById('custName').value = item.name;
                document.getElementById('custPhone').value = item.phone;
                document.getElementById('custMaps').value = item.maps;
                if(item.photo) {
                    photoBase64 = item.photo;
                    const prev = document.getElementById('imgPrev');
                    prev.src = item.photo; prev.classList.remove('hidden');
                    document.getElementById('btnRemovePhoto').classList.remove('hidden');
                }
                document.getElementById('formTitle').innerText = "Edit Data Antaran";
                document.getElementById('cancelBtn').classList.remove('hidden');
                showPage('add');
            }

            function updateStatus(id, stat) { db.ref('customers/'+id).update({ status: stat }); }

            function goOTW(id) {
                if(allData[id].status !== 'otw') {
                    db.ref('customers/'+id).update({
                        status: 'otw',
                        startTime: Date.now(),
                        driverBy: currentUser
                    });
                    pushActivity();
                }
            }

            function secureDelete(id) {
                const p = prompt("Masukkan PIN Konfirmasi untuk menghapus:");
                if(p === userPins[currentUser]) db.ref('customers/'+id).remove();
                else if(p !== null) alert("PIN Salah!");
            }

            function clearHistory() {
                if(confirm("Hapus semua riwayat pengantaran yang sudah selesai?")) {
                    Object.keys(allData).forEach(id => {
                        if(allData[id].status === 'done') db.ref('customers/'+id).remove();
                    });
                }
            }

            function pushActivity() {
                db.ref('delivery_activity/' + currentUser).set({ name: currentUser, timestamp: Date.now() });
            }

            /* --- IMAGE PROCESSING --- */
            function handleImageUpload(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const scale = 600 / img.width;
                            canvas.width = 600; 
                            canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            const prev = document.getElementById('imgPrev');
                            prev.src = photoBase64; prev.classList.remove('hidden');
                            document.getElementById('btnRemovePhoto').classList.remove('hidden');
                            document.getElementById('photoStatus').innerText = "FOTO DIPILIH";
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            }

            function removePhoto() {
                photoBase64 = "";
                document.getElementById('imgPrev').classList.add('hidden');
                document.getElementById('btnRemovePhoto').classList.add('hidden');
                document.getElementById('housePhoto').value = "";
                document.getElementById('photoStatus').innerText = "Ambil Foto Rumah";
            }

            function resetForm() {
                document.getElementById('editId').value = "";
                document.getElementById('custArea').value = "";
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
                document.getElementById('custMaps').value = "";
                removePhoto();
                document.getElementById('formTitle').innerText = "Tambah Antaran Baru";
                document.getElementById('cancelBtn').classList.add('hidden');
            }

            /* --- UI UTILS --- */
            function showPage(id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-'+id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('nav-'+id)?.classList.add('active');
                if(id !== 'chat') toggleCamera(false);
            }

            function updateTimers() {
                Object.keys(allData).forEach(id => {
                    if(allData[id].status === 'otw') {
                        const elapsed = Math.floor((Date.now() - allData[id].startTime) / 1000);
                        const remaining = (20 * 60) - elapsed;
                        const el = document.getElementById('timer-'+id);
                        if(el) {
                            const m = Math.max(0, Math.floor(Math.abs(remaining) / 60));
                            const s = Math.max(0, Math.abs(remaining) % 60);
                            const pfx = remaining < 0 ? 'LEWAT ' : '';
                            el.innerText = `${pfx}${m}:${s < 10 ? '0'+s : s} MENIT`;
                            el.style.color = remaining < 0 ? '#e31837' : '#006491';
                        }
                    }
                });
            }

            function viewImage(url, cap) {
                const img = document.getElementById('fullImg');
                img.src = url;
                img.style.padding = "0";
                img.style.background = "transparent";
                document.getElementById('modalCaption').innerText = cap;
                document.getElementById('imgModal').style.display = 'flex';
            }

            function viewLargeQR(id, name) {
                const temp = document.createElement('div');
                new QRCode(temp, { text: allData[id].maps, width: 500, height: 500 });
                setTimeout(() => {
                    const canvas = temp.querySelector('canvas');
                    const img = document.getElementById('fullImg');
                    img.src = canvas.toDataURL();
                    img.style.padding = "20px";
                    img.style.background = "white";
                    document.getElementById('modalCaption').innerText = "SCAN MAPS: " + name.toUpperCase();
                    document.getElementById('imgModal').style.display = 'flex';
                }, 100);
            }

            /* --- SCANNER & OCR --- */
            async function toggleCamera(on) {
                const video = document.getElementById('scannerVideo');
                if(on) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        video.srcObject = stream;
                        videoTrack = stream.getVideoTracks()[0];
                        document.getElementById('btnStartCam').classList.add('hidden');
                        document.getElementById('btnStopCam').classList.remove('hidden');
                        document.getElementById('camControls').classList.remove('hidden');
                        document.getElementById('scannerOverlay').classList.remove('hidden');
                    } catch(e) { alert("Kamera gagal diakses."); }
                } else {
                    if(stream) stream.getTracks().forEach(t => t.stop());
                    video.srcObject = null;
                    document.getElementById('btnStartCam').classList.remove('hidden');
                    document.getElementById('btnStopCam').classList.add('hidden');
                    document.getElementById('camControls').classList.add('hidden');
                    document.getElementById('scannerOverlay').classList.add('hidden');
                }
            }

            async function runOCR() {
                const video = document.getElementById('scannerVideo');
                if(!video.srcObject) return alert("Buka kamera dulu!");
                
                document.getElementById('ocrLoader').classList.remove('hidden');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.filter = video.style.filter;
                ctx.drawImage(video, 0, 0);

                try {
                    const res = await Tesseract.recognize(canvas.toDataURL(), 'eng');
                    const nums = res.data.text.match(/(?:\+62|62|08)[0-9]{8,14}/g);
                    if(nums) {
                        const body = document.getElementById('ocrTableBody');
                        body.innerHTML = "";
                        [...new Set(nums)].forEach(n => {
                            let clean = n.replace(/\D/g, '');
                            if(clean.startsWith('0')) clean = '62' + clean.slice(1);
                            body.innerHTML += `
                                <tr>
                                    <td class="p-3 text-blue-900">${n}</td>
                                    <td class="p-3 text-center">
                                        <button onclick="TrackCust.directChat('${clean}')" class="bg-green-500 text-white w-8 h-8 rounded-lg shadow-sm"><i class="fab fa-whatsapp"></i></button>
                                    </td>
                                </tr>`;
                        });
                        document.getElementById('scanResultArea').classList.remove('hidden');
                        document.getElementById('manualWA').value = nums[0];
                    } else { alert("Nomor HP tidak ditemukan, coba lebih dekat."); }
                } finally { document.getElementById('ocrLoader').classList.add('hidden'); }
            }

            function setBWMode(m) {
                bwMode = m;
                document.querySelectorAll('[id^="bw-"]').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
                document.getElementById('bw-'+m).classList.add('bg-blue-600', 'text-white');
                document.getElementById('manualControls').classList.toggle('hidden', m !== 'manual');
                updateFilters();
            }

            function updateFilters() {
                const v = document.getElementById('scannerVideo');
                const br = document.getElementById('brSlider').value;
                const ct = document.getElementById('ctSlider').value;
                if(bwMode === 'manual') v.style.filter = `grayscale(100%) brightness(${br}%) contrast(${ct}%)`;
                else v.style.filter = bwMode === 'auto' ? 'grayscale(100%) contrast(150%)' : 'none';
            }

            function setZoom(lvl) {
                if(videoTrack?.getCapabilities().zoom) videoTrack.applyConstraints({ advanced: [{ zoom: lvl }] });
                document.querySelectorAll('[id^="z"]').forEach(b => b.classList.remove('active'));
                document.getElementById('z'+lvl).classList.add('active');
            }

            function directChat(num) {
                const target = num || document.getElementById('manualWA').value;
                if(!target) return alert("Masukkan nomor HP!");
                let clean = target.replace(/\D/g, '');
                if(clean.startsWith('0')) clean = '62' + clean.slice(1);
                pushActivity();
                window.open(`https://wa.me/${clean}?text=${encodeURIComponent("Halo, saya " + currentUser + " dari Domino's Jatimakmur...")}`, '_blank');
            }

            return {
                init, handleLogin, logout, showPage, render, saveData, editData, 
                updateStatus, goOTW, secureDelete, clearHistory, handleImageUpload, 
                removePhoto, resetForm, viewImage, viewLargeQR, toggleCamera, 
                runOCR, setBWMode, updateFilters, setZoom, directChat, pushActivity
            };
        })();

        window.onload = TrackCust.init;
    </script>
</body>
</html>
