<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust Jtm - Online</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#006491">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">
    <nav class="dominos-blue p-4 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <h1 class="font-black italic tracking-tighter">DOMINO'S <span class="text-red-400">JTM</span></h1>
        <button onclick="loginProcess()" id="adminBtn" class="bg-white text-blue-900 px-4 py-2 rounded-lg text-xs font-black shadow-sm">ADMIN</button>
    </nav>

    <div id="adminPanel" class="hidden p-4 bg-white border-b-4 border-blue-800 shadow-xl space-y-3 slide-up">
        <div class="flex justify-between items-center"><h2 class="font-bold text-blue-900">Input Pesanan Baru</h2><button onclick="changePassword()" class="text-[10px] text-gray-400">GANTI PIN</button></div>
        <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full border p-3 rounded-xl text-sm">
        <input type="tel" id="custPhone" placeholder="No WA (08...)" class="w-full border p-3 rounded-xl text-sm">
        <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full border p-3 rounded-xl text-sm">
        <button onclick="saveToCloud()" class="w-full dominos-red text-white p-3 rounded-xl font-black">SIMPAN KE CLOUD</button>
    </div>

    <main class="p-4">
        <div class="relative mb-6">
            <input type="text" id="searchInput" onkeyup="searchCustomer()" placeholder="Cari Nama / No HP..." class="w-full p-4 pl-12 rounded-2xl shadow-sm outline-none">
            <i class="fa fa-search absolute left-4 top-4 text-blue-800 opacity-30"></i>
        </div>
        <div id="resultList" class="space-y-4"></div>
    </main>

    <script>
        // Konfigurasi otomatis dari gambar kamu
        const firebaseConfig = {
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDnVqT6k8IM3shFtgc",
            authDomain: "trackcust-jtm.firebaseapp.com",
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "trackcust-jtm",
            storageBucket: "trackcust-jtm.firebasestorage.app",
            messagingSenderId: "411585432172",
            appId: "1:411585432172:web:2d9ae1655d4e3073e4a649"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPass = localStorage.getItem('adminPass') || "147852";
        let isAdmin = false;

        // Ambil Data Otomatis
        db.ref('customers').on('value', (snapshot) => {
            renderCards(snapshot.val());
        });

        function saveToCloud() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const url = document.getElementById('custMaps').value;
            if (name && phone && url) {
                const formattedPhone = phone.startsWith('0') ? '62' + phone.slice(1) : phone;
                db.ref('customers').push({ name, phone: formattedPhone, maps: url });
                document.getElementById('custName').value = '';
                document.getElementById('custPhone').value = '';
                document.getElementById('custMaps').value = '';
                alert("Berhasil disimpan ke Cloud!");
            }
        }

        function renderCards(data, filter = "") {
            const container = document.getElementById('resultList');
            container.innerHTML = "";
            if (!data) return;
            Object.keys(data).reverse().forEach(key => {
                const c = data[key];
                if (c.name.toLowerCase().includes(filter.toLowerCase()) || c.phone.includes(filter)) {
                    const waLink = `https://wa.me/${c.phone}?text=Halo%20Bapak/Ibu%20${c.name},%20saya%20dari%20Domino's%20Pizza%20Jatimakmur%20ingin%20mengkonfirmasi%20pesanan%20anda%20akan%20diantarkan%20sekarang,%20mohon%20tetap%20aktif%20WhatsApp%20sampai%20pesanan%20tiba,%20terimakasih%20😊`;
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border p-4 slide-up">
                            <div class="flex justify-between items-start mb-3">
                                <div><h3 class="font-black text-blue-900 uppercase text-sm">${c.name}</h3><p class="text-xs text-green-600 font-bold">${c.phone}</p></div>
                                ${isAdmin ? `<button onclick="deleteData('${key}')" class="text-red-200 p-2"><i class="fa fa-trash"></i></button>` : ''}
                            </div>
                            <div class="flex gap-2">
                                <a href="${c.maps}" target="_blank" class="flex-1 dominos-blue text-white p-3 rounded-xl text-center font-bold text-xs">MAPS</a>
                                <a href="${waLink}" target="_blank" class="flex-1 bg-green-500 text-white p-3 rounded-xl text-center font-bold text-xs text-white">WHATSAPP</a>
                            </div>
                        </div>`;
                }
            });
        }

        function deleteData(id) { if(confirm('Hapus data ini?')) db.ref('customers/' + id).remove(); }
        function loginProcess() {
            if (!isAdmin) { if (prompt("PIN Admin:") === currentPass) { isAdmin = true; document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('adminBtn').innerText = "LOGOUT"; } else { alert("PIN Salah!"); } } 
            else { location.reload(); }
        }
        function changePassword() {
            const newPass = prompt("Masukkan PIN Baru:");
            if (newPass) { currentPass = newPass; localStorage.setItem('adminPass', newPass); alert("PIN diganti!"); }
        }
        function searchCustomer() {
            db.ref('customers').once('value', (s) => renderCards(s.val(), document.getElementById('searchInput').value));
        }
    </script>
</body>
</html>
