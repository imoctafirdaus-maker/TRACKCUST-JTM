<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Auto Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        .history-card { opacity: 0.8; border-left: 4px solid #10b981 !important; background-color: #f0fdf4; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24 font-sans">
    
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <nav class="dominos-blue p-4 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
        <button onclick="loginProcess()" id="adminBtn" class="bg-white text-blue-900 px-4 py-2 rounded-lg text-[10px] font-black shadow-sm uppercase">Admin Login</button>
    </nav>

    <div id="adminPanel" class="hidden p-4 bg-white border-b-4 border-blue-800 shadow-xl space-y-3">
        <div class="flex justify-between items-center">
            <h2 id="formTitle" class="font-bold text-blue-900 text-xs uppercase italic">Input Antaran Baru</h2>
            <button onclick="cancelEdit()" id="cancelBtn" class="hidden text-[10px] text-red-500 font-bold underline">BATAL EDIT</button>
        </div>
        <input type="hidden" id="editKey">
        <input type="text" id="custArea" placeholder="Area (Jatikramat/Jatimakmur/Benih)" class="w-full border p-3 rounded-xl text-sm font-bold bg-yellow-50 outline-none uppercase">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="custName" placeholder="Nama Pelanggan" class="border p-3 rounded-xl text-sm outline-none">
            <input type="text" id="driverName" placeholder="Nama Driver" class="border p-3 rounded-xl text-sm outline-none bg-blue-50 font-bold uppercase">
        </div>
        <input type="tel" id="custPhone" placeholder="No WA (08...)" class="w-full border p-3 rounded-xl text-sm outline-none">
        <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full border p-3 rounded-xl text-sm outline-none">
        <button id="submitBtn" onclick="saveToCloud()" class="w-full dominos-red text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Simpan Ke Cloud</button>
    </div>

    <main class="p-4">
        <div class="relative mb-6">
            <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/Area/Driver..." class="w-full p-4 pl-12 rounded-2xl shadow-sm outline-none border-none text-sm font-semibold italic">
            <i class="fa fa-search absolute left-4 top-4 text-blue-800 opacity-30"></i>
        </div>

        <div
