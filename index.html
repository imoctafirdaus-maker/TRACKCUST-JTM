<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Maps System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        #map { height: 100%; width: 100%; z-index: 1; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Maps Tracking</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
        </nav>

        <main class="flex-1 overflow-hidden relative">
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Antaran..." class="w-full p-3 mb-4 rounded-xl shadow-sm outline-none font-bold italic text-sm border">
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-maps" class="page">
                <div id="map"></div>
            </div>

            <div id="page-add" class="page p-4">
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-3">
                    <input type="text" id="custArea" placeholder="KODE AREA" class="w-full bg-gray-50 p-4 rounded-xl font-bold uppercase">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl font-bold">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-xl font-bold">
                    <button onclick="saveData()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase">Simpan Antaran</button>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="showPage('maps')" class="nav-item" id="nav-maps"><i class="fa fa-map-marked-alt mb-1 text-xl"></i><span>Peta JTM</span></div>
            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        const userPins = { "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971" };
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {};
        let map, markers = {};
        const jtmLocation = [-6.2848, 106.9284]; // Lokasi Domino's Jatimakmur

        window.onload = () => {
            const logSel = document.getElementById('selectUser');
            Object.keys(userPins).forEach(n => logSel.innerHTML += `<option value="${n}">${n}</option>`);
            if(currentUser) bukaApp(currentUser);
            initMap();
        };

        function initMap() {
            map = L.map('map').setView(jtmLocation, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker(jtmLocation).addTo(map).bindPopup("<b>Domino's Jatimakmur</b>").openPopup();
            
            // Listener real-time untuk marker driver
            db.ref('tracking').on('value', snapshot => {
                const trackers = snapshot.val();
                const now = Date.now();
                
                // Hapus marker lama
                Object.values(markers).forEach(m => map.removeLayer(m));
                markers = {};

                if (trackers) {
                    Object.keys(trackers).forEach(name => {
                        const data = trackers[name];
                        if (now < data.expiry) {
                            markers[name] = L.marker([data.lat, data.lng])
                                .addTo(map)
                                .bindPopup(`<b>Driver: ${name}</b><br>Sisa: ${Math.ceil((data.expiry - now)/60000)} menit`);
                        } else {
                            db.ref('tracking/' + name).remove();
                        }
                    });
                }
            });
        }

        function activateTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                db.ref('tracking/' + currentUser).set({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    expiry: Date.now() + (15 * 60 * 1000)
                });
            });
        }

        function openWa(num) {
            activateTracking();
            window.open(`https://wa.me/62${num}`, '_blank');
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('nav-' + p).classList.add('active');
            if(p === 'maps') { setTimeout(() => map.invalidateSize(), 200); }
        }

        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(userPins[u] === p) { localStorage.setItem('jtm_user', u); bukaApp(u); }
            else { alert("PIN SALAH!"); }
        }

        function bukaApp(u) {
            currentUser = u;
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('userDisplay').innerText = u;
            db.ref('antaran').on('value', s => { allData = s.val() || {}; render(); });
        }

        function render() {
            const list = document.getElementById('activeList');
            list.innerHTML = '';
            Object.keys(allData).forEach(id => {
                const d = allData[id];
                if(d.status === 'selesai') return;
                list.innerHTML += `
                <div class="bg-white rounded-2xl p-4 shadow border-l-4 border-blue-900">
                    <div class="flex justify-between">
                        <span class="font-black text-blue-900">${d.custArea}</span>
                        <span class="text-[10px] text-gray-400">${new Date(d.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <h3 class="font-bold uppercase my-1">${d.custName}</h3>
                    <button onclick="openWa('${d.custPhone}')" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold mt-2">
                        <i class="fab fa-whatsapp mr-1"></i> CHAT & TRACKING
                    </button>
                    <button onclick="db.ref('antaran/${id}').update({status:'selesai', driver:currentUser})" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold mt-2 text-[10px]">SELESAIKAN</button>
                </div>`;
            });
        }

        function saveData() {
            const data = {
                custArea: document.getElementById('custArea').value,
                custName: document.getElementById('custName').value,
                custPhone: document.getElementById('custPhone').value,
                timestamp: Date.now(),
                status: 'aktif'
            };
            db.ref('antaran').push(data).then(() => {
                document.getElementById('custName').value = '';
                document.getElementById('custPhone').value = '';
                showPage('list');
            });
        }

        function handleLogout() { localStorage.removeItem('jtm_user'); location.reload(); }
    </script>
</body>
</html>
