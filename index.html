<div id="page-chat" class="page items-center p-4 bg-gray-100 overflow-y-auto">
    <div class="bg-white p-6 rounded-[2.5rem] shadow-xl w-full max-w-sm text-center mb-20">
        <i class="fab fa-whatsapp text-green-500 text-5xl mb-4"></i>
        <h2 class="font-black text-blue-900 uppercase text-sm mb-1">Scanner & WA Direct</h2>
        <p class="text-[9px] font-bold text-gray-400 uppercase mb-6">Otomatis kirim pesan kononasi</p>

        <div class="scanner-container">
            <video id="scannerVideo" autoplay playsinline></video>
            <div id="scannerOverlay" class="scanner-overlay"><div class="scanner-box"><div class="laser"></div></div></div>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="startCamera()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                <i class="fa fa-camera mr-1"></i> On
            </button>
            <button onclick="captureAndScan()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                <i class="fa fa-expand mr-1"></i> Scan
            </button>
        </div>

        <div class="space-y-3">
            <div class="relative">
                <input type="tel" id="waDirectNumber" placeholder="Masukan Nomor HP..." 
                    class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 text-center font-black text-blue-900 text-lg outline-none focus:border-blue-500 transition-all">
            </div>
            
            <div class="flex items-center justify-center gap-2 mb-2">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="autoSwitch" class="sr-only peer" checked>
                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                </label>
                <span class="text-[10px] font-black text-gray-500 uppercase">Auto Switch WA</span>
            </div>

            <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-sm shadow-lg hover:bg-green-600 transition-all">
                <i class="fab fa-whatsapp mr-2 text-lg"></i> Kirim Pesan
            </button>
        </div>
    </div>
</div>

<script>
    // --- LOGIKA WA DIRECT DENGAN AUTO SWITCH ---

    async function captureAndScan() {
        const video = document.getElementById('scannerVideo');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        // Optimasi gambar untuk Tesseract
        ctx.filter = 'grayscale(100%) contrast(200%)';
        ctx.drawImage(video, 0, 0);
        
        try {
            const result = await Tesseract.recognize(canvas.toDataURL(), 'eng');
            const matches = result.data.text.match(/(?:\+62|62|08)[0-9\s-]{8,15}/g);
            
            if(matches) {
                let cleanNum = matches[0].replace(/\D/g, '');
                document.getElementById('waDirectNumber').value = cleanNum;
                
                // Cek jika Auto Switch Aktif
                if(document.getElementById('autoSwitch').checked) {
                    setTimeout(() => {
                        openWaDirect();
                    }, 500);
                }
            } else {
                alert("Nomor tidak terdeteksi, coba lebih dekat.");
            }
        } catch (err) {
            console.error(err);
        }
    }

    function openWaDirect() {
        const num = document.getElementById('waDirectNumber').value;
        if(!num) return alert("Masukkan nomor dulu!");

        pushDeliveryStatus(currentUser); // Trigger status kedap-kedip di dashboard
        
        let waNum = num.replace(/\D/g, '');
        if(waNum.startsWith('0')) waNum = '62' + waNum.slice(1);
        if(waNum.startsWith('8')) waNum = '62' + waNum;

        // Format Pesan Sebelumnya
        const pesan = `Halo Bapak/Ibu, saya *${currentUser}* dari *Domino's Pizza Jatimakmur*.\n\nMohon maaf mengganggu waktunya, saya sedang dalam perjalanan mengantarkan pesanan Bapak/Ibu. Mohon ditunggu ya, terima kasih. 🍕⚡`;
        
        window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(pesan)}`, '_blank');
    }
</script>
