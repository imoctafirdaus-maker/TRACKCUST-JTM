<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        #page-chat { background-color: #f0f2f5; }
        .wa-card { background: white; padding: 1.5rem; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }

        .driver-badge { background: #ebf5ff; color: #006491; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; border: 1px solid #006491; }
        
        .qr-container { background: white; padding: 8px; border-radius: 12px; border: 2px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .qr-container:active { transform: scale(0.95); background: #f8fafc; }
        
        #fullImg.qr-large { padding: 20px; background: white; border-radius: 20px; }

        .scanner-container { position: relative; width: 100%; height: 200px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; border: 30px solid rgba(0,0,0,0.5); pointer-events: none; display: none; }
        .scanner-box { width: 100%; height: 100%; border: 2px solid #e31837; position: relative; }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; shadow: 0 0 10px #e31837; top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .cam-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .control-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-zoom { flex: 1; padding: 6px; background: white; border: 2px solid #006491; color: #006491; border-radius: 8px; font-size: 10px; font-weight: 900; }
        .btn-zoom.active { background: #006491; color: white; }

        .loader-ocr { border: 3px solid #f3f3f3; border-top: 3px solid #006491; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .visual-slider { flex: 1; accent-color: #006491; height: 4px; }
        
        .btn-mode { padding: 4px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; border: 1px solid #cbd5e1; background: white; color: #64748b; }
        .btn-mode.active { background: #e31837; color: white; border-color: #e31837; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="imgModal" class="fixed inset-0 bg-black/95 z-[10001] hidden flex-col items-center justify-center p-4" onclick="this.style.display='none'">
        <button class="absolute top-6 right-6 w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-2xl"></i></button>
        <div id="modalContent" class="flex flex-col items-center">
             <img id="fullImg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain">
             <p id="modalCaption" class="text-white mt-4 font-black italic uppercase tracking-widest"></p>
        </div>
    </div>

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>
        
        <div id="onlineBar" class="bg-blue-900/10 px-4 py-1 flex gap-2 overflow-x-auto text-[8px] font-black text-blue-900 uppercase italic"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Nama/HP/Driver/Area..." class="w-2/3 p-3 rounded-xl shadow-sm outline-none font-bold italic text-sm">
                    <div id="countActive" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black italic">0 AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-history" class="page p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-4 bg-gray-100 p-3 rounded-2xl border-b-2 border-gray-200">
                    <h3 class="font-black text-blue-900 uppercase italic text-[11px]">Daftar Selesai</h3>
                    <button onclick="clearAllHistory()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-md active:scale-95 transition-all">
                        <i class="fa fa-trash-alt mr-1"></i> Kosongkan
                    </button>
                </div>
                <div id="historyList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-3">
                    <h2 id="formTitle" class="font-black text-blue-900 text-center uppercase text-xs">Tambah Antaran</h2>
                    <input type="hidden" id="editId">
                    <input type="text" id="custArea" placeholder="KODE AREA (A-1)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold uppercase outline-none">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    
                    <div class="bg-blue-50 p-4 rounded-xl border-2 border-dashed border-blue-200 text-center relative">
                        <label class="cursor-pointer">
                            <i class="fa fa-camera text-blue-400 text-xl"></i>
                            <p class="text-[9px] font-black text-blue-900 uppercase mt-1" id="photoStatus">Foto Rumah</p>
                            <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="processImage(this)">
                        </label>
                        <button onclick="removePhoto()" id="btnRemovePhoto" class="hidden absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-[10px]"></i></button>
                        <img id="imgPrev" class="hidden w-full h-32 object-cover rounded-lg mt-2 border-2 border-white">
                    </div>
                    <button onclick="saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm">Simpan</button>
                    <button onclick="cancelEdit()" id="cancelBtn" class="hidden w-full bg-gray-400 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Batal</button>
                </div>
            </div>

            <div id="page-chat" class="page h-full items-center p-4 bg-gray-100 overflow-y-auto">
                <div class="wa-card mb-20 mx-auto">
                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-2 shadow-lg">
                        <i class="fab fa-whatsapp text-white text-2xl"></i>
                    </div>
                    <h2 class="font-black text-blue-900 uppercase italic text-[12px] mb-3">Scanner & Manual Input</h2>
                    
                    <div class="scanner-container">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="scanner-overlay">
                            <div class="scanner-box">
                                <div class="laser"></div>
                            </div>
                        </div>
                    </div>

                    <div id="camControls" class="hidden cam-controls text-left">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[9px] font-black text-blue-900 uppercase">Mode BW:</span>
                            <div class="flex gap-1">
                                <button onclick="setBWMode('off')" id="bw-off" class="btn-mode active">OFF</button>
                                <button onclick="setBWMode('auto')" id="bw-auto" class="btn-mode">AUTO</button>
                                <button onclick="setBWMode('manual')" id="bw-manual" class="btn-mode">MANUAL</button>
                            </div>
                        </div>

                        <div id="manualBWControls" class="hidden grid grid-cols-2 gap-2 mb-2 p-2 bg-white rounded-xl border border-gray-100">
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Cahaya (BR):</span>
                                <input type="range" id="brSlider" min="50" max="200" value="100" oninput="updateVisualFilters()" class="visual-slider">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Kontras (CT):</span>
                                <input type="range" id="ctSlider" min="50" max="200" value="100" oninput="updateVisualFilters()" class="visual-slider">
                            </div>
                        </div>

                        <div class="control-group">
                            <span class="text-[9px] font-black text-blue-900 italic uppercase">Zoom:</span>
                            <button onclick="setZoom(1)" id="z1" class="btn-zoom active">1x</button>
                            <button onclick="setZoom(2)" id="z2" class="btn-zoom">2x</button>
                            <button onclick="setZoom(3)" id="z3" class="btn-zoom">3x</button>
                        </div>
                        <div class="control-group">
                            <span class="text-[9px] font-black text-blue-900 italic uppercase">Fokus:</span>
                            <select onchange="setFocusMode(this.value)" class="flex-1 p-1 rounded-lg text-[9px] font-bold border-2 border-blue-900 outline-none">
                                <option value="continuous">Otomatis</option>
                                <option value="manual">Manual</option>
                            </select>
                        </div>
                        <div id="manualFocusCont" class="hidden flex flex-col gap-1">
                            <input type="range" id="focusSlider" min="0" max="100" value="50" oninput="setManualFocus(this.value)" class="w-full accent-red-600">
                            <span class="text-[7px] font-black text-gray-400 uppercase tracking-tighter text-center">Geser Slider untuk Fokus Manual</span>
                        </div>
                    </div>

                    <div class="flex gap-2 mb-3">
                        <button id="btnStartCam" onclick="startCamera()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-video mr-1"></i> Buka Kamera
                        </button>
                        <button id="btnStopCam" onclick="stopCamera()" class="hidden flex-1 bg-gray-500 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-video-slash mr-1"></i> Tutup
                        </button>
                        <button onclick="captureAndScan()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-expand mr-1"></i> Scan Nomor
                        </button>
                    </div>

                    <div id="ocrLoading" class="hidden mb-3 text-[9px] font-bold text-blue-900 uppercase italic">
                        <div class="loader-ocr"></div> Meredam Silau & Membaca...
                    </div>

                    <input type="tel" id="waDirectNumber" placeholder="Input Nomor Manual" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-sm mb-3">
                    
                    <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-3 rounded-xl font-black uppercase text-xs shadow-md mb-4">
                        Chat Pelanggan
                    </button>

                    <div id="scanResultArea" class="hidden text-left border-t-2 border-gray-100 pt-4">
                        <table class="w-full text-[10px] bg-white rounded-lg overflow-hidden border">
                            <thead class="bg-blue-900 text-white uppercase italic">
                                <tr>
                                    <th class="p-2">Nomor Terdeteksi</th>
                                    <th class="p-2">Chat</th>
                                </tr>
                            </thead>
                            <tbody id="addressTableBody" class="font-bold text-gray-700 divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="showPage('history')" class="nav-item" id="nav-history"><i class="fa fa-history mb-1 text-xl"></i><span>History</span></div>
            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>WA Direct</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        // Database & Login
        const userPins = { 
            "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Pak Ageng (Mgt)": "4444",
            "Sintiya (Cashier)": "0959", "Ridha (Cashier)": "0968", "Okta": "0972", 
            "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967",
            "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Rafli ramadhan": "0929"
        };

        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; let photoBase64 = "";
        let stream = null;
        let videoTrack = null;
        let bwMode = 'off'; 

        window.onload = () => {
            const logSel = document.getElementById('selectUser');
            logSel.innerHTML = '<option value="">-- PILIH NAMA --</option>';
            Object.keys(userPins).forEach(n => logSel.innerHTML += `<option value="${n}">${n}</option>`);
            if(currentUser) bukaApp(currentUser);
            setInterval(updateTimers, 1000);
            updatePresence();
        };

        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(userPins[u] === p) {
                localStorage.setItem('jtm_user', u);
                bukaApp(u);
            } else {
                alert("PIN SALAH!");
            }
        }

        function bukaApp(u) {
            currentUser = u;
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('userDisplay').innerText = u;
            db.ref('customers').on('value', s => {
                allData = s.val() || {};
                render();
            });
            updatePresence();
        }

        function updatePresence() {
            if(!currentUser) return;
            const ref = db.ref('online/' + currentUser.replace(/\s/g, '_'));
            ref.set({ name: currentUser, last: Date.now() });
            ref.onDisconnect().remove();
            
            db.ref('online').on('value', s => {
                const bar = document.getElementById('onlineBar');
                bar.innerHTML = "";
                const data = s.val() || {};
                Object.values(data).forEach(v => {
                    bar.innerHTML += `<span class="bg-blue-600 text-white px-2 py-0.5 rounded-md">● ${v.name}</span>`;
                });
            });
        }

        function handleLogout() {
            localStorage.removeItem('jtm_user');
            location.reload();
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('nav-' + p).classList.add('active');
            if(p !== 'chat') stopCamera();
        }

        function render() {
            const list = document.getElementById('activeList');
            const hist = document.getElementById('historyList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = ""; hist.innerHTML = "";
            let activeCount = 0;

            Object.keys(allData).sort((a,b) => allData[b].time - allData[a].time).forEach(id => {
                const d = allData[id];
                const isMatch = d.name.toLowerCase().includes(search) || d.area.toLowerCase().includes(search) || d.driver?.toLowerCase().includes(search) || d.phone.includes(search);
                if(!isMatch) return;

                const card = createCard(id, d);
                if(d.status === 'active') {
                    list.appendChild(card);
                    activeCount++;
                } else {
                    hist.appendChild(card);
                }
            });
            document.getElementById('countActive').innerText = `${activeCount} AKTIF`;
        }

        function createCard(id, d) {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-[1.5rem] shadow-sm border-l-8 " + (d.status==='active' ? 'border-blue-900' : 'border-gray-400');
            
            const timeDiff = d.status === 'active' ? Math.floor((Date.now() - d.time)/60000) : 0;
            const colorClass = timeDiff > 30 ? 'text-red-600' : 'text-blue-900';

            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="bg-yellow-400 text-blue-900 px-2 py-1 rounded text-[10px] font-black italic uppercase">${d.area}</span>
                        <h3 class="font-black text-blue-900 uppercase mt-1">${d.name}</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black ${colorClass}">${d.status === 'active' ? timeDiff + ' MIN' : 'SELESAI'}</p>
                        <span class="driver-badge">${d.driver || 'NO DRIVER'}</span>
                    </div>
                </div>
                <div class="flex gap-2 mt-4">
                    <a href="https://wa.me/62${d.phone.replace(/^0/, '')}" class="flex-1 bg-green-500 text-white p-2 rounded-xl text-center"><i class="fab fa-whatsapp"></i></a>
                    <button onclick="viewImage('${d.photo}', '${d.name}')" class="flex-1 bg-gray-100 text-blue-900 p-2 rounded-xl"><i class="fa fa-camera"></i></button>
                    <button onclick="editData('${id}')" class="flex-1 bg-blue-100 text-blue-900 p-2 rounded-xl"><i class="fa fa-edit"></i></button>
                    ${d.status === 'active' ? 
                        `<button onclick="updateStatus('${id}', 'done')" class="flex-[2] bg-blue-900 text-white p-2 rounded-xl font-black text-[10px] uppercase">Selesai</button>` :
                        `<button onclick="updateStatus('${id}', 'active')" class="flex-[2] bg-gray-500 text-white p-2 rounded-xl font-black text-[10px] uppercase">Re-Open</button>`
                    }
                </div>
            `;
            return div;
        }

        // --- SMART REDIRECT & OCR ---
        function formatPhoneNumber(num) {
            let cleaned = num.replace(/\D/g, '');
            if (cleaned.startsWith('0')) cleaned = '62' + cleaned.substring(1);
            if (cleaned.startsWith('8')) cleaned = '62' + cleaned;
            return cleaned;
        }

        async function captureAndScan() {
            if (!stream) return alert("Buka kamera dulu!");
            
            const canvas = document.createElement('canvas');
            const video = document.getElementById('scannerVideo');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            ctx.filter = bwMode !== 'off' ? `brightness(${document.getElementById('brSlider').value}%) contrast(${document.getElementById('ctSlider').value}%) grayscale(1)` : 'none';
            ctx.drawImage(video, 0, 0);
            
            document.getElementById('ocrLoading').classList.remove('hidden');
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const foundNumbers = text.match(/(?:\+62|08|8)\d{8,15}/g) || [];
                
                if (foundNumbers.length === 1) {
                    const cleanNum = formatPhoneNumber(foundNumbers[0]);
                    window.open(`https://wa.me/${cleanNum}`, '_blank');
                    document.getElementById('ocrLoading').classList.add('hidden');
                } else if (foundNumbers.length > 1) {
                    renderAddressTable([...new Set(foundNumbers)]);
                    document.getElementById('ocrLoading').classList.add('hidden');
                } else {
                    alert("Nomor tidak terdeteksi. Pastikan cahaya terang dan nomor terlihat jelas.");
                    document.getElementById('ocrLoading').classList.add('hidden');
                }
            } catch (e) {
                console.error(e);
                document.getElementById('ocrLoading').classList.add('hidden');
            }
        }

        function renderAddressTable(numbers) {
            const area = document.getElementById('scanResultArea');
            const body = document.getElementById('addressTableBody');
            body.innerHTML = "";
            
            numbers.forEach(num => {
                const cleanNum = formatPhoneNumber(num);
                body.innerHTML += `
                    <tr>
                        <td class="p-3">${num}</td>
                        <td class="p-3 text-center">
                            <button onclick="window.open('https://wa.me/${cleanNum}', '_blank')" class="bg-green-500 text-white px-4 py-1 rounded-full">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            area.classList.remove('hidden');
            area.scrollIntoView({ behavior: 'smooth' });
        }

        function openWaDirect() {
            const num = document.getElementById('waDirectNumber').value;
            if(!num) return alert("Isi nomor!");
            window.open(`https://wa.me/${formatPhoneNumber(num)}`, '_blank');
        }

        // --- KAMERA LOGIC ---
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" } 
                });
                const video = document.getElementById('scannerVideo');
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                document.getElementById('btnStartCam').classList.add('hidden');
                document.getElementById('btnStopCam').classList.remove('hidden');
                document.getElementById('scannerOverlay').style.display = 'block';
                document.getElementById('camControls').classList.remove('hidden');
            } catch (err) {
                alert("Gagal akses kamera: " + err);
            }
        }

        function stopCamera() {
            if(stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            document.getElementById('btnStartCam').classList.remove('hidden');
            document.getElementById('btnStopCam').classList.add('hidden');
            document.getElementById('scannerOverlay').style.display = 'none';
            document.getElementById('camControls').classList.add('hidden');
            document.getElementById('scanResultArea').classList.add('hidden');
        }

        function setZoom(val) {
            if(!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if(capabilities.zoom) {
                videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
                document.querySelectorAll('.btn-zoom').forEach(b => b.classList.remove('active'));
                document.getElementById('z'+val).classList.add('active');
            }
        }

        function setFocusMode(mode) {
            if(!videoTrack) return;
            if(mode === 'manual') {
                document.getElementById('manualFocusCont').classList.remove('hidden');
            } else {
                document.getElementById('manualFocusCont').classList.add('hidden');
                videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
            }
        }

        function setManualFocus(val) {
            if(!videoTrack) return;
            videoTrack.applyConstraints({ advanced: [{ focusMode: "manual", focusDistance: val/100 }] });
        }

        function updateVisualFilters() {
            const br = document.getElementById('brSlider').value;
            const ct = document.getElementById('ctSlider').value;
            const video = document.getElementById('scannerVideo');
            video.style.filter = bwMode !== 'off' ? `brightness(${br}%) contrast(${ct}%) grayscale(1)` : 'none';
        }

        function setBWMode(mode) {
            bwMode = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('bw-' + mode).classList.add('active');
            
            const manualGroup = document.getElementById('manualBWControls');
            if(mode === 'manual') {
                manualGroup.classList.remove('hidden');
            } else {
                manualGroup.classList.add('hidden');
                if(mode === 'auto') {
                    document.getElementById('brSlider').value = 130;
                    document.getElementById('ctSlider').value = 150;
                } else {
                    document.getElementById('brSlider').value = 100;
                    document.getElementById('ctSlider').value = 100;
                }
            }
            updateVisualFilters();
        }

        // --- FORM & DATABASE ---
        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    photoBase64 = e.target.result;
                    document.getElementById('imgPrev').src = photoBase64;
                    document.getElementById('imgPrev').classList.remove('hidden');
                    document.getElementById('btnRemovePhoto').classList.remove('hidden');
                    document.getElementById('photoStatus').innerText = "FOTO SIAP";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            photoBase64 = "";
            document.getElementById('imgPrev').classList.add('hidden');
            document.getElementById('btnRemovePhoto').classList.add('hidden');
            document.getElementById('housePhoto').value = "";
            document.getElementById('photoStatus').innerText = "FOTO RUMAH";
        }

        function saveData() {
            const id = document.getElementById('editId').value || Date.now();
            const data = {
                area: document.getElementById('custArea').value,
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                maps: document.getElementById('custMaps').value,
                photo: photoBase64,
                driver: currentUser,
                status: 'active',
                time: Date.now()
            };

            if(!data.area || !data.name || !data.phone) return alert("Lengkapi data!");
            
            db.ref('customers/' + id).update(data).then(() => {
                alert("Berhasil disimpan!");
                cancelEdit();
                showPage('list');
            });
        }

        function updateStatus(id, stat) {
            db.ref('customers/' + id).update({ status: stat });
        }

        function editData(id) {
            const d = allData[id];
            document.getElementById('editId').value = id;
            document.getElementById('custArea').value = d.area;
            document.getElementById('custName').value = d.name;
            document.getElementById('custPhone').value = d.phone;
            document.getElementById('custMaps').value = d.maps;
            if(d.photo) {
                photoBase64 = d.photo;
                document.getElementById('imgPrev').src = d.photo;
                document.getElementById('imgPrev').classList.remove('hidden');
                document.getElementById('btnRemovePhoto').classList.remove('hidden');
            }
            document.getElementById('formTitle').innerText = "Edit Antaran";
            document.getElementById('cancelBtn').classList.remove('hidden');
            showPage('add');
        }

        function cancelEdit() {
            document.getElementById('editId').value = "";
            document.getElementById('custArea').value = "";
            document.getElementById('custName').value = "";
            document.getElementById('custPhone').value = "";
            document.getElementById('custMaps').value = "";
            removePhoto();
            document.getElementById('formTitle').innerText = "Tambah Antaran";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function updateTimers() { render(); }

        function viewImage(src, name) {
            if(!src) return alert("Tidak ada foto!");
            const modal = document.getElementById('imgModal');
            const img = document.getElementById('fullImg');
            const cap = document.getElementById('modalCaption');
            img.src = src;
            cap.innerText = name;
            modal.style.display = 'flex';
        }

        function clearAllHistory() {
            if (confirm("Apakah yakin ingin menghapus SEMUA data history?")) {
                const doneItems = Object.keys(allData).filter(id => allData[id].status === 'done');
                if (doneItems.length === 0) return alert("Tidak ada data history.");
                doneItems.forEach(id => db.ref('customers/' + id).remove());
                alert("History dikosongkan.");
            }
        }
    </script>
</body>
</html>
