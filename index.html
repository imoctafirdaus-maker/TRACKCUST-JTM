<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        #page-chat { background-color: #f0f2f5; }
        .wa-card { background: white; padding: 1.5rem; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }

        .driver-badge { background: #ebf5ff; color: #006491; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; border: 1px solid #006491; }
        
        .qr-container { background: white; padding: 8px; border-radius: 12px; border: 2px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .qr-container:active { transform: scale(0.95); background: #f8fafc; }
        
        #fullImg.qr-large { padding: 20px; background: white; border-radius: 20px; }

        /* Scanner Styles */
        .scanner-container { position: relative; width: 100%; height: 200px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; border: 30px solid rgba(0,0,0,0.5); pointer-events: none; display: none; }
        .scanner-box { width: 100%; height: 100%; border: 2px solid #e31837; position: relative; }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; shadow: 0 0 10px #e31837; top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .cam-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .control-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-zoom { flex: 1; padding: 6px; background: white; border: 2px solid #006491; color: #006491; border-radius: 8px; font-size: 10px; font-weight: 900; }
        .btn-zoom.active { background: #006491; color: white; }

        .loader-ocr { border: 3px solid #f3f3f3; border-top: 3px solid #006491; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .visual-slider { flex: 1; accent-color: #006491; height: 4px; }
        
        .btn-mode { padding: 4px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; border: 1px solid #cbd5e1; background: white; color: #64748b; }
        .btn-mode.active { background: #e31837; color: white; border-color: #e31837; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="imgModal" class="fixed inset-0 bg-black/95 z-[10001] hidden flex-col items-center justify-center p-4" onclick="this.style.display='none'">
        <button class="absolute top-6 right-6 w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-2xl"></i></button>
        <div id="modalContent" class="flex flex-col items-center">
             <img id="fullImg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain">
             <p id="modalCaption" class="text-white mt-4 font-black italic uppercase tracking-widest"></p>
        </div>
    </div>

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>

            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>
        
        <div id="onlineBar" class="bg-blue-900/10 px-4 py-1 flex gap-2 overflow-x-auto text-[8px] font-black text-blue-900 uppercase italic"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Nama/HP/Driver/Area..." class="w-2/3 p-3 rounded-xl shadow-sm outline-none font-bold italic text-sm">
                    <div id="countActive" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black italic">0 AKTIF</div>
                </div>

            </div>

            <div id="page-history" class="page p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-4 bg-gray-100 p-3 rounded-2xl border-b-2 border-gray-200">
                    <h3 class="font-black text-blue-900 uppercase italic text-[11px]">Daftar Selesai</h3>
                    <button onclick="clearAllHistory()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-md active:scale-95 transition-all">

            <div id="page-add" class="page p-4 overflow-y-auto">

                    <input type="hidden" id="editId">
                    <input type="text" id="custArea" placeholder="KODE AREA (A-1)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold uppercase outline-none">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    
                    <div class="bg-blue-50 p-4 rounded-xl border-2 border-dashed border-blue-200 text-center relative">
                        <label class="cursor-pointer">
                            <i class="fa fa-camera text-blue-400 text-xl"></i>

                    </div>
                    <button onclick="saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm">Simpan</button>
                    <button onclick="cancelEdit()" id="cancelBtn" class="hidden w-full bg-gray-400 text-white py-3 rounded-xl font-bold uppercase text-[10px]">Batal</button>
                </div>

            <div id="page-chat" class="page h-full items-center p-4 bg-gray-100 overflow-y-auto">

                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-2 shadow-lg">

                    <div class="scanner-container">

                        <div id="scannerOverlay" class="scanner-overlay">
                            <div class="scanner-box">
                                <div class="laser"></div>
                            </div>

                    </div>

                    <div id="camControls" class="hidden cam-controls text-left">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[9px] font-black text-blue-900 uppercase">Mode BW:</span>
                            <div class="flex gap-1">
                                <button onclick="setBWMode('off')" id="bw-off" class="btn-mode active">OFF</button>
                                <button onclick="setBWMode('auto')" id="bw-auto" class="btn-mode">AUTO</button>
                                <button onclick="setBWMode('manual')" id="bw-manual" class="btn-mode">MANUAL</button>
                            </div>
                        </div>

                        <div id="manualBWControls" class="hidden grid grid-cols-2 gap-2 mb-2 p-2 bg-white rounded-xl border border-gray-100">
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Cahaya (BR):</span>
                                <input type="range" id="brSlider" min="50" max="200" value="100" oninput="updateVisualFilters()" class="visual-slider">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Kontras (CT):</span>
                                <input type="range" id="ctSlider" min="50" max="200" value="100" oninput="updateVisualFilters()" class="visual-slider">
                            </div>
                        </div>

                        <div class="control-group">
                            <span class="text-[9px] font-black text-blue-900 italic uppercase">Zoom:</span>
                            <button onclick="setZoom(1)" id="z1" class="btn-zoom active">1x</button>
                            <button onclick="setZoom(2)" id="z2" class="btn-zoom">2x</button>
                            <button onclick="setZoom(3)" id="z3" class="btn-zoom">3x</button>
                        </div>
                        <div class="control-group">
                            <span class="text-[9px] font-black text-blue-900 italic uppercase">Fokus:</span>
                            <select onchange="setFocusMode(this.value)" class="flex-1 p-1 rounded-lg text-[9px] font-bold border-2 border-blue-900 outline-none">
                                <option value="continuous">Otomatis</option>
                                <option value="manual">Manual</option>
                            </select>
                        </div>
                        <div id="manualFocusCont" class="hidden flex flex-col gap-1">
                            <input type="range" id="focusSlider" min="0" max="100" value="50" oninput="setManualFocus(this.value)" class="w-full accent-red-600">
                            <span class="text-[7px] font-black text-gray-400 uppercase tracking-tighter text-center">Geser Slider untuk Fokus Manual</span>
                        </div>
                    </div>

                    <div class="flex gap-2 mb-3">
                        <button id="btnStartCam" onclick="startCamera()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-video mr-1"></i> Buka Kamera
                        </button>
                        <button id="btnStopCam" onclick="stopCamera()" class="hidden flex-1 bg-gray-500 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-video-slash mr-1"></i> Tutup
                        </button>
                        <button onclick="captureAndScan()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[10px] shadow-md">
                            <i class="fa fa-expand mr-1"></i> Scan Nomor
                        </button>
                    </div>

                    <div id="ocrLoading" class="hidden mb-3 text-[9px] font-bold text-blue-900 uppercase italic">
                        <div class="loader-ocr"></div> Meredam Silau & Membaca...

                    <input type="tel" id="waDirectNumber" placeholder="Input Nomor Manual" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-sm mb-3">
                    
                    <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-3 rounded-xl font-black uppercase text-xs shadow-md mb-4">
                        Chat Pelanggan

                    <div id="scanResultArea" class="hidden text-left border-t-2 border-gray-100 pt-4">

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>

            <div onclick="showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>WA Direct</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        // Database & Login
        const userPins = { 
            "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Pak Ageng (Mgt)": "4444",
            "Sintiya (Cashier)": "0959", "Ridha (Cashier)": "0968", "Okta": "0972", 
            "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967",
            "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Rafli ramadhan": "0929"
        };

        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; let photoBase64 = "";
        let stream = null;
        let videoTrack = null;
        let bwMode = 'off'; 
        
        let isScanning = false; 
        let autoScanInterval = null;
        let isSaving = false; // Flag untuk mencegah data ganda

        window.onload = () => {
            const logSel = document.getElementById('selectUser');
            logSel.innerHTML = '<option value="">-- PILIH NAMA --</option>';
            Object.keys(userPins).forEach(n => logSel.innerHTML += `<option value="${n}">${n}</option>`);
            if(currentUser) bukaApp(currentUser);
            setInterval(updateTimers, 1000);
            updatePresence();
        };

        function clearAllHistory() {
            if (confirm("Apakah yakin anda ingin menghapus SEMUA data history yang sudah selesai?")) {
                const doneItems = Object.keys(allData).filter(id => allData[id].status === 'done');
                if (doneItems.length === 0) return alert("Tidak ada data history untuk dihapus.");
                
                doneItems.forEach(id => {
                    db.ref('customers/' + id).remove();
                });
                alert("History berhasil dikosongkan.");
            }
        }

        function setBWMode(mode) {
            bwMode = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('bw-' + mode).classList.add('active');
            
            const manualBox = document.getElementById('manualBWControls');
            if(mode === 'manual') {
                manualBox.classList.remove('hidden');
            } else {
                manualBox.classList.add('hidden');
            }
            updateVisualFilters();
        }

        function updateVisualFilters() {
            const video = document.getElementById('scannerVideo');
            if(!video) return;

            if(bwMode === 'manual') {
                const br = document.getElementById('brSlider').value;
                const ct = document.getElementById('ctSlider').value;
                video.style.filter = `grayscale(100%) brightness(${br}%) contrast(${ct}%)`;
            } else if(bwMode === 'auto') {
                video.style.filter = `grayscale(100%) contrast(150%)`;
            } else {
                video.style.filter = `none`;
            }
        }

        async function startCamera() {
            const video = document.getElementById('scannerVideo');
            const overlay = document.getElementById('scannerOverlay');
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];

                document.getElementById('btnStartCam').classList.add('hidden');
                document.getElementById('btnStopCam').classList.remove('hidden');
                document.getElementById('camControls').classList.remove('hidden');
                
                overlay.style.display = 'block';

                document.getElementById('brSlider').value = 100;
                document.getElementById('ctSlider').value = 100;
                updateVisualFilters();
                
                startAutoScan();

            } catch (err) {
                alert("Izin kamera ditolak.");
            }
        }

        function stopCamera() {
            const overlay = document.getElementById('scannerOverlay');
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                videoTrack = null;
                document.getElementById('scannerVideo').srcObject = null;
                document.getElementById('btnStartCam').classList.remove('hidden');
                document.getElementById('btnStopCam').classList.add('hidden');
                document.getElementById('camControls').classList.add('hidden');
                
                if(overlay) overlay.style.display = 'none';
                
                clearInterval(autoScanInterval);
                autoScanInterval = null;
            }
        }

        function setZoom(level) {
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.zoom) {
                const max = capabilities.zoom.max || 1;
                let val = Math.min(level, max);
                videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
                
                document.querySelectorAll('.btn-zoom').forEach(b => b.classList.remove('active'));
                document.getElementById('z'+level).classList.add('active');
            } else {
                alert("Zoom tidak didukung di perangkat ini.");
            }
        }

        function setFocusMode(mode) {
            if (!videoTrack) return;
            const manualCont = document.getElementById('manualFocusCont');
            if (mode === 'manual') {
                manualCont.classList.remove('hidden');
                videoTrack.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: 50 }] });
            } else {
                manualCont.classList.add('hidden');
                videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
            }
        }

        function setManualFocus(val) {
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.focusDistance) {
                const min = capabilities.focusDistance.min || 0;
                const max = capabilities.focusDistance.max || 100;
                const distance = min + (val / 100) * (max - min);
                videoTrack.applyConstraints({ advanced: [{ focusMode: 'manual', focusDistance: distance }] });
            }
        }

        async function startAutoScan() {
            if (autoScanInterval) return;
            autoScanInterval = setInterval(async () => {
                if (isScanning || !stream) return;
                isScanning = true;
                const video = document.getElementById('scannerVideo');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.filter = video.style.filter;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                try {
                    const result = await Tesseract.recognize(dataUrl, 'eng');
                    const text = result.data.text;
                    const phoneMatches = text.match(/(?:\+62|62|08)[0-9\-\(\)\s]{8,15}/g);
                    if (phoneMatches && phoneMatches.length > 0) {
                        let cleanNumber = phoneMatches[0].replace(/\D/g, '');
                        if (cleanNumber.length >= 10 && document.getElementById('waDirectNumber').value !== cleanNumber) {
                            document.getElementById('waDirectNumber').value = cleanNumber;
                            document.querySelector('.scanner-box').style.borderColor = '#22c55e';
                            setTimeout(() => { document.querySelector('.scanner-box').style.borderColor = '#e31837'; }, 500);
                            renderAddressTable(phoneMatches);
                        }
                    }
                } catch (err) { console.error("AutoScan Error:", err); } finally { isScanning = false; }
            }, 2000);
        }

        function renderAddressTable(matches) {
            const tableBody = document.getElementById('addressTableBody');
            const resultArea = document.getElementById('scanResultArea');
            tableBody.innerHTML = '';
            const uniqueNumbers = [...new Set(matches.map(m => m.replace(/\D/g, '')))];
            uniqueNumbers.forEach(num => {
                if (num.length < 10) return;
                let cleanNum = num;
                if (cleanNum.startsWith('0')) cleanNum = '62' + cleanNum.slice(1);
                else if (cleanNum.startsWith('8')) cleanNum = '62' + cleanNum;
                tableBody.innerHTML += `
                    <tr>
                        <td class="p-3 text-center text-blue-900 text-sm font-black">${num}</td>
                        <td class="p-3 text-center">
                            <button onclick="openWaLinkCustom('${cleanNum}')" class="bg-green-500 text-white w-8 h-8 rounded-lg shadow-md">
                                <i class="fab fa-whatsapp"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            resultArea.classList.remove('hidden');
        }

        async function captureAndScan() {
            const video = document.getElementById('scannerVideo');
            if (!video.srcObject) return alert("Buka kamera dulu!");

            const loading = document.getElementById('ocrLoading');
            const tableBody = document.getElementById('addressTableBody');
            const directInput = document.getElementById('waDirectNumber');
            const tableArea = document.getElementById('scanResultArea');

            loading.classList.remove('hidden');
            directInput.value = "Processing...";

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            if(bwMode === 'auto') {
                ctx.drawImage(video, 0, 0);
                const rawData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let brightness = 0;
                for (let i = 0; i < rawData.length; i += 4) {
                    brightness += (0.299 * rawData[i] + 0.587 * rawData[i+1] + 0.114 * rawData[i+2]);
                }
                const avgBrightness = brightness / (canvas.width * canvas.height);
                let finalContrast = 400;   
                let finalBrightness = 110; 
                if (avgBrightness > 160) { finalBrightness = 65; finalContrast = 700; }
                ctx.filter = `grayscale(100%) contrast(${finalContrast}%) brightness(${finalBrightness}%)`;
            } else if(bwMode === 'manual') {
                const br = document.getElementById('brSlider').value;
                const ct = document.getElementById('ctSlider').value;
                ctx.filter = `grayscale(100%) brightness(${br}%) contrast(${ct}%)`;
            } else {
                ctx.filter = 'none';
            }

            ctx.drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 1.0);

            try {
                const result = await Tesseract.recognize(dataUrl, 'eng', {
                    tessedit_char_whitelist: '0123456789()- ',
                    tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT 
                });

                const rawText = result.data.text;
                const phoneRegex = /(\+?62|08|021|\(\d{3,4}\))[\s-]?\d{3,4}[\s-]?\d{3,5}/g;
                const matches = rawText.match(phoneRegex);

                tableBody.innerHTML = "";
                
                if (matches && matches.length > 0) {
                    const uniqueMatches = [...new Set(matches)];
                    uniqueMatches.forEach((match, idx) => {
                        let cleanNum = match.replace(/\D/g, ''); 
                        if (cleanNum.startsWith('0')) cleanNum = '62' + cleanNum.slice(1);
                        else if (cleanNum.startsWith('8')) cleanNum = '62' + cleanNum;

                        if(idx === 0) directInput.value = cleanNum;

                        tableBody.innerHTML += `
                            <tr>
                                <td class="p-3 text-center text-blue-900 text-sm font-black">${match}</td>
                                <td class="p-3 text-center">
                                    <button onclick="openWaLinkCustom('${cleanNum}')" class="bg-green-500 text-white w-8 h-8 rounded-lg shadow-md"><i class="fab fa-whatsapp"></i></button>
                                </td>
                            </tr>`;
                    });
                    tableArea.classList.remove('hidden');
                    if (navigator.vibrate) navigator.vibrate(100);
                } else {
                    alert("Gagal membaca. Gunakan Zoom atau Manual BW Mode!");
                    directInput.value = "";
                }
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function openWaLinkCustom(num) {
            const msg = `Halo Bapak/Ibu, saya ${currentUser} dari Domino's pizza jatimakmur, ingin mengantarkan pesanan, boleh minta share lokasinya Pak/Bu? Agar pengantaran lebih cepat, terimakasih 😊`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function openWaDirect() {
            let num = document.getElementById('waDirectNumber').value;
            if(!num || num === "Processing...") return alert("Nomor Kosong!");
            let waNum = num.replace(/\D/g, '');
            if(waNum.startsWith('0')) waNum = '62' + waNum.slice(1);
            if(waNum.startsWith('8')) waNum = '62' + waNum;
            openWaLinkCustom(waNum);
        }

        function updatePresence() {
            if(!currentUser) return;
            const ref = db.ref('presence/' + currentUser);
            ref.set(true);
            ref.onDisconnect().remove();
            db.ref('presence').on('value', s => {
                const el = document.getElementById('onlineBar');
                el.innerHTML = "";
                s.forEach(u => el.innerHTML += `<span class="flex items-center gap-1"><i class="fa fa-circle text-[5px] text-green-500"></i> ${u.key}</span>`);
            });
        }

        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(p === userPins[u]) { bukaApp(u); updatePresence(); } else alert("PIN SALAH!");
        }

        function bukaApp(n) {
            currentUser = n; localStorage.setItem('jtm_user', n);
            document.getElementById('userDisplay').innerText = n;
            document.getElementById('pinOverlay').style.display = "none";
            document.getElementById('mainContent').style.display = "flex";
            startDataListeners();
        }

        function handleLogout() { if(confirm("Keluar?")) { db.ref('presence/'+currentUser).remove(); localStorage.removeItem('jtm_user'); location.reload(); } }

        function startDataListeners() {
            db.ref('customers').on('value', s => { allData = s.val() || {}; render(); });
        }

        function render() {
            const list = document.getElementById('activeList'); const hist = document.getElementById('historyList');
            const filter = document.getElementById('searchInput').value.toLowerCase();
            let activeCount = 0; list.innerHTML = ""; hist.innerHTML = "";

            Object.keys(allData).reverse().forEach(id => {
                const i = allData[id];
                const searchStr = `${i.name} ${i.phone} ${i.driverBy || ''} ${i.area}`.toLowerCase();
                const match = searchStr.includes(filter);
                if(i.status !== 'done') activeCount++;
                
                let formattedPhone = (i.phone || "").replace(/\D/g, '');
                if(formattedPhone.startsWith('0')) formattedPhone = '62' + formattedPhone.slice(1);
                const msgWa = `Halo Bapak/Ibu ${i.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar , mohon untuk tetap aktif WhatsApp ya, Terimakasih ☺️`;
                const waLink = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(msgWa)}`;

                const cardHtml = `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border-l-8 ${i.status==='done'?'border-gray-300':'border-red-500'}">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <p class="text-[8px] font-black text-red-500 uppercase italic">${i.area}</p>
                                <h3 class="font-black text-blue-900 text-sm leading-tight">${i.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <p id="timer-${id}" class="text-[10px] font-bold text-gray-400 italic">${i.status==='done'?'SELESAI':'READY'}</p>
                                    ${i.driverBy ? `<span class="driver-badge">${i.driverBy}</span>` : ''}
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${i.status !== 'done' ? `
                                    <button onclick="editData('${id}')" class="text-blue-500 bg-blue-50 w-7 h-7 rounded-lg flex items-center justify-center"><i class="fa fa-edit text-[10px]"></i></button>
                                    <button onclick="secureDelete('${id}')" class="text-red-500 bg-red-50 w-7 h-7 rounded-lg flex items-center justify-center"><i class="fa fa-trash text-[10px]"></i></button>
                                    <button onclick="setStatus('${id}','done')" class="bg-yellow-400 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-md"><i class="fa fa-check"></i></button>
                                    <button onclick="goOTW('${id}')" class="w-9 h-9 rounded-xl flex items-center justify-center ${i.status==='otw'?'bg-gray-100 text-gray-400':'bg-blue-500 text-white shadow-md'}"><i class="fa fa-motorcycle"></i></button>
                                ` : `<button onclick="setStatus('${id}','active')" class="bg-gray-100 text-gray-400 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa fa-undo"></i></button>`}
                            </div>
                        </div>
                        <div class="flex gap-3 mt-3 ${i.status==='done'?'hidden':''}">
                            ${i.maps ? `<div class="qr-container cursor-pointer" onclick="openFullQR('${id}', '${i.name}')"><div id="qrcode-${id}"></div><p class="text-[7px] font-black mt-1 text-blue-900 uppercase">SCAN MAPS</p></div>` : ''}
                            ${i.photo ? `<img src="${i.photo}" onclick="openFullImg('${i.photo}', 'FOTO RUMAH - ${i.name}')" class="flex-1 h-20 object-cover rounded-xl border cursor-pointer">` : ''}
                        </div>
                        <div class="flex gap-2 mt-3 ${i.status==='done'?'hidden':''}">
                            <a href="${i.maps}" target="_blank" class="dominos-blue text-white py-2 rounded-lg text-center font-bold text-[9px] flex-1 italic uppercase"><i class="fa fa-map-marker-alt mr-1"></i> Buka Maps</a>
                            <a href="${waLink}" target="_blank" class="bg-green-500 text-white py-2 rounded-lg text-center font-bold text-[9px] flex-1 italic uppercase"><i class="fab fa-whatsapp mr-1"></i> Chat WA</a>
                        </div>
                    </div>`;

                if(i.status === 'done') { hist.innerHTML += cardHtml; } 
                else { 
                    if(match) {
                        list.innerHTML += cardHtml;
                        if(i.maps) {
                            setTimeout(() => {
                                const el = document.getElementById(`qrcode-${id}`);
                                if(el && el.innerHTML === "") {
                                    new QRCode(el, { text: i.maps, width: 60, height: 60, colorDark: "#006491", correctLevel : QRCode.CorrectLevel.H });
                                }
                            }, 50);
                        }
                    }
                }
            });
            document.getElementById('countActive').innerText = `${activeCount} AKTIF`;
        }

        function openFullQR(id, custName) {
            const tempDiv = document.createElement('div');
            new QRCode(tempDiv, { text: allData[id].maps, width: 1000, height: 1000, colorDark: "#000000", correctLevel : QRCode.CorrectLevel.H });
            setTimeout(() => {
                const largeQr = tempDiv.querySelector('canvas').toDataURL();
                const img = document.getElementById('fullImg');
                img.src = largeQr; img.className = "max-w-full max-h-[70vh] rounded-lg shadow-2xl object-contain qr-large";
                document.getElementById('modalCaption').innerText = "SCAN LOKASI: " + custName.toUpperCase();
                document.getElementById('imgModal').style.display = 'flex';
            }, 100);
        }

        function openFullImg(url, caption = "") { 
            const img = document.getElementById('fullImg');
            img.src = url; img.className = "max-w-full max-h-[85vh] rounded-lg shadow-2xl object-contain";
            document.getElementById('modalCaption').innerText = caption;
            document.getElementById('imgModal').style.display = 'flex'; 
        }

        function secureDelete(id) {
            const p = prompt("PIN KONFIRMASI:");
            if(p === userPins[currentUser]) { db.ref('customers/' + id).remove(); } else if(p !== null) { alert("PIN SALAH!"); }
        }

        function processImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        const prev = document.getElementById('imgPrev');
                        prev.src = photoBase64; prev.classList.remove('hidden');
                        document.getElementById('btnRemovePhoto').classList.remove('hidden');
                        document.getElementById('photoStatus').innerText = "FOTO SIAP!";
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            photoBase64 = ""; document.getElementById('imgPrev').classList.add('hidden');
            document.getElementById('btnRemovePhoto').classList.add('hidden');
            document.getElementById('photoStatus').innerText = "Foto Rumah";
            document.getElementById('housePhoto').value = "";
        }

        function saveData() {
            if (isSaving) return;

            const area = document.getElementById('custArea').value;
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const editId = document.getElementById('editId').value;
            const saveBtn = document.getElementById('saveBtn');

            if(!area || !name) return alert("Isi Area & Nama!");

            // Fitur Tolak Nomor Duplikat di List Aktif
            if (!editId && phone) {
                const cleanInputPhone = phone.replace(/\D/g, '');
                const isDuplicate = Object.values(allData).some(item => {
                    if (item.status !== 'done') {
                        const existingPhone = (item.phone || "").replace(/\D/g, '');
                        return existingPhone === cleanInputPhone && cleanInputPhone !== "";
                    }
                    return false;
                });

                if (isDuplicate) {
                    alert("Gagal! Nomor HP ini sudah ada dalam daftar antaran AKTIF.");
                    return; 
                }
            }

            isSaving = true;
            saveBtn.disabled = true;
            saveBtn.innerText = "SEDANG MENYIMPAN...";
            saveBtn.classList.replace('dominos-red', 'bg-gray-400');

            const data = { area: area.toUpperCase(), name, phone, maps: document.getElementById('custMaps').value, photo: photoBase64, status: 'active', timestamp: Date.now() };
            
            const ref = editId ? db.ref('customers/'+editId).update(data) : db.ref('customers').push(data);
            
            ref.then(() => {
                resetForm();
            }).catch((err) => {
                alert("Gagal: " + err.message);
            }).finally(() => {
                isSaving = false;
                saveBtn.disabled = false;
                saveBtn.innerText = "Simpan";
                saveBtn.classList.replace('bg-gray-400', 'dominos-red');
            });
        }

        function editData(id) {
            const i = allData[id];
            document.getElementById('editId').value = id;
            document.getElementById('custArea').value = i.area;
            document.getElementById('custName').value = i.name;
            document.getElementById('custPhone').value = i.phone;
            document.getElementById('custMaps').value = i.maps;
            if(i.photo) { photoBase64 = i.photo; document.getElementById('imgPrev').src = i.photo; document.getElementById('imgPrev').classList.remove('hidden'); document.getElementById('btnRemovePhoto').classList.remove('hidden'); }
            document.getElementById('formTitle').innerText = "Edit Antaran";
            document.getElementById('cancelBtn').classList.remove('hidden');
            showPage('add');
        }

        function resetForm() {
            document.getElementById('editId').value = ""; document.getElementById('custArea').value = ""; document.getElementById('custName').value = "";
            document.getElementById('custPhone').value = ""; document.getElementById('custMaps').value = "";
            removePhoto(); document.getElementById('formTitle').innerText = "Tambah Antaran";
            document.getElementById('cancelBtn').classList.add('hidden');
            showPage('list');
            
            isSaving = false;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = false;
            saveBtn.innerText = "Simpan";
            saveBtn.classList.add('dominos-red');
        }

        function cancelEdit() { resetForm(); }
        function goOTW(id) { if(allData[id].status !== 'otw') db.ref('customers/'+id).update({ status: 'otw', startTime: Date.now(), driverBy: currentUser }); }
        function setStatus(id, stat) { db.ref('customers/'+id).update({ status: stat }); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-'+id)?.classList.add('active');
            
            if(id !== 'chat') {
                stopCamera();
            }
        }

        function updateTimers() {
            Object.keys(allData).forEach(id => {
                if(allData[id].status === 'otw') {
                    const elapsed = Math.floor((Date.now() - allData[id].startTime) / 1000);
                    const remaining = (20 * 60) - elapsed;
                    const el = document.getElementById('timer-'+id);
                    if(el) {
                        const m = Math.max(0, Math.floor(remaining / 60));
                        const s = Math.max(0, remaining % 60);
                        el.innerText = `${m}:${s < 10 ? '0'+s : s} MENIT`;
                        if(remaining < 0) el.classList.replace('text-gray-400', 'text-red-600');
                    }
                }
            });
        }
    </script>
</body>
