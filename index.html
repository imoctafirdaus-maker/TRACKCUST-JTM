<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 50px !important; height: 50px; border-radius: 50%; margin-top: -25px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        #map { height: 100%; width: 100%; background: #f1f5f9; z-index: 1; }

        .wa-card { background: white; padding: 1.5rem; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .driver-badge { background: #ebf5ff; color: #006491; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; border: 1px solid #006491; }
        .qr-container { background: white; padding: 8px; border-radius: 12px; border: 2px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        
        /* Scanner Styles Gabungan */
        .scanner-container { position: relative; width: 100%; height: 200px; background: black; border-radius: 1.5rem; overflow: hidden; margin-bottom: 1rem; border: 4px solid #006491; }
        #scannerVideo { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; border: 30px solid rgba(0,0,0,0.5); pointer-events: none; display: none; }
        .scanner-box { width: 100%; height: 100%; border: 2px solid #e31837; position: relative; }
        .laser { position: absolute; width: 100%; height: 2px; background: #e31837; shadow: 0 0 10px #e31837; top: 50%; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .cam-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .btn-zoom { flex: 1; padding: 6px; background: white; border: 2px solid #006491; color: #006491; border-radius: 8px; font-size: 10px; font-weight: 900; }
        .btn-zoom.active { background: #006491; color: white; }
        .btn-mode { padding: 4px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; border: 1px solid #cbd5e1; background: white; color: #64748b; }
        .btn-mode.active { background: #e31837; color: white; border-color: #e31837; }
        .visual-slider { flex: 1; accent-color: #006491; height: 4px; }
        
        #deliveryStatusBar { max-height: 60px; overflow-y: auto; border-bottom: 1px solid #e2e8f0; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="imgModal" class="fixed inset-0 bg-black/95 z-[10001] hidden flex-col items-center justify-center p-4" onclick="this.style.display='none'">
        <div id="modalContent" class="flex flex-col items-center">
             <img id="fullImg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain">
             <p id="modalCaption" class="text-white mt-4 font-black italic uppercase tracking-widest text-center"></p>
        </div>
    </div>

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN 4 DIGIT" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md flex justify-between items-center">
            <h1 class="font-black italic uppercase text-lg">Domino's <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <span id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">User</span>
                <button onclick="location.reload()" class="bg-red-500 w-7 h-7 rounded-full flex items-center justify-center"><i class="fa fa-sync-alt text-[10px]"></i></button>
            </div>
        </nav>
        
        <div id="deliveryStatusBar" class="bg-white px-4 flex flex-col text-[9px] font-black text-blue-900 uppercase italic"></div>
        <div id="onlineBar" class="bg-blue-900/10 px-4 py-1 flex gap-2 overflow-x-auto text-[8px] font-black text-blue-900 uppercase italic"></div>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <input type="text" id="searchInput" onkeyup="TrackCust.render()" placeholder="Cari Antaran..." class="w-2/3 p-3 rounded-xl shadow-sm outline-none font-bold italic text-sm">
                    <div id="countActive" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-black italic">0 AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-maps" class="page h-full relative">
                <div id="map"></div>
                <button onclick="TrackCust.resetMapView()" class="absolute bottom-24 right-4 z-[1000] bg-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center text-blue-900">
                    <i class="fa fa-store text-xl"></i>
                </button>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto">
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-3">
                    <h2 id="formTitle" class="font-black text-blue-900 text-center uppercase text-xs">Tambah Antaran</h2>
                    <input type="hidden" id="editId">
                    <input type="text" id="custArea" placeholder="KODE AREA (A-1)" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold uppercase outline-none">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    
                    <div class="bg-blue-50 p-4 rounded-xl border-2 border-dashed border-blue-200 text-center relative">
                        <label class="cursor-pointer">
                            <i class="fa fa-camera text-blue-400 text-xl"></i>
                            <p class="text-[9px] font-black text-blue-900 uppercase mt-1" id="photoStatus">Foto Rumah</p>
                            <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="TrackCust.processImage(this)">
                        </label>
                        <button onclick="TrackCust.removePhoto()" id="btnRemovePhoto" class="hidden absolute top-2 right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg"><i class="fa fa-times text-[10px]"></i></button>
                        <img id="imgPrev" class="hidden w-full h-32 object-cover rounded-lg mt-2 border-2 border-white">
                    </div>
                    <button onclick="TrackCust.saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase text-sm">Simpan</button>
                </div>
            </div>

            <div id="page-chat" class="page h-full items-center p-4 bg-gray-100 overflow-y-auto">
                <div class="wa-card mb-20 mx-auto">
                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-2 shadow-lg">
                        <i class="fab fa-whatsapp text-white text-2xl"></i>
                    </div>
                    <h2 class="font-black text-blue-900 uppercase italic text-[12px] mb-3">Scanner & Manual Input</h2>
                    
                    <div class="scanner-container">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div id="scannerOverlay" class="scanner-overlay" style="display:none;">
                            <div class="scanner-box">
                                <div class="laser"></div>
                            </div>
                        </div>
                    </div>

                    <div id="camControls" class="hidden cam-controls text-left">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[9px] font-black text-blue-900 uppercase">Mode BW:</span>
                            <div class="flex gap-1">
                                <button onclick="TrackCust.setBWMode('off')" id="bw-off" class="btn-mode active">OFF</button>
                                <button onclick="TrackCust.setBWMode('auto')" id="bw-auto" class="btn-mode">AUTO</button>
                                <button onclick="TrackCust.setBWMode('manual')" id="bw-manual" class="btn-mode">MANUAL</button>
                            </div>
                        </div>
                        <div id="manualBWControls" class="hidden grid grid-cols-2 gap-2 mb-2 p-2 bg-white rounded-xl border border-gray-100">
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Cahaya:</span>
                                <input type="range" id="brSlider" min="50" max="200" value="100" oninput="TrackCust.updateVisualFilters()" class="visual-slider">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-blue-900 uppercase">Kontras:</span>
                                <input type="range" id="ctSlider" min="50" max="200" value="100" oninput="TrackCust.updateVisualFilters()" class="visual-slider">
                            </div>
                        </div>
                        <div class="flex gap-1 mt-1">
                            <button onclick="TrackCust.setZoom(1)" id="z1" class="btn-zoom active">1x</button>
                            <button onclick="TrackCust.setZoom(2)" id="z2" class="btn-zoom">2x</button>
                            <button onclick="TrackCust.setZoom(3)" id="z3" class="btn-zoom">3x</button>
                        </div>
                    </div>

                    <div class="flex gap-2 mb-3">
                        <button id="btnStartCam" onclick="TrackCust.startCamera()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">Buka Kamera</button>
                        <button id="btnStopCam" onclick="TrackCust.stopCamera()" class="hidden flex-1 bg-gray-500 text-white py-3 rounded-xl font-black uppercase text-[10px]">Tutup</button>
                        <button onclick="TrackCust.captureAndScan()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">Scan Nomor</button>
                    </div>

                    <input type="tel" id="waDirectNumber" placeholder="Input Nomor Manual" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-100 outline-none font-black text-center text-blue-900 text-sm mb-3">
                    <button onclick="TrackCust.openWaDirect()" class="w-full bg-green-500 text-white py-3 rounded-xl font-black uppercase text-xs shadow-md mb-4">Chat Pelanggan</button>

                    <div id="scanResultArea" class="hidden text-left border-t-2 border-gray-100 pt-4">
                        <table class="w-full text-[10px] bg-white rounded-lg overflow-hidden border">
                            <tbody id="addressTableBody" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="TrackCust.showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle mb-1 text-xl"></i><span>Antaran</span></div>
            <div onclick="TrackCust.showPage('maps')" class="nav-item" id="nav-maps"><i class="fa fa-map-marked-alt mb-1 text-xl"></i><span>Peta JTM</span></div>
            <div onclick="TrackCust.showPage('add')" class="nav-item nav-add" id="nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="TrackCust.showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp mb-1 text-xl"></i><span>WA Direct</span></div>
            <div onclick="TrackCust.handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        const TrackCust = (() => {
            const userPins = { 
                "Pak KUR (Mgt)": "0000", "Pak Agus (Mgt)": "6413", "Pak Ageng (Mgt)": "4444",
                "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Sadewa": "0976"
            };
            const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
            
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            let currentUser = localStorage.getItem('jtm_user') || "";
            let allData = {};
            let photoBase64 = "";
            let stream = null;
            let videoTrack = null;
            let bwMode = 'off';
            
            let map, markers = {};
            const jtmLocation = [-6.2848, 106.9284]; 

            function initMap() {
                if (map) return;
                map = L.map('map', { zoomControl: false }).setView(jtmLocation, 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker(jtmLocation).addTo(map).bindPopup("<b>Domino's Jatimakmur</b>");
                listenToTracking();
            }

            function listenToTracking() {
                db.ref('tracking').on('value', snapshot => {
                    Object.values(markers).forEach(m => map.removeLayer(m));
                    markers = {};
                    const trackers = snapshot.val();
                    if (trackers) {
                        Object.keys(trackers).forEach(name => {
                            const data = trackers[name];
                            if (Date.now() < data.expiry) {
                                markers[name] = L.marker([data.lat, data.lng]).addTo(map).bindPopup(`Driver: ${name}`);
                            }
                        });
                    }
                });
            }

            function activateTracking() {
                if (!navigator.geolocation) return;
                navigator.geolocation.getCurrentPosition(pos => {
                    db.ref('tracking/' + currentUser).set({
                        lat: pos.coords.latitude, lng: pos.coords.longitude,
                        expiry: Date.now() + (15 * 60 * 1000)
                    });
                }, null, { enableHighAccuracy: true });
            }

            function init() {
                const logSel = document.getElementById('selectUser');
                logSel.innerHTML = '<option value="">-- PILIH NAMA --</option>';
                Object.keys(userPins).forEach(n => logSel.innerHTML += `<option value="${n}">${n}</option>`);
                if(currentUser) bukaApp(currentUser);
                setInterval(updateTimers, 1000);
            }

            function bukaApp(n) {
                currentUser = n; localStorage.setItem('jtm_user', n);
                document.getElementById('userDisplay').innerText = n;
                document.getElementById('pinOverlay').style.display = "none";
                document.getElementById('mainContent').style.display = "flex";
                startDataListeners();
            }

            function startDataListeners() {
                db.ref('customers').on('value', s => { allData = s.val() || {}; render(); });
                db.ref('presence/' + currentUser).set(true);
                db.ref('presence/' + currentUser).onDisconnect().remove();
                db.ref('presence').on('value', s => {
                    const el = document.getElementById('onlineBar');
                    el.innerHTML = "";
                    s.forEach(u => el.innerHTML += `<span class="flex items-center gap-1"><i class="fa fa-circle text-[5px] text-green-500"></i> ${u.key}</span>`);
                });
                db.ref('delivery_activity').on('value', s => {
                    const bar = document.getElementById('deliveryStatusBar');
                    bar.innerHTML = "";
                    s.forEach(child => {
                        if (Date.now() - child.val().timestamp < 900000) {
                            bar.innerHTML += `<div class="py-1 border-b border-gray-100 italic">(${child.val().name} SEDANG MENGANTAR)</div>`;
                        }
                    });
                });
            }

            function render() {
                const list = document.getElementById('activeList');
                const filter = document.getElementById('searchInput').value.toLowerCase();
                let activeCount = 0; list.innerHTML = "";
                
                Object.keys(allData).reverse().forEach(id => {
                    const i = allData[id];
                    if(i.status === 'done') return;
                    activeCount++;
                    const searchStr = `${i.name} ${i.phone} ${i.area}`.toLowerCase();
                    if(!searchStr.includes(filter)) return;

                    let formattedPhone = (i.phone || "").replace(/\D/g, '');
                    if(formattedPhone.startsWith('0')) formattedPhone = '62' + formattedPhone.slice(1);
                    const msgWa = `Halo Bapak/Ibu ${i.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar , mohon untuk tetap aktif WhatsApp ya, Terimakasih ☺️`;
                    
                    list.innerHTML += `
                        <div class="bg-white rounded-2xl p-4 shadow-sm border-l-8 border-red-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-[8px] font-black text-red-500 uppercase">${i.area}</p>
                                    <h3 class="font-black text-blue-900 text-sm">${i.name}</h3>
                                    <p id="timer-${id}" class="text-[10px] font-bold text-gray-400 italic">READY</p>
                                    ${i.driverBy ? `<span class="driver-badge">${i.driverBy}</span>` : ''}
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="TrackCust.setStatus('${id}','done')" class="bg-yellow-400 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-md"><i class="fa fa-check"></i></button>
                                    <button onclick="TrackCust.goOTW('${id}')" class="w-9 h-9 rounded-xl flex items-center justify-center ${i.status==='otw'?'bg-gray-100 text-gray-400':'bg-blue-500 text-white shadow-md'}"><i class="fa fa-motorcycle"></i></button>
                                </div>
                            </div>
                            <div class="flex gap-3 mt-3">
                                ${i.maps ? `<div class="qr-container cursor-pointer" onclick="TrackCust.openFullQR('${id}', '${i.name}')"><div id="qrcode-${id}"></div></div>` : ''}
                                ${i.photo ? `<img src="${i.photo}" onclick="TrackCust.openFullImg('${i.photo}', '${i.name}')" class="flex-1 h-20 object-cover rounded-xl border">` : ''}
                            </div>
                            <div class="flex gap-2 mt-3">
                                <a href="${i.maps}" target="_blank" class="dominos-blue text-white py-2 rounded-lg text-center font-bold text-[9px] flex-1">MAPS</a>
                                <a href="https://wa.me/${formattedPhone}?text=${encodeURIComponent(msgWa)}" target="_blank" onclick="TrackCust.goOTW('${id}')" class="bg-green-500 text-white py-2 rounded-lg text-center font-bold text-[9px] flex-1">CHAT WA</a>
                            </div>
                        </div>`;
                    
                    if(i.maps) setTimeout(() => {
                        const el = document.getElementById(`qrcode-${id}`);
                        if(el && el.innerHTML === "") new QRCode(el, { text: i.maps, width: 60, height: 60, colorDark: "#006491" });
                    }, 50);
                });
                document.getElementById('countActive').innerText = `${activeCount} AKTIF`;
            }

            // --- SCANNER LOGIC (KEMBALI KE VERSI LAMA) ---
            async function startCamera() {
                const video = document.getElementById('scannerVideo');
                const overlay = document.getElementById('scannerOverlay');
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                    });
                    video.srcObject = stream;
                    videoTrack = stream.getVideoTracks()[0];
                    document.getElementById('btnStartCam').classList.add('hidden');
                    document.getElementById('btnStopCam').classList.remove('hidden');
                    document.getElementById('camControls').classList.remove('hidden');
                    overlay.style.display = 'block';
                    updateVisualFilters();
                } catch (err) { alert("Izin kamera ditolak"); }
            }

            function stopCamera() {
                if (stream) stream.getTracks().forEach(t => t.stop());
                document.getElementById('btnStartCam').classList.remove('hidden');
                document.getElementById('btnStopCam').classList.add('hidden');
                document.getElementById('camControls').classList.add('hidden');
                document.getElementById('scannerOverlay').style.display = 'none';
            }

            function setBWMode(mode) {
                bwMode = mode;
                document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
                document.getElementById('bw-' + mode).classList.add('active');
                if(mode === 'manual') document.getElementById('manualBWControls').classList.remove('hidden');
                else document.getElementById('manualBWControls').classList.add('hidden');
                updateVisualFilters();
            }

            function updateVisualFilters() {
                const video = document.getElementById('scannerVideo');
                if(!video) return;
                if(bwMode === 'manual') {
                    video.style.filter = `grayscale(100%) brightness(${document.getElementById('brSlider').value}%) contrast(${document.getElementById('ctSlider').value}%)`;
                } else if(bwMode === 'auto') video.style.filter = `grayscale(100%) contrast(150%)`;
                else video.style.filter = `none`;
            }

            function setZoom(level) {
                if (!videoTrack) return;
                const caps = videoTrack.getCapabilities();
                if (caps.zoom) {
                    videoTrack.applyConstraints({ advanced: [{ zoom: Math.min(level, caps.zoom.max) }] });
                    document.querySelectorAll('.btn-zoom').forEach(b => b.classList.remove('active'));
                    document.getElementById('z'+level).classList.add('active');
                }
            }

            async function captureAndScan() {
                const video = document.getElementById('scannerVideo');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.filter = video.style.filter;
                ctx.drawImage(video, 0, 0);
                
                try {
                    const result = await Tesseract.recognize(canvas.toDataURL(), 'eng');
                    const matches = result.data.text.match(/(?:\+62|62|08)[0-9\-\(\)\s]{8,15}/g);
                    if (matches) {
                        const clean = matches[0].replace(/\D/g, '');
                        document.getElementById('waDirectNumber').value = clean;
                        renderAddressTable(matches);
                    } else alert("Nomor tidak terbaca, coba lebih dekat atau gunakan BW Mode!");
                } catch(e) { console.error(e); }
            }

            function renderAddressTable(matches) {
                const tableBody = document.getElementById('addressTableBody');
                tableBody.innerHTML = '';
                const unique = [...new Set(matches.map(m => m.replace(/\D/g, '')))];
                unique.forEach(num => {
                    tableBody.innerHTML += `<tr><td class="p-3 text-center text-blue-900 font-black">${num}</td><td class="p-3 text-center"><button onclick="TrackCust.openWaLinkCustom('${num}')" class="bg-green-500 text-white w-8 h-8 rounded-lg"><i class="fab fa-whatsapp"></i></button></td></tr>`;
                });
                document.getElementById('scanResultArea').classList.remove('hidden');
            }

            function openWaLinkCustom(num) {
                let clean = num;
                if(clean.startsWith('0')) clean = '62' + clean.slice(1);
                else if(clean.startsWith('8')) clean = '62' + clean;
                db.ref('delivery_activity/' + currentUser).set({ name: currentUser, timestamp: Date.now() });
                const msg = `Halo Bapak/Ibu, saya ${currentUser} dari Domino's pizza jatimakmur...`;
                window.open(`https://wa.me/${clean}?text=${encodeURIComponent(msg)}`, '_blank');
            }

            // --- SISANYA TETAP SAMA ---
            function showPage(id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-'+id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('nav-'+id)?.classList.add('active');
                if (id === 'maps') { initMap(); setTimeout(() => map.invalidateSize(), 300); }
                if (id !== 'chat') stopCamera();
            }

            function saveData() {
                const area = document.getElementById('custArea').value;
                const name = document.getElementById('custName').value;
                if(!area || !name) return alert("Isi Area & Nama!");
                db.ref('customers').push({ area: area.toUpperCase(), name, phone: document.getElementById('custPhone').value, maps: document.getElementById('custMaps').value, photo: photoBase64, status: 'active', timestamp: Date.now() });
                document.getElementById('custArea').value = ""; document.getElementById('custName').value = ""; removePhoto(); showPage('list');
            }

            function goOTW(id) { 
                if(allData[id].status !== 'otw') {
                    db.ref('customers/'+id).update({ status: 'otw', startTime: Date.now(), driverBy: currentUser });
                    db.ref('delivery_activity/' + currentUser).set({ name: currentUser, timestamp: Date.now() });
                    activateTracking();
                }
            }

            function processImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600; const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH; canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            document.getElementById('imgPrev').src = photoBase64;
                            document.getElementById('imgPrev').classList.remove('hidden');
                            document.getElementById('btnRemovePhoto').classList.remove('hidden');
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            }

            function removePhoto() { photoBase64 = ""; document.getElementById('imgPrev').classList.add('hidden'); document.getElementById('btnRemovePhoto').classList.add('hidden'); }

            function updateTimers() {
                Object.keys(allData).forEach(id => {
                    if(allData[id].status === 'otw') {
                        const rem = (20 * 60) - Math.floor((Date.now() - allData[id].startTime) / 1000);
                        const el = document.getElementById('timer-'+id);
                        if(el) {
                            const m = Math.max(0, Math.floor(rem / 60)); const s = Math.max(0, rem % 60);
                            el.innerText = `${m}:${s < 10 ? '0'+s : s} MENIT`;
                            if(rem < 0) el.className = "text-[10px] font-black text-red-600 italic";
                        }
                    }
                });
            }

            return {
                init, showPage, render, saveData, processImage, removePhoto, goOTW,
                startCamera, stopCamera, setBWMode, updateVisualFilters, setZoom, captureAndScan, openWaLinkCustom,
                openWaDirect: () => openWaLinkCustom(document.getElementById('waDirectNumber').value),
                resetMapView: () => map.setView(jtmLocation, 15),
                setStatus: (id, s) => db.ref('customers/'+id).update({ status: s }),
                handleLogout: () => { localStorage.removeItem('jtm_user'); location.reload(); },
                openFullImg: (url, n) => { document.getElementById('fullImg').src = url; document.getElementById('modalCaption').innerText = n; document.getElementById('imgModal').style.display = 'flex'; },
                openFullQR: (id, n) => {
                    const temp = document.createElement('div');
                    new QRCode(temp, { text: allData[id].maps, width: 400, height: 400 });
                    setTimeout(() => { document.getElementById('fullImg').src = temp.querySelector('canvas').toDataURL(); document.getElementById('modalCaption').innerText = "LOKASI: " + n; document.getElementById('imgModal').style.display = 'flex'; }, 100);
                }
            };
        })();

        window.onload = TrackCust.init;
        window.prosesLogin = () => {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(u && p) { TrackCust.bukaApp(u); localStorage.setItem('jtm_user', u); }
        };
    </script>
</body>
</html>
