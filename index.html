<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src='https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        
        ::-webkit-scrollbar { width: 0; background: transparent; }

        /* Custom UI based on Screenshot */
        .card-container { background: white; border-radius: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #edf2f7; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        
        .btn-plus { width: 60px; height: 60px; background: #006491; color: white; border-radius: 50%; display: flex; items-center; justify-content: center; margin-top: -40px; border: 5px solid #f8fafc; box-shadow: 0 8px 20px rgba(0,100,145,0.3); z-index: 1001; cursor: pointer; }

        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* Map Style */
        #map { height: 100%; width: 100%; border-radius: 0; z-index: 1; }

        /* Scanner Overlay */
        .scanner-frame { position: relative; width: 100%; height: 220px; background: black; border-radius: 2rem; overflow: hidden; border: 4px solid #006491; }
        .laser-line { position: absolute; width: 90%; height: 2px; background: #e31837; left: 5%; top: 50%; animation: scanMove 2s infinite; box-shadow: 0 0 15px #e31837; }
        @keyframes scanMove { 0% { top: 10%; } 100% { top: 90%; } }

        .status-badge { background: #fee2e2; color: #ef4444; padding: 4px 12px; border-radius: 99px; font-weight: 900; font-size: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="pinOverlay" class="fixed inset-0 dominos-blue z-[10000] flex flex-col items-center justify-center p-6">
        <div class="text-center mb-10 text-white">
            <h1 class="font-black italic text-4xl tracking-tighter">DOMINO'S <span class="text-red-400">JTM</span></h1>
        </div>
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <select id="selectUser" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs border border-gray-100"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="INPUT PIN" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-50 rounded-2xl mb-6 outline-none border border-gray-100">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-transform">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <header class="dominos-blue p-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-2">
                <h1 class="text-white font-black italic text-xl tracking-tighter">DOMINO'S <span class="text-red-400">JTM</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-white px-4 py-1.5 rounded-full flex items-center gap-2 shadow-sm">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="userDisplay" class="text-blue-900 font-black uppercase text-[11px]">OKTA</span>
                </div>
                <button onclick="location.reload()" class="bg-red-500 w-9 h-9 rounded-full flex items-center justify-center text-white shadow-md"><i class="fa fa-sync-alt text-sm"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            
            <div id="page-list" class="page active p-4 overflow-y-auto bg-gray-50">
                <div class="flex gap-3 mb-4 items-center">
                    <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari Nama/HP/Driver/Area..." class="flex-1 p-4 rounded-2xl shadow-sm border-none font-bold text-sm outline-none italic">
                    <div class="status-badge"><span id="countActive">0</span> AKTIF</div>
                </div>
                <div id="activeList" class="space-y-4 pb-32">
                    </div>
            </div>

            <div id="page-history" class="page h-full">
                <div id="map"></div>
                <div class="fixed top-24 left-4 right-4 z-[500] bg-white/90 backdrop-blur p-3 rounded-2xl shadow-lg border border-blue-100">
                    <p class="text-[10px] font-black text-blue-900 uppercase italic"><i class="fa fa-location-dot mr-1"></i> Live Tracking Map System</p>
                </div>
            </div>

            <div id="page-add" class="page p-6 overflow-y-auto items-center justify-start pt-10">
                <div class="card-container p-8 w-full max-w-sm space-y-4 border border-blue-50">
                    <h2 class="font-black text-blue-900 text-center uppercase text-sm mb-4">Tambah Antaran</h2>
                    <input type="text" id="custArea" placeholder="KODE AREA (A-1)" class="w-full bg-yellow-50 p-4 rounded-2xl text-sm font-bold uppercase outline-none border border-yellow-100">
                    <input type="text" id="custName" placeholder="Nama Pelanggan" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold outline-none">
                    <input type="tel" id="custPhone" placeholder="Nomor HP" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold outline-none">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-2xl text-sm font-bold outline-none">
                    
                    <div class="bg-blue-50/50 p-6 rounded-2xl border-2 border-dashed border-blue-200 text-center relative">
                        <label class="cursor-pointer flex flex-col items-center">
                            <i class="fa fa-camera text-blue-500 text-2xl mb-2"></i>
                            <span class="text-[10px] font-black text-blue-900 uppercase">Foto Rumah</span>
                            <input type="file" id="housePhoto" accept="image/*" class="hidden" onchange="processImage(this)">
                        </label>
                        <img id="imgPrev" class="hidden w-full h-32 object-cover rounded-xl mt-3 shadow-md">
                    </div>
                    <button onclick="saveData()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg mt-4">Simpan</button>
                </div>
            </div>

            <div id="page-chat" class="page p-6 overflow-y-auto items-center pt-10">
                <div class="card-container p-8 w-full max-w-sm text-center space-y-4">
                    <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto shadow-lg mb-2">
                        <i class="fab fa-whatsapp text-white text-3xl"></i>
                    </div>
                    <h3 class="font-black text-blue-900 uppercase italic text-sm">Scanner & Manual Input</h3>
                    
                    <div class="scanner-frame">
                        <video id="scannerVideo" autoplay playsinline class="w-full h-full object-cover"></video>
                        <div class="laser-line"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="startCamera()" class="bg-blue-600 text-white py-3 rounded-2xl font-black uppercase text-[10px] shadow-md"><i class="fa fa-video mr-1"></i> Buka Kamera</button>
                        <button onclick="captureAndScan()" class="bg-red-600 text-white py-3 rounded-2xl font-black uppercase text-[10px] shadow-md"><i class="fa fa-expand mr-1"></i> Scan Nomor</button>
                    </div>

                    <input type="tel" id="waDirectNumber" placeholder="Input Nomor Manual" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 text-center font-black text-blue-900 outline-none">
                    
                    <button onclick="openWaDirect()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Chat Pelanggan</button>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list">
                <i class="fa fa-motorcycle text-xl mb-1"></i><span>Antaran</span>
            </div>
            <div onclick="showPage('history')" class="nav-item" id="nav-history">
                <i class="fa fa-history text-xl mb-1"></i><span>History</span>
            </div>
            
            <div onclick="showPage('add')" class="btn-plus">
                <i class="fa fa-plus text-2xl"></i>
            </div>

            <div onclick="showPage('chat')" class="nav-item" id="nav-chat">
                <i class="fab fa-whatsapp text-xl mb-1"></i><span>WA Direct</span>
            </div>
            <div onclick="handleLogout()" class="nav-item">
                <i class="fa fa-sign-out-alt text-xl mb-1"></i><span>Out</span>
            </div>
        </div>
    </div>

    <script>
        const userPins = { "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Pak KUR (Mgt)": "0000" };
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let map, photoBase64 = "";

        window.onload = () => {
            const sel = document.getElementById('selectUser');
            Object.keys(userPins).forEach(u => sel.innerHTML += `<option value="${u}">${u}</option>`);
            if(currentUser) bukaApp(currentUser);
            initMap();
            listenFirebase();
        };

        function prosesLogin() {
            const u = document.getElementById('selectUser').value;
            const p = document.getElementById('inputPin').value;
            if(userPins[u] === p) { localStorage.setItem('jtm_user', u); bukaApp(u); }
            else alert("PIN SALAH!");
        }

        function bukaApp(u) {
            currentUser = u;
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('userDisplay').innerText = u;
        }

        function handleLogout() { localStorage.removeItem('jtm_user'); location.reload(); }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            if(p !== 'add') document.getElementById('nav-' + p).classList.add('active');
            if(p === 'history') setTimeout(() => map.invalidateSize(), 200);
        }

        function initMap() {
            map = L.map('map').setView([-6.2297, 106.9255], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([-6.2297, 106.9255]).addTo(map).bindPopup('<b>DOMINO\'S JTM</b>').openPopup();
        }

        function listenFirebase() {
            db.ref('antaran').on('value', snap => {
                const data = snap.val() || {};
                renderList(data);
            });
        }

        function renderList(data) {
            const container = document.getElementById('activeList');
            container.innerHTML = "";
            let count = 0;
            
            Object.values(data).forEach(item => {
                if(item.status === 'Aktif') {
                    count++;
                    const card = `
                        <div class="bg-white rounded-[2rem] p-5 shadow-sm border-l-[6px] border-red-500 relative">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="text-[9px] font-black text-red-500 uppercase">${item.area || 'JATIWARINGIN'}</p>
                                    <h3 class="text-lg font-black text-blue-900">${item.name}</h3>
                                    <p class="text-[10px] font-bold text-gray-400">READY <span class="bg-blue-100 text-blue-600 px-2 rounded">${currentUser}</span></p>
                                </div>
                                <div class="flex gap-2">
                                    <button class="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center"><i class="fa fa-edit text-xs"></i></button>
                                    <button class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center"><i class="fa fa-trash text-xs"></i></button>
                                    <button class="w-10 h-8 bg-yellow-400 text-white rounded-lg flex items-center justify-center shadow-sm"><i class="fa fa-check"></i></button>
                                    <button class="w-10 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-sm"><i class="fa fa-motorcycle"></i></button>
                                </div>
                            </div>
                            <div class="bg-gray-50 rounded-2xl p-4 mb-4 text-center border border-gray-100">
                                <div class="w-24 h-24 bg-white mx-auto mb-1 p-2 rounded-xl shadow-inner flex items-center justify-center">
                                    <i class="fa fa-qrcode text-4xl text-blue-900"></i>
                                </div>
                                <p class="text-[9px] font-black text-blue-900 uppercase">SCAN MAPS</p>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <button class="bg-blue-900 text-white py-3 rounded-xl font-black uppercase text-[10px] italic"><i class="fa fa-location-dot mr-2"></i> Buka Maps</button>
                                <button class="bg-green-500 text-white py-3 rounded-xl font-black uppercase text-[10px] italic"><i class="fab fa-whatsapp mr-2"></i> Chat WA</button>
                            </div>
                        </div>`;
                    container.innerHTML += card;
                }
            });
            document.getElementById('countActive').innerText = count;
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('scannerVideo').srcObject = stream;
        }

        function saveData() {
            const id = Date.now();
            const payload = {
                id: id,
                area: document.getElementById('custArea').value,
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                maps: document.getElementById('custMaps').value,
                status: 'Aktif'
            };
            db.ref('antaran/' + id).set(payload);
            showPage('list');
        }

        function processImage(input) {
            const reader = new FileReader();
            reader.onload = e => {
                photoBase64 = e.target.result;
                document.getElementById('imgPrev').src = photoBase64;
                document.getElementById('imgPrev').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    </script>
</body>
</html>
