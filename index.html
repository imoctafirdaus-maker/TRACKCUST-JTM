<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Anti Duplicate</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#006491">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#006491">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        .history-card { opacity: 0.8; border-left: 4px solid #10b981 !important; background-color: #f0fdf4; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24 font-sans text-gray-800">
    
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <nav class="dominos-blue p-4 text-white flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
        <button onclick="loginProcess()" id="adminBtn" class="bg-white text-blue-900 px-4 py-2 rounded-lg text-[10px] font-black shadow-sm uppercase">Admin Login</button>
    </nav>

    <div id="adminPanel" class="hidden p-4 bg-white border-b-4 border-blue-800 shadow-xl space-y-3">
        <div class="flex justify-between items-center">
            <h2 id="formTitle" class="font-bold text-blue-900 text-xs uppercase italic">Input Antaran Baru</h2>
            <button onclick="cancelEdit()" id="cancelBtn" class="hidden text-[10px] text-red-500 font-bold underline">BATAL EDIT</button>
        </div>
        <input type="hidden" id="editKey">
        <input type="text" id="custArea" placeholder="Area (Jatikramat/Jatimakmur/Benih)" class="w-full border p-3 rounded-xl text-sm font-bold bg-yellow-50 outline-none uppercase">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="custName" placeholder="Nama Pelanggan" class="border p-3 rounded-xl text-sm outline-none">
            <input type="text" id="driverName" placeholder="Nama Driver" class="border p-3 rounded-xl text-sm outline-none bg-blue-50 font-bold uppercase">
        </div>
        <input type="tel" id="custPhone" placeholder="No WA (08...)" class="w-full border p-3 rounded-xl text-sm outline-none">
        <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full border p-3 rounded-xl text-sm outline-none">
        <button id="submitBtn" onclick="checkBeforeSave()" class="w-full dominos-red text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Simpan Ke Cloud</button>
    </div>

    <main class="p-4">
        <div class="relative mb-6">
            <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/Area/Driver/No HP..." class="w-full p-4 pl-12 rounded-2xl shadow-sm outline-none border-none text-sm font-semibold italic">
            <i class="fa fa-search absolute left-4 top-4 text-blue-800 opacity-30"></i>
        </div>
        <div id="activeList" class="space-y-8 mb-10"></div>
        <div class="border-t-2 border-dashed border-gray-300 pt-6">
            <h2 class="text-center text-gray-400 font-black text-[10px] uppercase tracking-[0.2em] mb-4">Riwayat Terantar Selesai</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAZ7twf8SbcK-HqniDnVqT6k8IM3shFtgc",
            authDomain: "trackcust-jtm.firebaseapp.com",
            databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "trackcust-jtm",
            storageBucket: "trackcust-jtm.firebasestorage.app",
            messagingSenderId: "411585432172",
            appId: "1:411585432172:web:2d9ae1655d4e3073e4a649"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPass = localStorage.getItem('adminPass') || "147852";
        let deletePass = "9999";
        let isAdmin = false;
        let firstLoad = true;
        let allData = {};

        db.ref('customers').on('value', (snapshot) => {
            allData = snapshot.val() || {};
            renderContent(allData);
            if (!firstLoad) document.getElementById('notifSound').play().catch(() => {});
            firstLoad = false;
        });

        // FUNGSI CEK NOMOR SAMA
        function checkBeforeSave() {
            const phone = document.getElementById('custPhone').value;
            const editKey = document.getElementById('editKey').value;
            if (!phone) return alert("Nomor WA harus diisi!");
            
            const formattedPhone = phone.startsWith('0') ? '62' + phone.slice(1) : phone;
            
            // Cari apakah nomor sudah ada di daftar 'active'
            let isDuplicate = false;
            let existingName = "";

            Object.keys(allData).forEach(key => {
                if (allData[key].phone === formattedPhone && allData[key].status === 'active' && key !== editKey) {
                    isDuplicate = true;
                    existingName = allData[key].name;
                }
            });

            if (isDuplicate) {
                alert("GAGAL! Nomor ini masih ada dalam antaran aktif atas nama: " + existingName);
            } else {
                saveToCloud(formattedPhone);
            }
        }

        function saveToCloud(formattedPhone) {
            const area = document.getElementById('custArea').value.toUpperCase() || "LAINNYA";
            const name = document.getElementById('custName').value || "Pelanggan";
            const driver = document.getElementById('driverName').value || "Crew";
            const url = document.getElementById('custMaps').value;
            const key = document.getElementById('editKey').value;

            if (url) {
                const data = { area, name, driver, phone: formattedPhone, maps: url, status: 'active' };
                if (key) db.ref('customers/' + key).update(data).then(() => { cancelEdit(); });
                else db.ref('customers').push(data).then(() => { clearForm(); });
            } else { alert("Link Maps harus diisi!"); }
        }

        function setStatus(key, status) {
            db.ref('customers/' + key).update({ status: status });
        }

        function renderContent(data, filter = "") {
            const activeContainer = document.getElementById('activeList');
            const historyContainer = document.getElementById('historyList');
            activeContainer.innerHTML = ""; historyContainer.innerHTML = "";
            
            const activeGroups = {};
            const historyItems = [];

            Object.keys(data).forEach(key => {
                const item = data[key];
                const searchStr = (item.area + item.name + (item.driver || "") + (item.phone || "")).toLowerCase();
                if (searchStr.includes(filter.toLowerCase())) {
                    if (item.status === 'done') historyItems.push({ key, ...item });
                    else {
                        const area = item.area || "LAINNYA";
                        if (!activeGroups[area]) activeGroups[area] = [];
                        activeGroups[area].push({ key, ...item });
                    }
                }
            });

            Object.keys(activeGroups).sort().forEach(area => {
                let html = `<div class="space-y-3"><h2 class="font-black text-blue-900 text-[10px] px-2 uppercase tracking-widest italic">Area: ${area} (${activeGroups[area].length})</h2>`;
                activeGroups[area].reverse().forEach(c => {
                    const textWA = `Halo bapak/ibu ${c.name}, Saya dari Domino's Pizza Jatimakmur ingin mengantarkan pesanan, mohon tetap aktif WhatsApp ya, hingga pesanan tiba, Terimakasih ☺️`;
                    html += `
                        <div class="bg-white rounded-3xl shadow-sm border-l-[6px] border-red-500 p-4">
                            <div class="flex justify-between items-start mb-3">
                                <div><h3 class="font-black text-blue-900 text-xs uppercase">${c.name}</h3><p class="text-[9px] font-bold text-gray-400 italic uppercase">Driver: <span class="text-red-500">${c.driver || 'Crew'}</span></p></div>
                                ${isAdmin ? `<div class="flex gap-4"><button onclick="editCustomer('${c.key}', '${c.area}', '${c.name}', '${c.driver}', '${c.phone}', '${c.maps}')" class="text-blue-400 text-sm"><i class="fa fa-edit"></i></button><button onclick="secureDelete('${c.key}')" class="text-red-200 text-sm"><i class="fa fa-trash"></i></button></div>` : ''}
                            </div>
                            <div class="flex gap-2">
                                <a href="${c.maps}" target="_blank" class="flex-1 dominos-blue text-white py-3 rounded-2xl text-center font-bold text-[9px] uppercase shadow-md">Maps</a>
                                <a href="https://wa.me/${c.phone}?text=${encodeURIComponent(textWA)}" target="_blank" class="flex-1 bg-green-500 text-white py-3 rounded-2xl text-center font-bold text-[9px] uppercase shadow-md">WhatsApp</a>
                                <button onclick="setStatus('${c.key}', 'done')" class="bg-yellow-400 text-white px-4 rounded-2xl font-black text-xs shadow-md">✓</button>
                            </div>
                        </div>`;
                });
                activeContainer.innerHTML += html + `</div>`;
            });

            historyItems.reverse().forEach(c => {
                historyContainer.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 history-card flex justify-between items-center shadow-sm">
                        <div class="flex-1">
                            <p class="font-bold text-gray-800 uppercase text-[10px] leading-tight">${c.name}</p>
                            <p class="text-[8px] text-gray-500 font-bold uppercase">${c.area} | Driver: ${c.driver || 'Crew'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <a href="https://wa.me/${c.phone}" target="_blank" class="text-green-600 text-lg"><i class="fab fa-whatsapp"></i></a>
                            <button onclick="setStatus('${c.key}', 'active')" class="text-blue-500 text-sm"><i class="fa fa-undo"></i></button>
                            ${isAdmin ? `<button onclick="secureDelete('${c.key}')" class="text-red-400 text-sm"><i class="fa fa-trash"></i></button>` : ''}
                        </div>
                    </div>`;
            });
        }

        function editCustomer(key, area, name, driver, phone, maps) {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('editKey').value = key;
            document.getElementById('custArea').value = area;
            document.getElementById('custName').value = name;
            document.getElementById('driverName').value = driver || "";
            document.getElementById('custPhone').value = phone;
            document.getElementById('custMaps').value = maps;
            document.getElementById('formTitle').innerText = "Edit Antaran";
            document.getElementById('submitBtn').innerText = "Update";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() { clearForm(); document.getElementById('adminPanel').classList.add('hidden'); }
        function clearForm() { document.querySelectorAll('input').forEach(i => i.value = ""); document.getElementById('editKey').value = ""; document.getElementById('formTitle').innerText = "Input Antaran Baru"; document.getElementById('submitBtn').innerText = "Simpan Ke Cloud"; }
        function secureDelete(id) { 
            const inputPass = prompt('PIN Hapus (9999):');
            if (inputPass === deletePass) { db.ref('customers/' + id).remove(); alert('Hapus Sukses.'); }
            else if (inputPass !== null) alert('PIN Salah!');
        }
        function loginProcess() { 
            if (!isAdmin) { 
                if (prompt("PIN Admin:") === currentPass) { isAdmin = true; document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('adminBtn').innerText = "Logout Admin"; renderContent(allData); }
            } else location.reload(); 
        }
        function searchData() { renderContent(allData, document.getElementById('searchInput').value); }
    </script>
</body>
</html>
