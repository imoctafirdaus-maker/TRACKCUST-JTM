<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Official</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #edf2f7; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .btn-plus { width: 60px; height: 60px; background: #006491; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: 5px solid #f8fafc; box-shadow: 0 8px 20px rgba(0,100,145,0.3); z-index: 1001; }

        /* Card Style (Identik Foto 2) */
        .cust-card { background: white; border-radius: 1.5rem; padding: 1.25rem; margin-bottom: 1.25rem; border-left: 8px solid #e31837; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .btn-action-sm { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .qr-box { border: 1px solid #e2e8f0; border-radius: 1rem; padding: 10px; width: 110px; text-align: center; background: white; margin-top: 10px; }
        .badge-ready { background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="mainContent" class="flex flex-col h-full">
        <header class="dominos-blue p-4 flex justify-between items-center shadow-md">
            <h1 class="text-white font-black italic text-xl">DOMINO'S <span class="text-red-400">JTM</span></h1>
            <div class="flex items-center gap-2">
                <div class="bg-white px-4 py-1.5 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <span class="text-blue-900 font-black uppercase text-[11px]">OKTA</span>
                </div>
                <button onclick="location.reload()" class="bg-red-500 w-8 h-8 rounded-full flex items-center justify-center text-white"><i class="fa fa-sync-alt text-xs"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative">
            <div id="page-list" class="page active p-4 overflow-y-auto">
                <div class="flex gap-3 mb-6 items-center">
                    <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/HP/Driver/Area..." class="flex-1 p-4 rounded-2xl shadow-sm border-none font-bold text-sm outline-none bg-white">
                    <div class="bg-red-500 text-white px-4 py-2 rounded-xl font-black text-[10px] italic shadow-lg"><span id="countActive">0</span> AKTIF</div>
                </div>
                <div id="activeList" class="pb-32">
                    </div>
            </div>

            <div id="page-history" class="page h-full">
                <div id="map"></div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('list')" class="nav-item active" id="nav-list"><i class="fa fa-motorcycle text-xl mb-1"></i><span>Antaran</span></div>
            <div onclick="showPage('history')" class="nav-item" id="nav-history"><i class="fa fa-history text-xl mb-1"></i><span>History</span></div>
            <div onclick="showPage('add')" class="btn-plus"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" class="nav-item" id="nav-chat"><i class="fab fa-whatsapp text-xl mb-1"></i><span>WA Direct</span></div>
            <div onclick="showPage('out')" class="nav-item"><i class="fa fa-sign-out-alt text-xl mb-1"></i><span>Out</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let map;

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + (p === 'add' || p === 'chat' ? 'list' : p)).classList.add('active');
            if(document.getElementById('nav-' + p)) document.getElementById('nav-' + p).classList.add('active');
            if(p === 'history') { if(!map) initMap(); else setTimeout(() => map.invalidateSize(), 200); }
        }

        function initMap() {
            map = L.map('map').setView([-6.2297, 106.9255], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // FUNGSI RENDER DATA IDENTIK 100%
        function renderList(data) {
            const container = document.getElementById('activeList');
            container.innerHTML = "";
            if(!data) return;

            let count = 0;
            Object.keys(data).forEach(key => {
                const item = data[key];
                if(item.status === 'Aktif') {
                    count++;
                    const card = `
                        <div class="cust-card">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-[10px] font-black text-red-500 uppercase italic">${item.area || 'JATIWARINGIN'}</p>
                                    <h3 class="text-xl font-black text-blue-900 leading-tight">${item.name}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-[10px] font-bold text-gray-400 italic">READY</span>
                                        <span class="badge-ready">Okta</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button class="btn-action-sm bg-blue-50 text-blue-500"><i class="fa fa-edit"></i></button>
                                    <button class="btn-action-sm bg-red-50 text-red-500"><i class="fa fa-trash-alt"></i></button>
                                    <button class="btn-action-sm bg-yellow-400 text-white shadow-sm"><i class="fa fa-check"></i></button>
                                    <button class="btn-action-sm bg-blue-600 text-white shadow-sm"><i class="fa fa-motorcycle"></i></button>
                                </div>
                            </div>
                            
                            <div class="qr-box">
                                <div id="qr-${key}" class="flex justify-center mb-1"></div>
                                <p class="text-[8px] font-black text-blue-900 italic">SCAN MAPS</p>
                            </div>

                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button onclick="window.open('${item.maps}')" class="bg-[#006491] text-white py-3 rounded-xl font-black uppercase text-[10px] italic flex items-center justify-center gap-2 shadow-sm">
                                    <i class="fa fa-location-dot"></i> Buka Maps
                                </button>
                                <button onclick="window.open('https://wa.me/${item.phone}')" class="bg-[#22c55e] text-white py-3 rounded-xl font-black uppercase text-[10px] italic flex items-center justify-center gap-2 shadow-sm">
                                    <i class="fab fa-whatsapp"></i> Chat WA
                                </button>
                            </div>
                        </div>`;
                    container.innerHTML += card;
                    
                    // Generate QR Code otomatis untuk setiap item
                    setTimeout(() => {
                        new QRCode(document.getElementById(`qr-${key}`), {
                            text: item.maps || "No Link",
                            width: 80,
                            height: 80
                        });
                    }, 100);
                }
            });
            document.getElementById('countActive').innerText = count;
        }

        // Listener Firebase Realtime
        db.ref('antaran').on('value', snap => {
            renderList(snap.val());
        });

        function searchData() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.cust-card');
            cards.forEach(c => {
                const text = c.innerText.toLowerCase();
                c.style.display = text.includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
