<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JTM TRACKER FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { touch-action: manipulation; }
        .page { display: none; padding-bottom: 100px; }
        .page.active { display: block; }
        /* Memastikan navigasi tidak tertutup apapun */
        #nav-bar { z-index: 9999 !important; background: white; border-top: 1px solid #ddd; }
        button, a, .clickable { cursor: pointer; pointer-events: auto !important; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-x-hidden">

    <div id="login-area" class="fixed inset-0 bg-blue-900 z-[10000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h1 class="font-bold text-2xl mb-4 text-blue-900 italic">DOMINO'S JTM</h1>
            <input type="tel" id="pinInput" placeholder="PIN 4 DIGIT" maxlength="4" 
                class="w-full border-2 border-gray-200 p-4 rounded-xl text-center text-2xl font-bold mb-4 outline-none focus:border-blue-500">
            <button onclick="prosesLogin()" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg active:bg-red-700">MASUK</button>
        </div>
    </div>

    <div id="app-area" class="hidden">
        <header class="bg-blue-800 p-4 text-white sticky top-0 z-50 flex justify-between items-center shadow-md">
            <span class="font-black italic">JTM TRACKER</span>
            <span id="userName" class="text-[10px] bg-white text-blue-800 px-2 py-1 rounded font-bold uppercase">User</span>
        </header>

        <main class="p-4">
            <div id="p-list" class="page active">
                <div id="listKonten"></div>
            </div>

            <div id="p-add" class="page">
                <div class="bg-white p-6 rounded-2xl shadow">
                    <input type="text" id="inArea" placeholder="KODE AREA" class="w-full p-3 mb-2 border rounded">
                    <input type="text" id="inNama" placeholder="NAMA PELANGGAN" class="w-full p-3 mb-2 border rounded">
                    <input type="tel" id="inHp" placeholder="NO HP" class="w-full p-3 mb-2 border rounded">
                    <input type="text" id="inMaps" placeholder="LINK GOOGLE MAPS" class="w-full p-3 mb-4 border rounded">
                    <button onclick="simpanAntaran()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">SIMPAN ANTARAN</button>
                </div>
            </div>
        </main>

        <nav id="nav-bar" class="fixed bottom-0 left-0 right-0 flex justify-around p-3 shadow-inner">
            <button onclick="bukaHalaman('list')" class="flex flex-col items-center text-blue-900">
                <i class="fa fa-list text-xl"></i><span class="text-[10px] font-bold">LIST</span>
            </button>
            <button onclick="bukaHalaman('add')" class="flex flex-col items-center text-red-600">
                <i class="fa fa-plus-circle text-3xl"></i>
            </button>
            <button onclick="location.reload()" class="flex flex-col items-center text-gray-400">
                <i class="fa fa-sync text-xl"></i><span class="text-[10px] font-bold">RELOAD</span>
            </button>
        </nav>
    </div>

    <script>
        const config = { databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function prosesLogin() {
            const pin = document.getElementById('pinInput').value;
            const users = {"0972":"Okta","0960":"Dendy","0966":"Arif","0971":"Rian","0967":"Gemilang","0976":"Sadewa","0975":"Fahran","0974":"Rafli","0929":"Acong","0000":"ADMIN"};
            
            if(users[pin]) {
                localStorage.setItem('user_jtm', users[pin]);
                mulaiApp(users[pin]);
            } else {
                alert("PIN Salah!");
            }
        }

        function mulaiApp(nama) {
            document.getElementById('userName').innerText = nama;
            document.getElementById('login-area').remove(); // Hapus total elemen login dari kode
            document.getElementById('app-area').classList.remove('hidden');
            
            // Listen Data
            db.ref('customers').on('value', snap => {
                const data = snap.val();
                const container = document.getElementById('listKonten');
                container.innerHTML = "";
                if(!data) return;

                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    if(item.status === 'done') return;
                    
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow mb-3 border-l-4 border-red-500">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="text-[10px] font-bold text-red-500 uppercase">${item.area}</div>
                                    <div class="font-bold text-blue-900">${item.name}</div>
                                    <div class="text-[10px] text-gray-400">${item.hp}</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="hapusData('${id}')" class="w-10 h-10 bg-gray-100 text-red-500 rounded-lg"><i class="fa fa-trash"></i></button>
                                    <button onclick="selesai('${id}')" class="w-10 h-10 bg-green-500 text-white rounded-lg"><i class="fa fa-check"></i></button>
                                </div>
                            </div>
                            <div class="mt-3">
                                <a href="${item.maps}" target="_blank" class="block w-full bg-blue-50 text-blue-700 text-center py-2 rounded-lg font-bold text-xs">BUKA MAPS</a>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function bukaHalaman(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
        }

        function simpanAntaran() {
            const data = {
                area: document.getElementById('inArea').value,
                name: document.getElementById('inNama').value,
                hp: document.getElementById('inHp').value,
                maps: document.getElementById('inMaps').value,
                status: 'active'
            };
            db.ref('customers').push(data);
            bukaHalaman('list');
            alert("Berhasil disimpan!");
        }

        function selesai(id) { db.ref('customers/'+id).update({status: 'done'}); }
        function hapusData(id) { if(confirm("Hapus data?")) db.ref('customers/'+id).remove(); }

        // Cek Login Otomatis
        const savedUser = localStorage.getItem('user_jtm');
        if(savedUser) mulaiApp(savedUser);
    </script>
</body>
</html>
