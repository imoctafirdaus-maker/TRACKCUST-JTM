<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrackCust JTM - Ultimate System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        .dominos-blue { background-color: #006491; }
        .dominos-red { background-color: #e31837; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #f1f5f9; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; position: relative; width: 20%; cursor: pointer; }
        .nav-item.active { color: #006491; }
        .nav-add { background: #006491 !important; color: white !important; width: 55px !important; height: 55px; border-radius: 50%; margin-top: -30px; justify-content: center; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,100,145,0.3); }
        .page { display: none; height: 100%; } .page.active { display: flex; flex-direction: column; }
        .chat-container { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 6px 10px; border-radius: 12px; margin-bottom: 5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .bubble.left { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .bubble.right { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        #chatBadge { position: absolute; top: -2px; right: 18px; width: 10px; height: 10px; background: #e31837; border-radius: 50%; border: 2px solid white; display: none; z-index: 50; }
        .btn-action { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; }
        .timer-blink { animation: blink 1s infinite; color: #e31837; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .tick { font-size: 10px; margin-left: 4px; }
        #pinOverlay { position: fixed; inset: 0; background: #006491; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #ocrLoader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; color: white; flex-direction: column; border-radius: 2rem; }
    </style>
</head>
<body class="bg-gray-50 h-screen font-sans text-gray-800 flex flex-col overflow-hidden">

    <div id="pinOverlay">
        <div class="text-center mb-8 text-white">
            <h1 class="font-black italic text-4xl uppercase">Domino's</h1>
            <p class="text-red-400 font-bold uppercase tracking-widest text-sm">JTM Track System</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-blue-900 text-[10px] uppercase mb-4 italic">Verifikasi Petugas</h2>
            <select id="selectUser" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 font-bold text-blue-900 outline-none uppercase text-xs"></select>
            <input type="password" id="inputPin" maxlength="4" placeholder="PIN" inputmode="numeric" class="w-full text-center text-2xl font-black p-4 bg-gray-100 rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500">
            <button onclick="prosesLogin()" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg">Masuk</button>
        </div>
    </div>

    <div id="mainContent" style="display:none;" class="flex flex-col h-full">
        <nav class="dominos-blue p-4 text-white shadow-md">
            <div class="flex justify-between items-center mb-1">
                <h1 class="font-black italic uppercase tracking-tighter text-lg">Domino's <span class="text-red-400">JTM</span></h1>
                <div class="flex items-center gap-2">
                    <button id="userDisplay" class="bg-white text-blue-900 px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-md h-7 flex items-center italic">User</button>
                    <button onclick="location.reload()" class="bg-red-500 text-white w-7 h-7 rounded-full shadow-md flex items-center justify-center active:scale-90"><i class="fa fa-sync-alt text-[10px]"></i></button>
                </div>
            </div>
            <div id="onlineList" class="flex gap-2 overflow-x-auto py-1 text-[9px] font-bold italic"></div>
        </nav>

        <main class="flex-1 overflow-hidden relative">
            <div id="page-search" class="page active p-4 overflow-y-auto space-y-4">
                <input type="text" id="searchInput" onkeyup="searchData()" placeholder="Cari Nama/No HP/Driver..." class="w-full p-4 rounded-2xl shadow-sm outline-none border-none text-sm font-bold bg-white italic">
                <div id="activeList" class="space-y-4 pb-32"></div>
            </div>

            <div id="page-add" class="page p-4 overflow-y-auto relative">
                <div id="ocrLoader">
                    <i class="fa fa-circle-notch fa-spin text-4xl mb-3 text-red-500"></i>
                    <p class="font-black italic text-xs uppercase">Sedang Memproses...</p>
                </div>
                <div class="bg-white rounded-[2rem] p-6 shadow-xl border-b-4 border-blue-900 space-y-3">
                    <div class="flex justify-between items-center mb-1">
                        <h2 id="formTitle" class="font-black text-blue-900 text-xs uppercase italic">Input Antaran</h2>
                        <label class="bg-blue-100 text-blue-600 px-3 py-2 rounded-full text-[9px] font-black uppercase italic cursor-pointer flex items-center gap-2 shadow-sm active:scale-95 transition-all">
                            <i class="fa fa-camera"></i> SCAN STRUK
                            <input type="file" accept="image/*" capture="environment" onchange="runOCR(this)" class="hidden">
                        </label>
                    </div>
                    <input type="hidden" id="editKey">
                    <input type="text" id="custArea" placeholder="KODE AREA" class="w-full bg-yellow-50 p-4 rounded-xl text-sm font-bold outline-none uppercase border-2 border-yellow-100 italic">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="custName" placeholder="Nama Pelanggan" class="bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold">
                        <select id="driverName" class="bg-blue-50 p-4 rounded-xl text-sm font-bold text-blue-900 outline-none uppercase italic"></select>
                    </div>
                    <input type="tel" id="custPhone" placeholder="Nomor HP (Contoh: 0812...)" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none font-bold italic">
                    <input type="text" id="custMaps" placeholder="Link Google Maps" class="w-full bg-gray-50 p-4 rounded-xl text-sm outline-none">
                    
                    <div class="flex items-center gap-3 bg-blue-50 p-3 rounded-xl border-2 border-dashed border-blue-200">
                        <label class="flex-1 cursor-pointer flex items-center gap-2 text-blue-900 font-black text-[10px] uppercase italic">
                            <i class="fa fa-home text-lg text-red-500"></i> FOTO RUMAH (OPSIONAL)
                            <input type="file" id="custPhotoFile" accept="image/*" onchange="handlePhoto(this)" class="hidden">
                        </label>
                        <div id="photoPreview" class="hidden w-10 h-10 rounded-lg bg-cover bg-center border-2 border-white shadow-sm"></div>
                        <input type="hidden" id="custPhotoBase64">
                    </div>

                    <button onclick="saveData()" id="saveBtn" class="w-full dominos-red text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm italic">Simpan Data</button>
                    <button onclick="cancelEdit()" id="cancelBtn" class="w-full bg-gray-100 text-gray-400 py-3 rounded-2xl font-black uppercase text-[10px] hidden">Batal Edit</button>
                </div>
            </div>

            <div id="page-history" class="page p-4 overflow-y-auto space-y-4">
                <div id="historyList" class="space-y-2 pb-32"></div>
            </div>

            <div id="page-chat" class="page overflow-hidden">
                <div id="chatDisplay" class="chat-container p-4"></div>
                <div class="bg-[#f0f0f0] p-2 flex gap-2 items-center border-t pb-24">
                    <button id="micBtn" onclick="toggleRecording()" class="w-10 h-10 flex items-center justify-center text-gray-500"><i class="fa fa-microphone text-xl"></i></button>
                    <input type="text" id="chatInput" placeholder="Ketik pesan..." class="flex-1 bg-white rounded-full px-4 py-2 text-sm outline-none shadow-sm font-bold">
                    <button onclick="sendChat()" class="bg-[#075e54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fa fa-paper-plane text-xs"></i></button>
                </div>
            </div>
        </main>

        <div class="bottom-nav">
            <div onclick="showPage('search')" id="nav-search" class="nav-item active"><i class="fa fa-list-ul mb-1 text-xl"></i><span>List</span></div>
            <div onclick="showPage('history')" id="nav-history" class="nav-item"><i class="fa fa-clock-rotate-left mb-1 text-xl"></i><span>Riwayat</span></div>
            <div onclick="showPage('add')" id="nav-add" class="nav-item nav-add"><i class="fa fa-plus text-2xl"></i></div>
            <div onclick="showPage('chat')" id="nav-chat" class="nav-item"><div id="chatBadge"></div><i class="fa fa-comments mb-1 text-xl"></i><span>Chat</span></div>
            <div onclick="handleLogout()" class="nav-item"><i class="fa fa-sign-out-alt mb-1 text-xl"></i><span>Logout</span></div>
        </div>
    </div>

    <script>
        const SECURITY_PIN = "147852";
        const userPins = { 
            "PAK KUR (MANAGEMENT)": "0000", "PAK AGUS (MANAGEMENT)": "6413", "PAK AGENG (MANAGEMENT)": "4444",
            "SINTIYA (KASIR)": "0959", "RIDHA (KASIR)": "0968",
            "Okta": "0972", "Dendy": "0960", "Arif": "0966", "Rian": "0971", "Gemilang": "0967", "Sadewa": "0976", "Fahran": "0975", "Rafli": "0974", "Acong": "0929"
        };

        const firebaseConfig = { apiKey: "AIzaSyAZ7twf8SbcK-HqniDmVqT6k8IM3ehFtgc", authDomain: "trackcust-jtm.firebaseapp.com", databaseURL: "https://trackcust-jtm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "trackcust-jtm", storageBucket: "trackcust-jtm.firebasestorage.app", messagingSenderId: "411585432172", appId: "1:411585432172:web:2d9ae1655d4e3073e4a649" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = localStorage.getItem('jtm_user') || "";
        let allData = {}; let firstLoad = true; let audioCtx = null;
        let mediaRecorder; let audioChunks = [];

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playBeep(type) { if(!audioCtx) return; const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain(); osc.connect(gn); gn.connect(audioCtx.destination); 
            if(type==='chat') osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            else if(type==='done') osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            else if(type==='error') osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            else osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            gn.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2); 
        }

        function handlePhoto(input) {
            if (!input.files || !input.files[0]) return;
            const loader = document.getElementById('ocrLoader');
            loader.style.display = 'flex';
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL("image/jpeg", 0.5);
                    document.getElementById('custPhotoBase64').value = base64;
                    const prev = document.getElementById('photoPreview');
                    prev.style.backgroundImage = `url(${base64})`;
                    prev.classList.remove('hidden');
                    loader.style.display = 'none';
                    playBeep('done');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function runOCR(input) {
            if (!input.files || !input.files[0]) return;
            const loader = document.getElementById('ocrLoader');
            loader.style.display = 'flex';
            try {
                const result = await Tesseract.recognize(input.files[0], 'eng+ind');
                const text = result.data.text;
                const phoneMatch = text.match(/(08\d{8,11}|62\d{8,11})/);
                if (phoneMatch) document.getElementById('custPhone').value = phoneMatch[0];
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
                for(let i=0; i<lines.length; i++) {
                    const l = lines[i].toLowerCase();
                    if(l.includes('nama') || l.includes('customer') || l.includes('sold to')) {
                        let nameVal = lines[i].split(/[:\-]/).pop().trim();
                        if(nameVal.length < 3 && lines[i+1]) nameVal = lines[i+1];
                        document.getElementById('custName').value = nameVal;
                        break;
                    }
                }
                playBeep('done');
            } catch (e) { alert("Gagal!"); } finally { loader.style.display = 'none'; input.value = ""; }
        }

        window.onload = () => {
            const drvSel = document.getElementById('driverName'); 
            const logSel = document.getElementById('selectUser');
            drvSel.innerHTML = '<option value="">PILIH DRIVER</option>';
            logSel.innerHTML = '<option value="">-- PILIH NAMA --</option>';
            Object.keys(userPins).forEach(n => {
                logSel.innerHTML += `<option value="${n}">${n}</option>`;
                if(!n.includes("MANAGEMENT") && !n.includes("KASIR")) drvSel.innerHTML += `<option value="${n}">${n}</option>`;
            });
            if(currentUser) bukaApp(currentUser);
            setInterval(runCountdown, 1000);
        };

        function prosesLogin() {
            const user = document.getElementById('selectUser').value;
            const pin = document.getElementById('inputPin').value;
            if(!user) return alert("Pilih Nama Dulu!");
            if(pin === userPins[user]) { initAudio(); bukaApp(user); } else { alert("PIN SALAH!"); }
        }

        function bukaApp(n) {
            currentUser = n; localStorage.setItem('jtm_user', n);
            document.getElementById('userDisplay').innerText = n;
            document.getElementById('pinOverlay').remove();
            document.getElementById('mainContent').style.display = "flex";
            db.ref('presence/'+n).set({status:'online'});
            db.ref('presence/'+n).onDisconnect().remove();
            startSystem();
        }

        function handleLogout() { if(confirm("Yakin ingin Logout?")) { localStorage.removeItem('jtm_user'); location.reload(); } }

        function startSystem() {
            db.ref('presence').on('value', s => { 
                const l = document.getElementById('onlineList'); l.innerHTML = ""; 
                Object.keys(s.val()||{}).forEach(u => l.innerHTML += `<span class="whitespace-nowrap mr-2"><span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block mr-1"></span>${u}</span>`); 
            });
            db.ref('chats').limitToLast(1).on('child_added', snap => { 
                if(!firstLoad && snap.val().user !== currentUser) { document.getElementById('chatBadge').style.display='block'; playBeep('chat'); } 
            });
            db.ref().on('value', s => { allData = s.val().customers || {}; render(allData, document.getElementById('searchInput').value.toLowerCase()); firstLoad = false; });
        }

        function searchData() { render(allData, document.getElementById('searchInput').value.toLowerCase()); }

        function render(data, filter = "") {
            const act = document.getElementById('activeList'); const hist = document.getElementById('historyList');
            act.innerHTML = ""; hist.innerHTML = "";
            Object.keys(data).sort((a,b) => (data[b].time||0)-(data[a].time||0)).forEach(k => {
                const i = data[k]; 
                const match = (i.name||"").toLowerCase().includes(filter) || (i.driver||"").toLowerCase().includes(filter) || (i.phone||"").toLowerCase().includes(filter);
                if(!i.name || !match) return;
                const isD = i.status === 'done'; const isOTW = i.status === 'otw';
                const waMsg = `Halo Bapak/Ibu ${i.name}, saya ${currentUser} dari Domino's Pizza Jatimakmur. Pesanan Anda sedang saya antar ya, mohon ditunggu. Terimakasih ☺️`;
                const html = `
                    <div class="bg-white rounded-[1.5rem] p-5 shadow-sm border-l-[10px] ${isD?'border-gray-200':'border-red-500'} mb-3">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <p class="text-[9px] font-black text-red-500 uppercase italic">${i.area||'AREA'}</p>
                                <h3 class="font-black text-blue-900 text-xs">${i.name}</h3>
                                <p class="text-[9px] font-bold text-gray-400 italic">${i.driver||'--'} | ${i.phone}</p>
                                ${isOTW ? `<p id="cd-${k}" class="text-[10px] font-black text-blue-600 mt-1 italic">20:00</p>` : ''}
                                ${i.photo ? `<button onclick="showFullPhoto('${k}')" class="mt-2 flex items-center gap-1 text-[8px] font-black text-blue-600 uppercase italic border border-blue-100 px-2 py-1 rounded-lg bg-blue-50"><i class="fa fa-image"></i> Lihat Foto Rumah</button>` : ''}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="setStatus('${k}','done')" class="btn-action bg-yellow-400 text-white shadow-md"><i class="fa fa-check"></i></button>
                                <button onclick="startOTW('${k}')" class="btn-action ${isOTW?'bg-gray-300':'bg-blue-500'} text-white shadow-md"><i class="fa fa-motorcycle"></i></button>
                            </div>
                        </div>
                        ${!isD ? `<div class="flex gap-2 mt-4">
                            <div class="flex flex-col gap-1 flex-1">
                                <a href="${i.maps}" target="_blank" class="dominos-blue text-white py-3 rounded-xl text-center font-black text-[10px]">MAPS</a>
                                <button onclick="editData('${k}')" class="text-blue-900 bg-blue-50 py-1 rounded-lg text-[8px] font-black uppercase italic">Edit Data</button>
                            </div>
                            <div class="flex flex-col gap-1 flex-1">
                                <a href="https://wa.me/${i.phone.startsWith('0')?'62'+i.phone.slice(1):i.phone}?text=${encodeURIComponent(waMsg)}" 
                                   target="_blank" class="bg-green-500 text-white py-3 rounded-xl text-center font-black text-[10px]">WA</a>
                                <button onclick="deleteWithPin('${k}')" class="text-red-500 bg-red-50 py-1 rounded-lg text-[8px] font-black uppercase italic">Hapus</button>
                            </div>
                        </div>` : `<button onclick="setStatus('${k}','active')" class="w-full bg-gray-100 text-gray-400 py-2 rounded-xl text-[9px] font-black mt-2 italic uppercase">Undo Pengantaran</button>`}
                    </div>`;
                if(isD) hist.innerHTML += html; else act.innerHTML += html;
            });
        }

        function showFullPhoto(k) {
            const win = window.open("", "_blank");
            win.document.write(`<html><body style="margin:0;background:black;display:flex;align-items:center;justify-content:center;"><img src="${allData[k].photo}" style="max-width:100%;border-radius:15px;box-shadow:0 0 30px rgba(255,255,255,0.2);"></body></html>`);
        }

        function setStatus(k, s) { db.ref('customers/'+k).update({ status: s }); if(s==='done') playBeep('done'); }
        function startOTW(k) { db.ref('customers/'+k).update({ status: 'otw', startTime: Date.now() }); playBeep('otw'); }
        function deleteWithPin(k) { if(prompt("PIN HAPUS:") === SECURITY_PIN) db.ref('customers/'+k).remove(); }
        
        function saveData() { 
            const key = document.getElementById('editKey').value;
            const inputPhone = document.getElementById('custPhone').value.trim();
            const inputName = document.getElementById('custName').value;
            const inputDriver = document.getElementById('driverName').value;
            if(!inputPhone || !inputName || !inputDriver) { playBeep('error'); return alert("Isi Nama, HP, Driver!"); }
            if(!key) {
                const isDuplicate = Object.values(allData).some(item => item.phone === inputPhone && item.status !== 'done');
                if(isDuplicate) { playBeep('error'); return alert("⚠️ DATA DOUBLE!"); }
            }
            const d = { 
                area: document.getElementById('custArea').value.toUpperCase(), name: inputName, driver: inputDriver, phone: inputPhone, 
                maps: document.getElementById('custMaps').value, photo: document.getElementById('custPhotoBase64').value, status: 'active', time: Date.now() 
            };
            if(key) db.ref('customers/'+key).update(d); else db.ref('customers').push(d);
            cancelEdit(); showPage('search'); playBeep('done');
        }

        function editData(k) {
            const i = allData[k]; document.getElementById('editKey').value = k;
            document.getElementById('custArea').value = i.area; document.getElementById('custName').value = i.name;
            document.getElementById('driverName').value = i.driver; document.getElementById('custPhone').value = i.phone;
            document.getElementById('custMaps').value = i.maps; 
            document.getElementById('custPhotoBase64').value = i.photo || "";
            if(i.photo) {
                const prev = document.getElementById('photoPreview');
                prev.style.backgroundImage = `url(${i.photo})`;
                prev.classList.remove('hidden');
            }
            document.getElementById('formTitle').innerText = "Edit Antaran";
            document.getElementById('cancelBtn').classList.remove('hidden'); showPage('add');
        }

        function cancelEdit() {
            document.getElementById('editKey').value = ""; document.getElementById('formTitle').innerText = "Input Antaran";
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('photoPreview').classList.add('hidden');
            ["custArea","custName","custPhone","custMaps","custPhotoBase64"].forEach(id => document.getElementById(id).value = "");
        }

        function runCountdown() {
            Object.keys(allData).forEach(k => {
                if(allData[k].status === 'otw') {
                    const diff = Math.floor((Date.now() - allData[k].startTime) / 1000);
                    const rem = (20 * 60) - diff;
                    if(rem <= 0) setStatus(k, 'done');
                    else {
                        const m = Math.floor(rem / 60); const s = rem % 60;
                        const el = document.getElementById('cd-'+k);
                        if(el) { el.innerText = `${m}:${s < 10 ? '0' + s : s} MENIT`; if(m < 5) el.className = "text-[10px] font-black timer-blink mt-1 italic"; }
                    }
                }
            });
        }

        db.ref('chats').limitToLast(25).on('value', s => { 
            const d = document.getElementById('chatDisplay'); d.innerHTML = ""; 
            if(s.val()) { 
                Object.keys(s.val()).forEach(k => { 
                    const c = s.val()[k]; const isMe = c.user === currentUser;
                    const ticks = isMe ? (c.readByAll ? '<i class="fa fa-check-double text-blue-500 tick"></i>' : '<i class="fa fa-check text-gray-400 tick"></i>') : '';
                    let content = `<span class="text-[13px] font-bold">${c.text}</span>`;
                    if(c.type === "voice") content = `<div class="flex items-center gap-3 min-w-[180px]"><button onclick="playVN('${k}', '${c.text}')" class="text-gray-500"><i class="fa fa-play text-lg"></i></button><div class="flex-1 h-1 bg-gray-200 relative rounded"><div id="prog-${k}" class="absolute h-full bg-blue-400 rounded" style="width:0%"></div></div></div>`;
                    d.innerHTML += `<div class="bubble ${isMe?'right':'left'}" oncontextmenu="deleteChat('${k}', event)">
                        ${!isMe?`<span class="text-[8px] font-black uppercase text-blue-900 mb-1 block">${c.user}</span>`:''}
                        ${content}
                        <div class="text-[7px] text-right text-gray-500 mt-1 italic">${c.time} ${ticks}</div>
                    </div>`; 
                    if(!isMe && !c.readByAll) db.ref('chats/'+k).update({readByAll: true});
                }); 
            } d.scrollTop = d.scrollHeight; 
        });

        function deleteChat(id, e) { e.preventDefault(); if(confirm("Hapus pesan ini?")) db.ref('chats/'+id).remove(); }
        async function toggleRecording() {
            const btn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = () => sendChat(reader.result, "voice");
                };
                mediaRecorder.start(); btn.innerHTML = '<i class="fa fa-stop text-red-500"></i>';
            } else { mediaRecorder.stop(); btn.innerHTML = '<i class="fa fa-microphone text-xl"></i>'; }
        }
        function playVN(id, url) { const a = new Audio(url); a.play(); a.ontimeupdate = () => document.getElementById('prog-'+id).style.width = (a.currentTime/a.duration*100)+'%'; }
        function sendChat(m, t="text") { const i = document.getElementById('chatInput'); const c = t==="text"?i.value.trim():m; if(c){ db.ref('chats').push({user:currentUser, text:c, type:t, time:new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), readByAll: false}); i.value=""; } }
        function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); document.getElementById('nav-'+id)?.classList.add('active'); if(id==='chat') document.getElementById('chatBadge').style.display='none'; }
    </script>
</body>
</html>
